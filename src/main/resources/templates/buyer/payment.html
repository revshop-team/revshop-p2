<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Secure Payment | RevShop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6f9;
        }

        .gateway-card{
        max-width:520px;
        margin:auto;
        margin-top:60px;
        border-radius:12px;
        }

        .gateway-header{
        background:#0f172a;
        color:white;
        padding:15px;
        border-radius:12px 12px 0 0;
        }

        .payment-tab{
        cursor:pointer;
        padding:10px;
        text-align:center;
        font-weight:500;
        border-bottom:2px solid transparent;
        }

        .payment-tab.active{
        border-bottom:2px solid #22c55e;
        color:#22c55e;
        }

        .payment-section{
        display:none;
        }

        .payment-section.active{
        display:block;
        }

        .pay-btn{
        font-size:18px;
        padding:12px;
        }

        .secure-text{
        font-size:13px;
        color:#6b7280;
        text-align:center;
        }

        .qr-box{
        display:inline-block;
        padding:12px;
        border-radius:10px;
        background:white;
        box-shadow:0 0 0 0 rgba(34,197,94,0.7);
        animation:pulse 2s infinite;
        }

        @keyframes pulse{
        0%{ box-shadow:0 0 0 0 rgba(34,197,94,0.7);}
        70%{ box-shadow:0 0 0 12px rgba(34,197,94,0);}
        100%{ box-shadow:0 0 0 0 rgba(34,197,94,0);}
        }

    </style>

</head>

<body>

<div class="card shadow gateway-card">

    <div class="gateway-header text-center">
        <h5 class="mb-0">🔒 Secure Payment Gateway</h5>
        <p class="small text-light mb-0">Powered by RevShop Pay</p>
    </div>

    <div class="card-body" id="paymentContent">

        <h4 class="text-center mb-1">
            Amount: ₹
            <span th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',2,'POINT')}"></span>
        </h4>

        <p class="secure-text">
            256-bit SSL secured transaction
        </p>

        <p class="text-center text-muted">
            Order ID: <b th:text="${order.orderId}"></b>
        </p>

        <div class="row text-center mb-4">

            <div class="col payment-tab active" onclick="showTab('upi')">
                📱 UPI
            </div>

            <div class="col payment-tab" onclick="showTab('card')">
                💳 Card
            </div>

            <div class="col payment-tab" onclick="showTab('bank')">
                🏦 NetBanking
            </div>

        </div>

        <!-- UPI -->

        <div id="upi" class="payment-section active text-center">

            <h5 class="fw-semibold mb-3">📱 Pay using UPI</h5>

            <input id="upiInput"
                   class="form-control mb-3"
                   placeholder="Enter UPI ID (example@upi)">

            <button class="btn btn-success w-100 pay-btn mb-3"
                    onclick="payUPI()">

                Pay ₹ <span th:text="${order.totalAmount}"></span>

            </button>

            <hr>

            <p class="text-muted mb-2">OR Scan QR Code</p>

            <div class="qr-box mb-3">

                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=revshop-payment">

            </div>

            <button class="btn btn-success w-100"
                    onclick="payQR()">
                Confirm QR Payment
            </button>

        </div>

        <!-- CARD -->

        <div id="card" class="payment-section">

            <input id="cardNumber"
                   class="form-control mb-3"
                   placeholder="Card Number (16 digits)">

            <div class="row">

                <div class="col">
                    <input id="cardExpiry"
                           class="form-control mb-3"
                           placeholder="MM/YY">
                </div>

                <div class="col">
                    <input id="cardCvv"
                           class="form-control mb-3"
                           placeholder="CVV">
                </div>

            </div>

            <input id="cardName"
                   class="form-control mb-3"
                   placeholder="Card Holder Name">

            <button class="btn btn-success w-100 pay-btn"
                    onclick="payCard()">

                Pay ₹ <span th:text="${order.totalAmount}"></span>

            </button>

        </div>

        <!-- NETBANKING -->

        <div id="bank" class="payment-section">

            <select id="bankSelect" class="form-select mb-3">
                <option value="">Select Bank</option>
                <option value="SBI">State Bank of India</option>
                <option value="HDFC">HDFC Bank</option>
                <option value="ICICI">ICICI Bank</option>
                <option value="AXIS">Axis Bank</option>
            </select>

            <div id="bankLoginFields" style="display:none">

                <input id="bankUser"
                       class="form-control mb-3"
                       placeholder="Customer ID / Username">

                <input id="bankPass"
                       type="password"
                       class="form-control mb-3"
                       placeholder="Password">

            </div>

            <button class="btn btn-success w-100 pay-btn"
                    onclick="payBank()">
                Login & Pay
            </button>

        </div>

    </div>

    <div id="paymentLoader" class="text-center p-5" style="display:none">

        <div class="spinner-border text-success mb-3"></div>

        <h5>Processing Payment...</h5>

        <p class="text-muted" id="paymentMethodText"></p>

    </div>

</div>

<script th:inline="javascript">

    const orderId = [[${order.orderId}]];

    function showTab(tab){

    document.querySelectorAll(".payment-tab")
    .forEach(t=>t.classList.remove("active"));

    document.querySelectorAll(".payment-section")
    .forEach(s=>s.classList.remove("active"));

    document.querySelector("[onclick=\"showTab('"+tab+"')\"]")
    .classList.add("active");

    document.getElementById(tab)
    .classList.add("active");

    }

    function payUPI(){

    const upi=document.getElementById("upiInput").value.trim();

    if(!upi){
    alert("Please enter UPI ID");
    return;
    }

    if(!upi.match(/^[\w.-]+@[\w]+$/)){
    alert("Invalid UPI ID");
    return;
    }

    paySuccess("UPI");

    }

    function payQR(){
    paySuccess("UPI QR");
    }

    function payCard(){

    const card=document.getElementById("cardNumber").value.trim();
    const cvv=document.getElementById("cardCvv").value.trim();
    const expiry=document.getElementById("cardExpiry").value.trim();
    const name=document.getElementById("cardName").value.trim();

    if(card.length!==16){
    alert("Card number must be 16 digits");
    return;
    }

    if(!expiry){
    alert("Enter expiry date");
    return;
    }

    if(cvv.length!==3){
    alert("CVV must be 3 digits");
    return;
    }

    if(!name){
    alert("Enter card holder name");
    return;
    }

    paySuccess("Card");

    }

    document.getElementById("bankSelect").addEventListener("change",function(){

    if(this.value!==""){
    document.getElementById("bankLoginFields").style.display="block";
    }else{
    document.getElementById("bankLoginFields").style.display="none";
    }

    });

    function payBank(){

    const bank=document.getElementById("bankSelect").value;
    const user=document.getElementById("bankUser").value.trim();
    const pass=document.getElementById("bankPass").value.trim();

    if(!bank){
    alert("Please select bank");
    return;
    }

    if(!user){
    alert("Enter bank username");
    return;
    }

    if(!pass){
    alert("Enter bank password");
    return;
    }

    paySuccess("NetBanking");

    }

    function paySuccess(method){

    document.getElementById("paymentContent").style.display="none";
    document.getElementById("paymentLoader").style.display="block";

    document.getElementById("paymentMethodText").innerText =
    "Processing payment via "+method;

    setTimeout(function(){

    if(method === "UPI" || method === "UPI QR"){
    window.location="/buyer/payment/process?orderId="+orderId+"&status=success";
    }else{
    window.location="/buyer/payment/otp?orderId="+orderId;
    }

    },2000);

    }

</script>

</body>
</html>
