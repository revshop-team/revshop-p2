<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | My Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div th:replace="buyer/fragments/navbar :: navbar"></div>

    <div class="container py-5">

    <!-- ================= STATS SECTION ================= -->
        <div class="row g-4 mb-5 text-center">

        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body py-4">
                    <p class="text-muted small mb-2">Total Orders</p>
                    <h2 class="fw-bold text-dark mb-0"
                        th:text="${totalOrders}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body py-4">
                    <p class="text-muted small mb-2">Total Spending</p>
                    <h2 class="fw-bold text-success mb-0"
                        th:text="'₹ ' + ${totalSpending}"></h2>
                </div>
            </div>
        </div>

    </div>

    <!-- ================= PROFILE CARD ================= -->
    <div class="card border-0 shadow-sm">

        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h5 class="mb-0 fw-semibold">My Profile</h5>

            <a th:href="@{/buyer/profile(edit=true)}"
               class="btn btn-dark btn-sm px-3"
               th:if="${!editMode}">
                Edit Profile
            </a>
        </div>

        <div class="card-body p-4">

            <!-- VIEW MODE -->
            <div th:if="${!editMode}">

                <div class="row g-4">

                    <div class="col-md-6">
                        <div class="text-muted small">Full Name</div>
                        <div class="fw-medium fs-6"
                             th:text="${buyerDetails.fullName != null ? buyerDetails.fullName : 'Not Provided'}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="text-muted small">Phone</div>
                        <div class="fw-medium fs-6"
                             th:text="${buyerDetails.phone != null ? buyerDetails.phone : 'Not Provided'}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="text-muted small">Gender</div>
                        <div class="fw-medium fs-6"
                             th:text="${buyerDetails.gender != null ? buyerDetails.gender : 'Not Provided'}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="text-muted small">Date of Birth</div>
                        <div class="fw-medium fs-6"
                             th:text="${buyerDetails.dateOfBirth != null ? buyerDetails.dateOfBirth : 'Not Provided'}">
                        </div>
                    </div>

                </div>

            </div>

            <!-- EDIT MODE -->
            <div th:if="${editMode}">

                <form th:action="@{/buyer/profile/update}"
                      th:object="${buyerDetails}"
                      method="post">

                    <div class="row g-4 mb-4">

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{fullName}"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{phone}">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Gender</label>
                            <select class="form-select"
                                    th:field="*{gender}">
                                <option value="">Select</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Date of Birth</label>
                            <input type="date"
                                   class="form-control"
                                   th:field="*{dateOfBirth}">
                        </div>

                    </div>

                    <button type="submit"
                            class="btn btn-dark px-4">
                        Save Changes
                    </button>

                    <a th:href="@{/buyer/profile}"
                       class="btn btn-outline-secondary ms-2 px-4">
                        Cancel
                    </a>

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
