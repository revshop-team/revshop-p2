<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Product Reviews | RevShop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#f5f6f8;
        }

        .review-card{
        border-radius:12px;
        border:none;
        }

        .star{
        color:#ffc107;
        font-size:18px;
        }

        .rating-box{
        background:white;
        border-radius:12px;
        padding:20px;
        }

        .progress{
        height:10px;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h3 class="fw-bold mb-4">

        Reviews for
        <span th:text="${product.productName}"></span>

    </h3>

    <div class="row">

        <!-- ⭐ Average Rating -->
        <div class="col-md-4">

            <div class="rating-box shadow-sm text-center">

                <h1 class="fw-bold">

                    <span th:text="${#numbers.formatDecimal(avgRating,1,1)}"></span>

                </h1>

                <div>

<span th:each="i : ${#numbers.sequence(1,5)}">
<span th:text="${i <= avgRating ? '★' : '☆'}"
      class="star"></span>
</span>

                </div>

                <p class="text-muted mt-2">
                    <span th:text="${totalReviews}"></span> reviews
                </p>

            </div>

        </div>

        <!-- ⭐ Rating Breakdown -->
        <div class="col-md-8">

            <div class="rating-box shadow-sm">

                <div th:each="i : ${#numbers.sequence(5,1)}"
                     class="d-flex align-items-center mb-2">

                    <div style="width:40px">
                        <span th:text="${i} + '★'"></span>
                    </div>

                    <div class="progress flex-grow-1 mx-2">

                        <div class="progress-bar bg-warning"
                             role="progressbar"
                             th:style="'width:' + (${ratingCount[i]} * 100 / totalReviews) + '%'">
                        </div>

                    </div>

                    <div style="width:40px"
                         th:text="${ratingCount[i]}"></div>

                </div>

            </div>

        </div>

    </div>

    <hr class="my-4">

    <!-- ⭐ Review List -->

    <div th:each="review : ${reviews}"
         class="card review-card shadow-sm mb-3">

        <div class="card-body">

            <div class="mb-2">

<span th:each="i : ${#numbers.sequence(1,5)}">
<span th:text="${i <= review.rating ? '★' : '☆'}"
      class="star"></span>
</span>

                <span class="ms-2"
                      th:text="${review.rating} + ' / 5'"></span>

            </div>

            <div class="text-muted">

                Buyer:
                <span class="fw-semibold"
                      th:text="${review.buyer.email}">
</span>

            </div>

            <p class="mt-2"
               th:text="${review.reviewComment}">
            </p>

            <small class="text-secondary">

                Reviewed on:
                <span th:text="${#temporals.format(review.reviewDate,'dd MMM yyyy')}">
</span>

            </small>

        </div>

    </div>

</div>

</body>
</html>
