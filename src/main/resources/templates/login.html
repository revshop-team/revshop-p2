<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | RevShop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 20%, #1e1b4b, #0f172a 60%);
            font-family: 'Segoe UI', sans-serif;
        }

        .login-wrapper {
            width: 430px;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(18px);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
        }

        .brand {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #facc15, #fde68a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 13px;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            color: white;
            padding: 12px 15px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: #facc15;
            box-shadow: 0 0 0 0.2rem rgba(250,204,21,0.2);
            color: white;
        }

        .input-group-text {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px 0 0 14px;
            color: #facc15;
        }

        .btn-login {
            background: linear-gradient(135deg, #facc15, #f59e0b);
            border: none;
            border-radius: 14px;
            font-weight: 600;
            padding: 12px;
            transition: 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(250,204,21,0.4);
        }

        .login-links a {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .login-links a:hover {
            color: #facc15;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255,255,255,0.7);
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            margin: 25px 0;
        }

        .alert {
            border-radius: 12px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <div class="text-center mb-4">
            <div class="brand">REVSHOP</div>
            <div class="tagline">Premium Shopping Experience</div>
        </div>

        <!-- SUCCESS MESSAGE -->
        <div th:if="${successMessage}"
             class="alert alert-success text-center">
            <span th:text="${successMessage}"></span>
        </div>

        <!-- LOGIN ERROR -->
        <div th:if="${param.error}"
             class="alert alert-danger text-center">
            Invalid email or password
        </div>

        <!-- LOGOUT MESSAGE -->
        <div th:if="${param.logout}"
             class="alert alert-info text-center">
            Logged out successfully
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">

            <!-- Email -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Email Address"
                           required>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3 position-relative">
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Password"
                           required>
                </div>

                <i class="bi bi-eye password-toggle"
                   onclick="togglePassword()"></i>
            </div>

            <div class="divider"></div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-login">
                    Login
                </button>
            </div>

        </form>

        <div class="text-center login-links">
            <div>
                <a th:href="@{/register}" class="text-decoration-none">
                    Create Account
                </a>
            </div>

            <div class="mt-2">
                <a th:href="@{/forgot-password}" class="text-decoration-none">
                    Forgot Password?
                </a>
            </div>
        </div>

    </div>

</div>

<script>

    function togglePassword() {

        const password = document.getElementById("password");
        const icon = document.querySelector(".password-toggle");

        if (password.type === "password") {
            password.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            password.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }

    }

</script>

</body>
</html>
