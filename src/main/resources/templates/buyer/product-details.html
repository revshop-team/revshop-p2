<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${product.productName} + ' | RevShop'"></title>
    <meta charset="UTF-8">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .product-image {
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .price {
            font-size: 28px;
            font-weight: 700;
            color: #198754;
        }

        .mrp {
            font-size: 16px;
            text-decoration: line-through;
            color: #6c757d;
        }

        .discount-badge {
            font-size: 14px;
        }

        .rating i {
            color: #ffc107;
        }

        .info-box {
            background: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .divider {
            border-top: 1px solid #e9ecef;
            margin: 25px 0;
        }
    </style>
</head>

<body>

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" th:href="@{/buyer/products}">
        RevShop
    </a>
</nav>

<div class="container py-5">

    <div class="row g-5">

        <!-- 🔹 LEFT SIDE: PRODUCT IMAGE -->
        <div class="col-lg-6">
            <img src="https://via.placeholder.com/600x500"
                 class="img-fluid product-image"
                 alt="Product Image">
        </div>

        <!-- 🔹 RIGHT SIDE: PRODUCT DETAILS -->
        <div class="col-lg-6">

            <h2 class="fw-bold mb-2"
                th:text="${product.productName}"></h2>

            <!-- Fake Rating UI -->
            <div class="rating mb-3">
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-half"></i>
                <span class="text-muted ms-2">(124 reviews)</span>
            </div>

            <!-- PRICE SECTION -->
            <div class="mb-3">
                <span class="price">
                    ₹ <span th:text="${product.sellingPrice}"></span>
                </span>

                <span class="ms-3 mrp"
                      th:text="'₹ ' + ${product.mrp}"></span>

                <span class="badge bg-danger ms-3 discount-badge"
                      th:if="${product.mrp != null and product.mrp > product.sellingPrice}"
                      th:text="${T(java.lang.Math).round((product.mrp - product.sellingPrice) * 100 / product.mrp)} + '% OFF'">
                </span>
            </div>

            <!-- STOCK STATUS -->
            <div class="mb-3">
                <span class="badge bg-success"
                      th:if="${product.stock > 0}">
                    In Stock
                </span>

                <span class="badge bg-danger"
                      th:if="${product.stock <= 0}">
                    Out of Stock
                </span>
            </div>

            <div class="divider"></div>

            <!-- PRODUCT INFO -->
            <div class="info-box">

                <p>
                    <strong>Description:</strong><br>
                    <span th:text="${product.description}"></span>
                </p>

                <p>
                    <strong>Manufacturer:</strong>
                    <span th:text="${product.manufacturer}"></span>
                </p>

                <p>
                    <strong>Available Quantity:</strong>
                    <span th:text="${product.stock}"></span>
                </p>

            </div>

            <hr class="mt-5">

            <h4 class="fw-bold mb-4">Customer Reviews</h4>

            <div th:if="${reviews == null || #lists.isEmpty(reviews)}"
                 class="alert alert-info rounded-4">
                No reviews yet for this product.
            </div>

            <div th:each="review : ${reviews}"
                 class="card mb-3 shadow-sm rounded-4">

                <div class="card-body">

                    <div class="d-flex justify-content-between">

                        <div class="fw-semibold">
                            <span th:text="${review.buyer.email}"></span>
                        </div>

                        <div class="text-warning fw-bold">
                            ⭐ <span th:text="${review.rating}"></span>/5
                        </div>

                    </div>

                    <p class="mt-2 mb-1"
                       th:text="${review.reviewComment}"></p>

                    <small class="text-muted"
                           th:text="${#temporals.format(review.reviewDate, 'dd MMM yyyy')}">
                    </small>

                </div>

            </div>

            <!-- ACTION BUTTONS -->
            <div class="d-grid gap-3 mt-4">

                <button class="btn btn-success btn-lg">
                    <i class="bi bi-cart-fill me-2"></i>
                    Add to Cart
                </button>

                <button class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-lightning-fill me-2"></i>
                    Buy Now
                </button>

                <a th:href="@{/buyer/products}"
                   class="btn btn-link text-decoration-none">
                    ← Back to Products
                </a>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
