<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Notifications | RevShop</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 🔷 NAVBAR -->
<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h3 class="fw-bold mb-4">🔔 My Notifications</h3>

    <!-- Empty State -->
    <div th:if="${notifications == null || #lists.isEmpty(notifications)}"
         class="alert alert-info text-center rounded-4">
        No notifications yet.
    </div>

    <!-- Notification List -->
    <div th:each="n : ${notifications}"
         class="card mb-3 shadow-sm border-0 rounded-4">

        <div class="card-body d-flex justify-content-between align-items-center">

            <div>
                <h6 class="mb-1 fw-semibold"
                    th:text="${n.message}">
                </h6>

                <small class="text-muted"
                       th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy, hh:mm a')}">
                </small>
            </div>

            <div>
                <!-- NEW Badge -->
                <span th:if="${n.isRead == 'N'}"
                      class="badge bg-danger me-2">
                    NEW
                </span>

                <!-- Mark as Read -->
                <a th:if="${n.isRead == 'N'}"
                   th:href="@{/buyer/notifications/read/{id}(id=${n.notificationId})}"
                   class="btn btn-sm btn-outline-primary">
                    Mark as Read
                </a>

                <!-- Already Read -->
                <span th:if="${n.isRead == 'Y'}"
                      class="badge bg-success">
                    Read
                </span>
            </div>

        </div>
    </div>

</div>

</body>
</html>
