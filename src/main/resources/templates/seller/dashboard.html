<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">RevShop - Seller</a>

    <div class="ms-auto d-flex align-items-center">

        <!-- Notification Icon -->
        <div class="dropdown me-3">
            <button class="btn btn-dark position-relative"
                    type="button"
                    id="notifDropdown"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">
                <i class="bi bi-bell" style="font-size: 1.5rem;"></i>
                <span th:if="${unreadCount > 0}"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      th:text="${unreadCount}">0</span>
            </button>

            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="notifDropdown">
                <li th:if="${notifications.size() == 0}" class="dropdown-item text-muted">No new notifications</li>
                <li th:each="notif : ${notifications}">
                    <a class="dropdown-item"
                       th:href="@{'/seller/notifications/read/' + ${notif.id}}">
                        <small th:text="${#dates.format(notif.createdAt, 'dd MMM HH:mm')}"></small>
                        <br/>
                        <span th:text="${notif.message}"></span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Account Dropdown -->
        <div class="dropdown">
            <button class="btn btn-light btn-sm dropdown-toggle"
                    type="button"
                    data-bs-toggle="dropdown">
                My Account
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" th:href="@{/seller/profile}">Profile</a></li>
                <li><a class="dropdown-item" th:href="@{/logout}">Logout</a></li>
            </ul>
        </div>

    </div>
</nav>
<div class="container mt-5">

    <h3 class="text-center mb-4">Seller Dashboard</h3>

    <div class="row g-4">

        <!-- Add Product -->
        <div class="col-md-4">
            <a th:href="@{/seller/add-product}" class="text-decoration-none">
                <div class="card text-center shadow-sm p-4">
                    <i class="bi bi-plus-square fs-1 text-primary"></i>
                    <h5 class="mt-3">Add Product</h5>
                </div>
            </a>
        </div>

        <!-- View Products -->
        <div class="col-md-4">
            <a th:href="@{/seller/my-products}" class="text-decoration-none">
                <div class="card text-center shadow-sm p-4">
                    <i class="bi bi-box-seam fs-1 text-success"></i>
                    <h5 class="mt-3">Manage Products</h5>
                </div>
            </a>
        </div>

        <!-- Sales -->
        <div class="col-md-4">
            <a th:href="@{/seller/sales}" class="text-decoration-none">
                <div class="card text-center shadow-sm p-4">
                    <i class="bi bi-graph-up fs-1 text-warning"></i>
                    <h5 class="mt-3">View Sales</h5>
                </div>
            </a>
        </div>

    </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
