<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>OTP Verification | RevShop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0A192F, #132a4d, #1b355d);
            background-size: 300% 300%;
            animation: bgMove 14s ease infinite;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .otp-card {
            max-width: 450px;
            width: 100%;
            border: none;
            border-radius: 20px;
            background: linear-gradient(145deg, #ffffff, #f6f7fb);
            color: #0A192F;
            box-shadow: 0 18px 40px rgba(0,0,0,.35);
            transition: .45s ease;
            animation: slideUp 0.8s ease forwards, floatItem 6s ease-in-out infinite;
            opacity: 0;
            padding: 40px 30px;
        }

        .otp-card:hover {
            box-shadow: 0 30px 70px rgba(0,0,0,.5);
        }

        @keyframes slideUp {
            0% { transform: translateY(60px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes floatItem {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: #e6f0ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #D4AF37;
            background: #0A192F;
            font-size: 35px;
            box-shadow: 0 10px 20px rgba(10, 25, 47, 0.2);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        .otp-title {
            font-weight: 700;
            color: #0A192F;
            letter-spacing: 0.5px;
        }

        .otp-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            margin-top: 20px;
        }

        .otp-box {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border-radius: 12px;
            border: 2px solid #dce1e6;
            background: #fff;
            color: #0A192F;
            transition: all 0.3s ease;
        }

        .otp-box:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.2);
            transform: translateY(-3px);
        }

        /* BUTTONS */
        .btn-verify {
            background: #D4AF37 !important;
            border: 2px solid transparent !important;
            color: #0A192F !important;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            transition: all .35s ease !important;
            letter-spacing: .3px;
        }

        .btn-verify:hover:not(:disabled) {
            background: #0A192F !important;
            border-color: #0A192F !important;
            color: #D4AF37 !important;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(10,25,47,.3) !important;
        }

        .btn-verify:disabled {
            background: #e2e8f0 !important;
            color: #94a3b8 !important;
            cursor: not-allowed;
            transform: none;
            box-shadow: none !important;
        }

        .timer {
            font-size: 14px;
            color: #6c757d;
            font-weight: 500;
        }

        .btn-resend {
            color: #0A192F;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .btn-resend:hover {
            color: #D4AF37;
            text-decoration: underline;
        }

        /* Custom Loader */
        .spinner-border {
            color: #D4AF37 !important;
            width: 3rem;
            height: 3rem;
        }

    </style>

</head>

<body>

<div class="container px-4">

    <div class="card otp-card text-center mx-auto" id="otpCardUI">

        <div class="icon-wrapper">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <h4 class="otp-title mb-2">OTP Verification</h4>

        <p class="text-muted" style="font-size: 14px;">
            Enter the 6-digit OTP sent to mobile number ending with <b class="text-dark">**72</b>
        </p>

        <div class="otp-container">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        </div>

        <button id="verifyBtn"
                class="btn btn-verify w-100"
                onclick="verifyOTP()"
                disabled>
            Verify & Complete Payment
        </button>

        <p class="timer mt-4 mb-2">
            <i class="bi bi-clock me-1"></i> OTP expires in <span id="time" class="text-danger fw-bold">30</span> seconds
        </p>

        <div class="bg-light rounded p-2 mb-3 mt-3">
            <p class="text-muted mb-0 small">
                Demo OTP: <b class="text-dark fs-6 tracking-widest">123456</b>
            </p>
        </div>

        <button class="btn btn-link btn-resend p-0"
                onclick="resendOTP()">
            Resend OTP
        </button>

    </div>

    <div id="otpLoader" class="text-center p-5" style="display:none; animation: slideUp 0.8s ease forwards;">
        <div class="spinner-border mb-3" role="status"></div>
        <h4 class="fw-bold text-white">Verifying OTP...</h4>
        <p class="text-light" style="opacity: 0.8;">Securing your transaction</p>
    </div>

</div>

<script th:inline="javascript">

    const orderId = [[${orderId}]];

    const inputs = document.querySelectorAll(".otp-box");
    const verifyBtn = document.getElementById("verifyBtn");

    /* AUTO MOVE INPUT */

    inputs.forEach((input,index)=>{

        input.addEventListener("input",function(){

            // Ensure only numbers are entered
            this.value = this.value.replace(/[^0-9]/g, '');

            if(this.value.length===1 && index<5){
                inputs[index+1].focus();
            }

            checkOTP();

        });

        input.addEventListener("keydown",function(e){

            if(e.key==="Backspace" && !this.value && index>0){
                inputs[index-1].focus();
            }

        });

    });

    /* CHECK OTP */

    function checkOTP(){

        let otp="";

        inputs.forEach(i=>otp+=i.value);

        if(otp.length===6){
            verifyBtn.disabled=false;
        }else{
            verifyBtn.disabled=true;
        }

    }

    /* VERIFY OTP */

    function verifyOTP(){

        let otp="";

        inputs.forEach(i=>otp+=i.value);

        if(otp!=="123456"){
            alert("Invalid OTP");
            return;
        }

        // Show loader for a premium transition UX
        document.getElementById("otpCardUI").style.display="none";
        document.getElementById("otpLoader").style.display="block";

        setTimeout(function(){

            window.location="/buyer/payment/process?orderId="+orderId+"&status=success";

        },1500);

    }

    /* TIMER */

    let time=30;
    let timerInterval;

    function startTimer(){

        timerInterval=setInterval(function(){

            if(time<=0){
                document.getElementById("time").innerText="Expired";
                document.getElementById("time").classList.remove("text-danger");
                document.getElementById("time").classList.add("text-muted");
                clearInterval(timerInterval);
                return;
            }

            document.getElementById("time").innerText=time;
            time--;

        },1000);

    }

    startTimer();

    /* RESEND OTP */

    function resendOTP(){

        alert("New OTP sent (Demo OTP remains 123456)");

        clearInterval(timerInterval);

        time=30;

        document.getElementById("time").innerText=time;
        document.getElementById("time").classList.add("text-danger");
        document.getElementById("time").classList.remove("text-muted");

        // Clear inputs
        inputs.forEach(i => i.value = "");
        inputs[0].focus();
        checkOTP();

        startTimer();

    }

</script>

</body>
</html>
