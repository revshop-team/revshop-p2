<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Notifications | RevShop</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background-color: #f5f6f8; }

        .notification-card {
            border: none;
            border-radius: 18px;
            transition: 0.25s ease;
            background: #ffffff;
        }

        .notification-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .order-icon { background: #e7f1ff; color: #0d6efd; }
        .stock-icon { background: #fff3cd; color: #f59e0b; }

        .new-badge {
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .section-title {
            font-weight: 700;
            color: #2c3e50;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <div class="ms-auto d-flex align-items-center gap-4">

        <!-- Notification Bell -->
        <a th:href="@{/seller/notifications}"
           class="position-relative text-light text-decoration-none">

            <i class="bi bi-bell fs-5"></i>

            <span id="notificationCount"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                0
            </span>
        </a>

        <!-- Account -->
        <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle"
                    data-bs-toggle="dropdown">
                <i class="bi bi-person-circle me-1"></i>
                My Account
            </button>

            <ul class="dropdown-menu dropdown-menu-end shadow">
                <li>
                    <a class="dropdown-item"
                       th:href="@{/seller/profile}">
                        <i class="bi bi-person me-2"></i> Profile
                    </a>
                </li>

                <li>
                    <a class="dropdown-item text-danger"
                       th:href="@{/logout}">
                        <i class="bi bi-box-arrow-right me-2"></i> Logout
                    </a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container py-5">

    <h3 class="section-title mb-4">🔔 Notifications</h3>

    <!-- No notifications -->
    <div th:if="${notifications == null || #lists.isEmpty(notifications)}"
         class="alert alert-info text-center rounded-4">
        No notifications yet.
    </div>

    <!-- Notifications list -->
    <div th:each="n : ${notifications}"
         class="card notification-card shadow-sm mb-3 p-3">

        <div class="d-flex justify-content-between align-items-center">

            <!-- LEFT -->
            <div class="d-flex align-items-center gap-3">

                <div th:classappend="${#strings.contains(n.message, 'Low stock')} ? 'stock-icon' : 'order-icon'"
                     class="icon-box">

                    <i th:classappend="${#strings.contains(n.message, 'Low stock')} ? 'bi bi-exclamation-triangle-fill' : 'bi bi-bag-check-fill'"></i>

                </div>

                <div>
                    <h6 class="mb-1 fw-semibold"
                        th:text="${n.message}"></h6>

                    <small class="text-muted"
                           th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy, hh:mm a')}"></small>
                </div>

            </div>

            <!-- RIGHT -->
            <div class="text-end">

                <!-- NEW badge -->
                <span th:if="${n.isRead == 'N'}"
                      class="badge bg-danger new-badge me-2">
                    NEW
                </span>

                <!-- MARK AS READ -->
                <a th:if="${n.isRead == 'N'}"
                   th:href="@{/seller/notifications/read/{id}(id=${n.notificationId})}"
                   class="btn btn-sm btn-outline-primary">
                    Mark as Read
                </a>

                <!-- REMOVE BUTTON -->
                <a th:if="${n.isRead == 'Y'}"
                   th:href="@{/seller/notifications/delete/{id}(id=${n.notificationId})}"
                   onclick="return confirm('Remove this notification?')"
                   class="btn btn-sm btn-outline-danger">
                    Remove
                </a>

            </div>

        </div>

    </div>

</div>

<!-- Notification Count Script -->
<script>
    function loadNotificationCount() {
        fetch('/seller/notifications/unread-count')
            .then(res => res.text())
            .then(count => {

                const badge = document.getElementById('notificationCount');
                const num = parseInt(count);

                if (!isNaN(num) && num > 0) {
                    badge.classList.remove('d-none');
                    badge.textContent = num;
                } else {
                    badge.classList.add('d-none');
                }
            })
            .catch(err => console.error("Notification error:", err));
    }

    loadNotificationCount();
    setInterval(loadNotificationCount, 5000);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
