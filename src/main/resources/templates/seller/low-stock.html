<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Low Stock Alerts | RevShop</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">
        RevShop - Seller
    </a>
</nav>

<div class="container mt-5">

    <h3 class="fw-bold mb-4 text-danger">
        ⚠ Low Stock Alerts
    </h3>

    <!-- Empty State -->
    <div th:if="${lowStockProducts == null || #lists.isEmpty(lowStockProducts)}"
         class="alert alert-success text-center rounded-3">
        🎉 All products are well stocked!
    </div>

    <!-- Low Stock Table -->
    <div th:if="${lowStockProducts != null && !#lists.isEmpty(lowStockProducts)}"
         class="card shadow">
        <div class="card-body">

            <table class="table table-bordered align-middle">
                <thead class="table-danger">
                <tr>
                    <th>Product</th>
                    <th>Stock</th>
                    <th>Threshold</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="product : ${lowStockProducts}">
                    <td th:text="${product.productName}"></td>
                    <td th:text="${product.stock}"></td>
                    <td th:text="${product.stockThreshold}"></td>
                    <td>
                        <span class="badge bg-danger">
                            Low Stock
                        </span>
                    </td>
                </tr>
                </tbody>

            </table>
        </div>
    </div>

</div>
</body>
</html>
