<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Seller Profile | RevShop</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
        font-family:'Inter',sans-serif;
        background:linear-gradient(180deg,#0A192F,#112240);
        color:white;
        min-height:100vh;
        overflow-x:hidden;
        }

        /* BACKGROUND GLOW */

        body::before{
        content:"";
        position:fixed;
        top:-200px;
        left:-200px;
        width:500px;
        height:500px;
        background:radial-gradient(circle,#D4AF37,transparent);
        opacity:.15;
        animation:orbit 12s linear infinite;
        }

        @keyframes orbit{
        0%{transform:rotate(0deg) translateX(200px) rotate(0deg);}
        100%{transform:rotate(360deg) translateX(200px) rotate(-360deg);}
        }

        /* NAVBAR */

        .classic-navbar{
        background:#0A192F;
        border-bottom:1px solid #061022;
        padding-top:8px;
        padding-bottom:8px;
        }

        .brand-text{
        font-size:1.1rem;
        line-height:1.3;
        letter-spacing:.5px;
        }

        .brand-subtext{
        font-size:.65rem;
        line-height:1.3;
        }

        .brand-accent{
        background:linear-gradient(90deg,#D4AF37,#f5d76e,#bfa132,#D4AF37);
        background-size:300% auto;
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        animation:goldMove 3s linear infinite;
        }

        @keyframes goldMove{
        0%{background-position:0%}
        100%{background-position:300%}
        }

        .brand-diamond{
        color:#D4AF37;
        font-size:11px;
        margin-left:4px;
        display:inline-block;
        animation:diamondSpin 2s infinite linear;
        }

        @keyframes diamondSpin{
        0%{transform:rotate(0deg) scale(1);}
        50%{transform:rotate(180deg) scale(1.4);}
        100%{transform:rotate(360deg) scale(1);}
        }

        /* PROFILE PILL */

        .profile-pill{
        display:flex;
        align-items:center;
        gap:8px;
        padding:6px 14px;
        border-radius:40px;
        color:#fff;
        font-size:.85rem;
        border:1px solid rgba(212,175,55,.7);
        }

        .seller-tag{
        font-size:.55rem;
        font-weight:700;
        background:#D4AF37;
        color:#0A192F;
        padding:2px 6px;
        border-radius:12px;
        }

        /* BELL */

        .bell-icon{
        color:white;
        cursor:pointer;
        transition:.3s;
        display:inline-block;
        transform-origin:top;
        }

        .bell-icon:hover{
        color:#D4AF37;
        animation:bellRing .6s ease;
        }

        @keyframes bellRing{
        0%{transform:rotate(0)}
        20%{transform:rotate(20deg)}
        40%{transform:rotate(-18deg)}
        60%{transform:rotate(14deg)}
        80%{transform:rotate(-10deg)}
        100%{transform:rotate(0)}
        }

        /* DROPDOWN */

        .dropdown-menu{
        background:#0A192F;
        border:1px solid rgba(212,175,55,.5);
        border-radius:14px;
        box-shadow:0 12px 35px rgba(0,0,0,.6);
        }

        .dropdown-item{
        color:white;
        font-size:.9rem;
        }

        .dropdown-item:hover{
        background:#D4AF37;
        color:#0A192F;
        }

        /* PROFILE CARD */

        .profile-card{
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(14px);
        border:1px solid rgba(255,255,255,0.15);
        border-radius:20px;
        box-shadow:0 25px 60px rgba(0,0,0,.6);
        animation:floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard{
        0%{transform:translateY(0)}
        50%{transform:translateY(-10px)}
        100%{transform:translateY(0)}
        }

        /* HEADER */

        .profile-header{
        background:linear-gradient(135deg,#D4AF37,#bfa132);
        color:#0A192F;
        border-radius:20px 20px 0 0;
        padding:20px;
        display:flex;
        align-items:center;
        gap:12px;
        }

        .profile-icon{
        font-size:30px;
        background:white;
        border-radius:50%;
        padding:8px 12px;
        }

        .form-label{
        font-weight:600;
        }

        input.form-control{
        background:rgba(255,255,255,0.9);
        border-radius:12px;
        border:none;
        padding:10px 12px;
        transition:.3s;
        }

        input.form-control:focus{
        box-shadow:0 0 0 3px rgba(212,175,55,.4);
        transform:scale(1.02);
        }

        .btn-update{
        background:#D4AF37;
        border:none;
        color:#0A192F;
        font-weight:600;
        padding:10px 20px;
        border-radius:10px;
        }

        .btn-back{
        background:#3a4355;
        border:none;
        border-radius:10px;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg sticky-top shadow-sm classic-navbar">

    <div class="container">

        <a class="navbar-brand d-flex flex-column align-items-start text-decoration-none"
           th:href="@{/seller/dashboard}">

<span class="fst-italic fw-bold text-white brand-text">
Rev<span class="brand-accent">Shop</span>
</span>

            <span class="brand-subtext text-white">
Shop <span class="brand-accent fw-bold">Smart</span>
<i class="bi bi-gem brand-diamond"></i>
</span>

        </a>

        <div class="ms-auto d-flex align-items-center gap-3">

            <a th:href="@{/seller/notifications}"
               class="nav-link position-relative text-decoration-none">

                <i class="bi bi-bell-fill fs-5 bell-icon"></i>

                <span id="notificationCount"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
0 </span>

            </a>

            <div class="dropdown">

                <a href="#"
                   class="text-decoration-none d-flex align-items-center dropdown-toggle"
                   data-bs-toggle="dropdown">

                    <div class="profile-pill">

                        <i class="bi bi-person-circle text-white"></i>
                        <span class="fw-semibold text-capitalize"
                              th:text="${businessName}">
Business
</span>

                        <span class="seller-tag">SELLER</span>

                    </div>

                </a>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li class="px-3 py-2 dropdown-account">
                        <strong th:text="${businessName}">Business Name</strong><br>
                        <small th:text="${#authentication.name}">email</small>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <a class="dropdown-item" th:href="@{/seller/profile}">
                            <i class="bi bi-person me-2"></i>
                            My Profile
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item text-danger" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </div>

</nav>

<!-- PROFILE -->

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="profile-card">

                <div class="profile-header">

                    <i class="bi bi-person-badge profile-icon"></i>

                    <h4 class="mb-0 fw-bold">Seller Profile</h4>

                </div>

                <div class="p-4">

                    <div th:if="${param.success}" class="alert alert-success">
                        Profile updated successfully!
                    </div>

                    <div th:if="${error}" class="alert alert-danger">
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/seller/profile}"
                          th:object="${sellerDetails}"
                          method="post">

                        <input type="hidden" th:field="*{sellerId}"/>

                        <div class="mb-3">
                            <label class="form-label">Business Name</label>
                            <input type="text" class="form-control"
                                   th:field="*{businessName}"
                                   required minlength="3">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">GST Number</label>
                            <input type="text" class="form-control"
                                   th:field="*{gstNumber}"
                                   pattern="[A-Za-z0-9]{15}"
                                   maxlength="15"
                                   minlength="15">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control"
                                   th:field="*{address}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control"
                                   th:field="*{phone}"
                                   pattern="[0-9]{10}"
                                   maxlength="10"
                                   minlength="10"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-update me-2">
                            Update Profile
                        </button>

                        <a th:href="@{/seller/dashboard}"
                           class="btn btn-back text-white">
                            Back </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    function loadNotificationCount(){

    fetch('/seller/notifications/unread-count')
    .then(res=>res.text())
    .then(count=>{

    const badge=document.getElementById('notificationCount');
    const num=parseInt(count);

    if(!isNaN(num)&&num>0){

    badge.classList.remove('d-none');
    badge.textContent=num;

    }else{

    badge.classList.add('d-none');

    }

    })
    .catch(err=>console.error("Notification error:",err));

    }

    loadNotificationCount();
    setInterval(loadNotificationCount,5000);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
