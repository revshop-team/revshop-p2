<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Order Confirmed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>

        body{
        background:#f4f6f9;
        font-family:Segoe UI;
        }

        .success-card{
        max-width:550px;
        margin:auto;
        margin-top:80px;
        border-radius:12px;
        }

        .success-icon{
        font-size:70px;
        color:#22c55e;
        }

        .order-id{
        font-size:20px;
        font-weight:600;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card shadow success-card text-center p-4">

        <div class="success-icon">
            ✔
        </div>

        <h2 class="mt-3 text-success">
            Order Placed Successfully
        </h2>

        <p class="order-id mt-3">
            Order ID : <span th:text="${order.orderId}"></span>
        </p>

        <p class="text-muted">
            Thank you for your purchase.
            Your order will be delivered soon.
        </p>

        <hr>

        <p>
            <b>Total Amount:</b> ₹
            <span th:text="${order.totalAmount}"></span>
        </p>

        <p>
            <b>Payment Method:</b>
            <span th:text="${payment.paymentMethod}"></span>
        </p>

        <div class="mt-4">

            <a th:href="@{/buyer/orders}" class="btn btn-success me-2">
                View Orders
            </a>

            <a th:href="@{/buyer/products}" class="btn btn-outline-secondary">
                Continue Shopping
            </a>

        </div>

        <p class="text-muted mt-4">
            Redirecting to orders page in <b><span id="count">5</span></b> seconds...
        </p>

    </div>

</div>

<script>

    document.addEventListener("DOMContentLoaded", function(){

        // 🎉 Confetti animation
        confetti({
            particleCount: 200,
            spread: 100,
            origin: { y: 0.6 }
        });

        // Countdown timer
        let seconds = 5;
        const counter = document.getElementById("count");

        const timer = setInterval(function(){

            seconds--;

            counter.innerText = seconds;

            if(seconds <= 0){

                clearInterval(timer);

                window.location.href = "/buyer/orders";

            }

        },1000);

    });

</script>

</body>
</html>
