<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | My Orders</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand mb-0 h5">RevShop</span>
    <a th:href="@{/buyer/products}" class="btn btn-outline-light btn-sm">
        Continue Shopping
    </a>
</nav>

<div class="container py-5">

    <h3 class="fw-bold mb-4">My Orders</h3>

    <!-- No Orders -->
    <div th:if="${orders == null || #lists.isEmpty(orders)}"
         class="alert alert-info rounded-4">
        You haven’t placed any orders yet.
    </div>

    <!-- Orders Loop -->
    <div th:each="order : ${orders}"
         class="card mb-4 shadow-sm rounded-4">

        <div class="card-body">

            <!-- Header -->
            <div class="d-flex justify-content-between mb-3">
                <div>
                    <strong>Order ID:</strong>
                    <span th:text="${order.orderId}"></span>
                </div>

                <div>
                    <span class="badge bg-primary"
                          th:text="${order.status}"></span>
                </div>
            </div>

            <div class="mb-3">
                <strong>Order Date:</strong>
                <span th:text="${order.orderDate}"></span>
            </div>

            <hr>

            <!-- Order Items -->
            <div th:if="${order.orderItems != null}">
                <div th:each="item : ${order.orderItems}"
                     class="row align-items-center mb-3">

                    <div class="col-md-6">
                        <strong th:text="${item.product != null ? item.product.productName : 'Product'}"></strong>
                    </div>

                    <div class="col-md-2 text-center">
                        ₹ <span th:text="${item.price}"></span>
                    </div>

                    <div class="col-md-2 text-center">
                        Qty:
                        <span th:text="${item.quantity}"></span>
                    </div>

                    <div class="col-md-2 text-end fw-bold">
                        ₹
                        <span th:text="${item.price * item.quantity}"></span>
                    </div>

                </div>
            </div>

            <hr>

            <!-- Total -->
            <div class="d-flex justify-content-end fw-bold fs-5">
                Total: ₹
                <span th:text="${order.totalAmount}"></span>
            </div>

        </div>
    </div>

</div>

</body>
</html>
