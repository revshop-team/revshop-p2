<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Payment Cancelled</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6f9;
        }

        .cancel-card{
        max-width:600px;
        margin:auto;
        margin-top:100px;
        }

        .cancel-icon{
        font-size:70px;
        color:#dc3545;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card shadow cancel-card text-center p-5">

        <div class="cancel-icon">
            ✖
        </div>

        <h2 class="mt-3 text-danger">
            Payment Cancelled
        </h2>

        <p class="text-muted">
            You cancelled the payment. Your order was not placed.
        </p>

        <div class="mt-4">

            <a th:href="@{/buyer/products}" class="btn btn-primary me-2">
                Continue Shopping
            </a>

            <a th:href="@{/buyer/orders}" class="btn btn-outline-secondary">
                My Orders
            </a>

        </div>

    </div>

</div>

</body>
</html>
