<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Checkout</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-4">Shipping Details</h4>



                    <form th:action="@{/buyer/cart/checkout}" method="post">

                        <div class="mb-3">
                            <input type="text" name="fullName" class="form-control" placeholder="Full Name" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="phone" class="form-control" placeholder="Phone" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="addressLine1" class="form-control" placeholder="Address Line 1" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="addressLine2" class="form-control" placeholder="Address Line 2">
                        </div>

                        <div class="mb-3">
                            <input type="text" name="city" class="form-control" placeholder="City" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="state" class="form-control" placeholder="State" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" name="pincode" class="form-control" placeholder="Pincode" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Payment Method</label>
                            <select class="form-select" name="paymentMethod" required>
                                <option value="">Select Payment Method</option>
                                <option value="COD">Cash On Delivery</option>
                                <option value="UPI">UPI</option>
                                <option value="CARD">Credit / Debit Card</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Place Order
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
