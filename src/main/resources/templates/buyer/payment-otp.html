<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>OTP Verification | RevShop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6f9;
        font-family:Segoe UI;
        }

        .otp-card{
        max-width:420px;
        margin:auto;
        margin-top:120px;
        border-radius:12px;
        }

        .otp-icon{
        font-size:60px;
        color:#0d6efd;
        }

        .otp-container{
        display:flex;
        justify-content:center;
        gap:10px;
        margin-bottom:20px;
        }

        .otp-box{
        width:45px;
        height:55px;
        text-align:center;
        font-size:22px;
        border-radius:8px;
        border:1px solid #ced4da;
        }

        .otp-box:focus{
        outline:none;
        border-color:#0d6efd;
        box-shadow:0 0 4px rgba(13,110,253,0.5);
        }

        .timer{
        font-size:13px;
        color:#6b7280;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card shadow otp-card text-center p-4">

        <div class="otp-icon mb-3">
            🔐
        </div>

        <h4>OTP Verification</h4>

        <p class="text-muted">
            Enter the 6-digit OTP sent to mobile number ending with <b>**72</b>
        </p>

        <div class="otp-container">

            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">
            <input class="otp-box" maxlength="1">

        </div>

        <button id="verifyBtn"
                class="btn btn-success w-100"
                onclick="verifyOTP()"
                disabled>
            Verify & Complete Payment </button>

        <p class="timer mt-3">
            OTP expires in <span id="time">30</span> seconds
        </p>

        <p class="text-muted mt-2">
            Demo OTP: <b>123456</b>
        </p>

        <button class="btn btn-link"
                onclick="resendOTP()">
            Resend OTP </button>

    </div>

</div>

<script th:inline="javascript">

    const orderId = [[${orderId}]];

    const inputs = document.querySelectorAll(".otp-box");
    const verifyBtn = document.getElementById("verifyBtn");

    /* AUTO MOVE INPUT */

    inputs.forEach((input,index)=>{

    input.addEventListener("input",function(){

    if(this.value.length===1 && index<5){
    inputs[index+1].focus();
    }

    checkOTP();

    });

    input.addEventListener("keydown",function(e){

    if(e.key==="Backspace" && !this.value && index>0){
    inputs[index-1].focus();
    }

    });

    });

    /* CHECK OTP */

    function checkOTP(){

    let otp="";

    inputs.forEach(i=>otp+=i.value);

    if(otp.length===6){
    verifyBtn.disabled=false;
    }else{
    verifyBtn.disabled=true;
    }

    }

    /* VERIFY OTP */

    function verifyOTP(){

    let otp="";

    inputs.forEach(i=>otp+=i.value);

    if(otp!=="123456"){
    alert("Invalid OTP");
    return;
    }

    document.querySelector(".otp-card").style.display="none";

    setTimeout(function(){

    window.location="/buyer/payment/process?orderId="+orderId+"&status=success";

    },1500);

    }

    /* TIMER */

    let time=30;
    let timerInterval;

    function startTimer(){

    timerInterval=setInterval(function(){

    if(time<=0){
    document.getElementById("time").innerText="Expired";
    clearInterval(timerInterval);
    return;
    }

    document.getElementById("time").innerText=time;
    time--;

    },1000);

    }

    startTimer();

    /* RESEND OTP */

    function resendOTP(){

    alert("New OTP sent (Demo OTP remains 123456)");

    clearInterval(timerInterval);

    time=30;

    document.getElementById("time").innerText=time;

    startTimer();

    }

</script>

</body>
</html>
