<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Checkout</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
        font-family:'Poppins',sans-serif;
        background:linear-gradient(135deg,#0A192F,#132a4d,#1b355d);
        background-size:300% 300%;
        animation:bgMove 14s ease infinite;
        min-height:100vh;
        color:white;
        overflow-x:hidden;
        }

        @keyframes bgMove{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
        }

        /* TITLE */

        .page-title{
        font-weight:700;
        font-size:30px;
        letter-spacing:.5px;
        color:#D4AF37;
        animation:titleFloat 4s ease-in-out infinite alternate;
        }

        @keyframes titleFloat{
        0%{transform:translateY(0)}
        100%{transform:translateY(-5px)}
        }

        /* CARDS */

        .checkout-card,
        .order-summary{
        border:none;
        border-radius:20px;
        background:linear-gradient(145deg,#ffffff,#f6f7fb);
        color:#0A192F;
        box-shadow:0 18px 40px rgba(0,0,0,.35);
        transition:.45s ease;
        animation:slideUp 1s ease forwards, floatItem 5s ease-in-out infinite;
        opacity:0;
        }

        .order-summary{
        position:sticky;
        top:30px;
        animation-delay:.2s;
        }

        .checkout-card:hover,
        .order-summary:hover{
        transform:translateY(-10px) scale(1.02);
        box-shadow:0 30px 70px rgba(0,0,0,.5);
        }

        @keyframes slideUp{
        0%{transform:translateY(60px);opacity:0;}
        100%{transform:translateY(0);opacity:1;}
        }

        @keyframes floatItem{
        0%,100%{transform:translateY(0);}
        50%{transform:translateY(-6px);}
        }

        /* HEADINGS */

        .checkout-card h5,
        .order-summary h5{
        font-weight:600;
        font-size:20px;
        letter-spacing:.3px;
        }

        /* INPUTS */

        .form-control,
        .form-select{
        border-radius:12px;
        padding:12px 16px;
        transition:all .3s ease;
        border:1px solid #dce1e6;
        font-size:14px;
        }

        .form-control:hover,
        .form-select:hover{
        border-color:#D4AF37;
        }

        .form-control:focus,
        .form-select:focus{
        border-color:#D4AF37;
        box-shadow:0 0 0 3px rgba(212,175,55,.25);
        transform:scale(1.02);
        }

        /* SUMMARY ROWS */

        .summary-row{
        display:flex;
        justify-content:space-between;
        margin-bottom:12px;
        font-size:15px;
        padding:6px 4px;
        border-radius:6px;
        transition:.25s ease;
        }

        .summary-row:hover{
        background:#f2f4f8;
        padding-left:10px;
        }

        .summary-total{
        font-weight:700;
        font-size:18px;
        color:#0A192F;
        }

        /* BUTTON */

        .btn-place{
        background:#D4AF37 !important;
        border:2px solid transparent !important;
        color:#0A192F !important;
        font-weight:600;
        border-radius:12px;
        padding:12px;
        transition:all .35s ease !important;
        letter-spacing:.3px;
        }

        .btn-place:hover{
        background:#0A192F !important;
        border-color:#0A192F !important;
        color:#D4AF37 !important;
        transform:translateY(-3px) scale(1.03);
        box-shadow:0 10px 25px rgba(10,25,47,.4) !important;
        }

        .secure-note{
        font-size:13px;
        color:#6c757d;
        text-align:center;
        margin-top:10px;
        }

        .secure-note i{
        font-size:14px;
        }

    </style>
</head>

<body>

<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <h3 class="page-title mb-4">Secure Checkout</h3>

    <div class="row g-5">

        <div class="col-lg-7">

            <div class="card checkout-card p-4">

                <h5 class="mb-4 fw-bold">Shipping Details</h5>

                <form th:action="@{/buyer/cart/checkout}" method="post">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <input type="text" name="fullName" class="form-control" placeholder="Full Name" required>
                        </div>

                        <div class="col-md-6">
                            <input type="text" name="phone" class="form-control" placeholder="Phone Number" required>
                        </div>

                        <div class="col-12">
                            <input type="text" name="addressLine1" class="form-control" placeholder="Address Line 1" required>
                        </div>

                        <div class="col-12">
                            <input type="text" name="addressLine2" class="form-control" placeholder="Address Line 2 (Optional)">
                        </div>

                        <div class="col-md-4">
                            <input type="text" name="city" class="form-control" placeholder="City" required>
                        </div>

                        <div class="col-md-4">
                            <input type="text" name="state" class="form-control" placeholder="State" required>
                        </div>

                        <div class="col-md-4">
                            <input type="text" name="pincode" class="form-control" placeholder="Pincode" required>
                        </div>

                    </div>

                    <hr class="my-4">

                    <label class="form-label fw-semibold">Payment Method</label>

                    <select class="form-select mb-4" name="paymentMethod" required>
                        <option value="" hidden>Select Payment Method</option>
                        <option value="COD">Cash On Delivery</option>
                        <option value="UPI">UPI</option>
                        <option value="CARD">Credit / Debit Card</option>
                    </select>

                    <button type="submit" class="btn btn-place w-100 mt-2">
                        <i class="bi bi-lock-fill me-2"></i>Place Order Securely
                    </button>

                </form>

            </div>

        </div>

        <div class="col-lg-5">

            <div class="order-summary p-4">

                <h5 class="fw-bold mb-4">Order Summary</h5>

                <div th:if="${cart != null && !#lists.isEmpty(cart.cartItems)}">

                    <div class="summary-row">
                        <span>Items</span>
                        <span th:text="${#lists.size(cart.cartItems)}"></span>
                    </div>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>₹ <span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}"></span></span>
                    </div>

                    <div class="summary-row">
                        <span>Shipping</span>
                        <span class="text-success fw-semibold">Free</span>
                    </div>

                    <hr>

                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span>₹ <span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}"></span></span>
                    </div>

                    <div class="mt-4 secure-note">
                        <i class="bi bi-shield-lock-fill text-success me-1"></i>
                        Payment information processed securely.
                    </div>

                </div>

                <div th:if="${cart == null || #lists.isEmpty(cart.cartItems)}" class="text-muted text-center py-4">
                    Your cart is empty.
                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
