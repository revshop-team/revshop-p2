<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | My Favourites</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div class="container py-5">

    <h3 class="fw-bold mb-4">My Favourite Products </h3>

    <!-- If empty -->
    <div th:if="${#lists.isEmpty(favourites)}"
         class="alert alert-info rounded-4">
        You don't have favourite products
    </div>

    <!-- Grid -->
    <div class="row g-4"
         th:if="${!#lists.isEmpty(favourites)}">

        <div class="col-md-4 col-lg-3"
             th:each="fav : ${favourites}">

            <div class="card shadow-sm h-100 position-relative">

                <!-- Remove Heart -->
                <form th:action="@{/buyer/favourite/toggle/{id}(id=${fav.product.productId})}"
                      method="post"
                      class="position-absolute top-0 end-0 m-2">

                    <input type="hidden" name="redirectTo" value="favourites"/>

                    <button type="submit"
                            class="btn btn-light rounded-circle shadow-sm p-2">

                        <i class="bi bi-heart-fill text-danger"></i>

                    </button>
                </form>

                <img src="https://via.placeholder.com/300x200"
                     class="card-img-top"
                     alt="Product">

                <div class="card-body d-flex flex-column">

                    <h6 class="fw-semibold"
                        th:text="${fav.product.productName}"></h6>

                    <p class="text-muted small"
                       th:text="${fav.product.description}"></p>

                    <div class="mb-2">
                        <span class="fw-bold text-success">
                            ₹ <span th:text="${fav.product.sellingPrice}"></span>
                        </span>
                    </div>

                    <div class="mt-auto">
                        <a th:href="@{/buyer/product/{id}(id=${fav.product.productId})}"
                           class="btn btn-outline-primary btn-sm w-100 mb-2">
                            View Details
                        </a>

                        <a th:href="@{/buyer/cart/add/{id}(id=${fav.product.productId})}"
                           class="btn btn-success btn-sm w-100">
                            Add to Cart
                        </a>
                    </div>

                </div>

            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
