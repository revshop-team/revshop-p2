<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password | RevShop</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height:100vh;">

<div class="card shadow p-4" style="width:420px;">

    <h4 class="text-center mb-4">Reset Password</h4>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- STEP 1 : ENTER EMAIL -->
    <div th:if="${showResetForm == null}">
        <form th:action="@{/verify-email}" method="post">

            <div class="mb-3">
                <label class="form-label">Enter Registered Email</label>
                <input type="email" name="email"
                       class="form-control"
                       required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Next
                </button>
            </div>

        </form>
    </div>

    <!-- STEP 2 : SHOW QUESTION -->
    <div th:if="${showResetForm}">

        <form th:action="@{/reset-password}" method="post">

            <input type="hidden" name="email" th:value="${email}" />

            <div class="mb-3">
                <label class="form-label">Security Question</label>
                <input type="text"
                       class="form-control"
                       th:value="${question}"
                       readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Your Answer</label>
                <input type="text"
                       name="securityAnswer"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password"
                       name="newPassword"
                       class="form-control"
                       required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success">
                    Change Password
                </button>
            </div>

        </form>

    </div>

    <div class="text-center mt-3">
        <a th:href="@{/login}" class="text-decoration-none">
            Back to Login
        </a>
    </div>

</div>

</body>
</html>
