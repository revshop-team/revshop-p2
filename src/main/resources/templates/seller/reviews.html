<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Reviews | RevShop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
        background:#f5f6f8;
        font-family:'Segoe UI',sans-serif;
        }

        /* product card */

        .product-card{
        border:none;
        border-radius:16px;
        padding:10px;
        transition:.25s;
        }

        .product-card:hover{
        box-shadow:0 12px 30px rgba(0,0,0,0.08);
        }

        /* review box */

        .review-box{
        background:#ffffff;
        border-radius:14px;
        padding:18px;
        border:1px solid #ececec;
        transition:.2s;
        }

        .review-box:hover{
        transform:translateY(-3px);
        box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        /* rating badge */

        .avg-badge{
        font-size:16px;
        padding:10px 20px;
        border-radius:25px;
        background:#ffc107;
        color:#212529;
        font-weight:700;
        }

        /* stars */

        .star{
        font-size:18px;
        color:#ffc107;
        }

        .star-muted{
        color:#e4e4e4;
        }

        /* review comment */

        .review-comment{
        font-size:15px;
        font-style:italic;
        color:#444;
        }

        /* warning */

        .low-rating{
        background:#fff3cd;
        border-left:4px solid #ffc107;
        padding:10px 14px;
        border-radius:10px;
        font-size:14px;
        margin-top:8px;
        }

        /* product image */

        .product-img{
        width:60px;
        height:60px;
        border-radius:10px;
        object-fit:cover;
        border:1px solid #ddd;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#sellerNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="sellerNavbar">

        <div class="ms-auto d-flex align-items-center gap-4">

            <!-- notifications -->

            <a th:href="@{/seller/notifications}"
               class="position-relative text-light text-decoration-none">

                <i class="bi bi-bell fs-5"></i>

                <span id="notificationCount"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
0
</span>

            </a>

            <!-- account -->

            <div class="dropdown">

                <button class="btn btn-outline-light btn-sm dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown">

                    <i class="bi bi-person-circle me-1"></i>
                    <span th:text="${businessName}">Business Name</span>

                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow">

                    <li>
                        <a class="dropdown-item" th:href="@{/seller/profile}">
                            <i class="bi bi-person me-2"></i>
                            Profile
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item text-danger" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </div>

</nav>

<!-- PAGE CONTENT -->

<div class="container mt-5">

    <h3 class="fw-bold mb-4">⭐ Product Reviews & Ratings</h3>

    <!-- empty -->

    <div th:if="${productReviewsMap == null || #maps.isEmpty(productReviewsMap)}"
         class="alert alert-info text-center rounded-3 shadow-sm">

        No reviews received for your products yet.

    </div>

    <!-- product reviews -->

    <div th:each="entry : ${productReviewsMap}"
         class="card product-card shadow-sm mb-4">

        <div class="card-body">

            <!-- product header -->

            <div class="d-flex justify-content-between align-items-center">

                <div class="d-flex align-items-center gap-3">

                    <img th:src="@{/images/{img}(img=${entry.key.imageName})}"
                         class="product-img">

                    <div>

                        <h4 class="fw-bold mb-1 text-capitalize"
                            th:text="${entry.key.productName}">
                            Product Name
                        </h4>

                        <small class="text-muted">
                            Total Reviews:
                            <span th:text="${reviewCountMap[entry.key.productId]}"></span>
                        </small>

                        <div th:if="${avgRatingMap[entry.key.productId] != null
and avgRatingMap[entry.key.productId] < 3}"
                             class="low-rating">

                            ⚠ Low customer satisfaction for this product

                        </div>

                    </div>

                </div>

                <span class="avg-badge shadow-sm">

⭐
<span th:text="${#numbers.formatDecimal(avgRatingMap[entry.key.productId],1,1)}"></span>
/ 5

</span>

            </div>

            <hr/>

            <!-- reviews -->

            <div th:each="review, stat : ${entry.value}"
                 th:if="${stat.index < 2}"
                 class="review-box mb-3">

                <!-- rating -->

                <div class="mb-2">

<span th:each="i : ${#numbers.sequence(1,5)}">

<span th:text="${i <= review.rating ? '★' : '☆'}"
      th:class="${i <= review.rating} ? 'star' : 'star star-muted'"></span>

</span>

                    <span class="ms-2 fw-semibold"
                          th:text="${review.rating} + ' / 5'"></span>

                </div>

                <!-- buyer -->

                <div class="text-muted mb-1">

                    <i class="bi bi-person-circle me-1 text-secondary"></i>

                    Buyer:

                    <span class="fw-semibold"
                          th:text="${review.buyer.buyerDetails != null ?
review.buyer.buyerDetails.fullName :
review.buyer.email}">
Buyer Name
</span>

                    <span class="badge bg-success ms-2">
Verified Purchase
</span>

                </div>

                <!-- comment -->

                <div class="review-comment mb-2"
                     th:text="${review.reviewComment}">
                    Review comment
                </div>

                <!-- date -->

                <small class="text-secondary">

                    Reviewed on:
                    <span th:text="${#temporals.format(review.reviewDate,'dd MMM yyyy')}"></span>

                </small>

            </div>

            <!-- view all -->

            <div th:if="${entry.value.size() > 2}" class="text-end">

                <a th:href="@{/seller/reviews/product/{id}(id=${entry.key.productId})}"
                   class="btn btn-sm btn-outline-primary">

                    View All Reviews

                </a>

            </div>

        </div>

    </div>

</div>

<!-- notifications -->

<script>

    function loadNotificationCount(){

    fetch('/seller/notifications/unread-count')
    .then(res=>res.text())
    .then(count=>{

    const badge=document.getElementById('notificationCount');
    const num=parseInt(count);

    if(!isNaN(num)&&num>0){
    badge.classList.remove('d-none');
    badge.textContent=num;
    }else{
    badge.classList.add('d-none');
    }

    })
    .catch(err=>console.error(err));

    }

    loadNotificationCount();
    setInterval(loadNotificationCount,5000);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
