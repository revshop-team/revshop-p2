<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low Stock Alerts | RevShop</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .alert-card {
            border-left: 5px solid #dc3545;
            border-radius: 10px;
            transition: 0.2s;
        }

        .alert-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }

        .stock-badge {
            font-size: 14px;
        }

        .product-img {
            max-height: 100px;
            object-fit: contain;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#sellerNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="sellerNavbar">
        <div class="ms-auto d-flex align-items-center gap-4">

            <!-- Notifications -->
            <a th:href="@{/seller/notifications}"
               class="position-relative text-light text-decoration-none">
                <i class="bi bi-bell fs-5"></i>

                <span id="notificationCount"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
          0
        </span>
            </a>

            <!-- Account Dropdown -->
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    <span th:text="${businessName}">Business Name</span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li>
                        <a class="dropdown-item" th:href="@{/seller/profile}">
                            <i class="bi bi-person me-2"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item text-danger" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5">

    <!-- PAGE TITLE -->
    <h3 class="fw-bold text-danger mb-4">
        ⚠ Low Stock Alerts
    </h3>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(lowStockProducts)}"
         class="alert alert-success text-center">
        All products are well stocked 🎉
    </div>

    <!-- PRODUCT LIST -->
    <div class="row g-4" th:if="${!#lists.isEmpty(lowStockProducts)}">

        <!-- PRODUCT CARD -->
        <div class="col-md-6 col-lg-4"
             th:each="product : ${lowStockProducts}">

            <div class="card alert-card shadow-sm h-100">

                <div class="card-body">

                    <div class="row align-items-center">

                        <!-- PRODUCT IMAGE -->
                        <div class="col-4 text-center">

                            <img th:src="@{/images/{img}(img=${product.imageName})}"
                                 onerror="this.src='/images/default.jpg'"
                                 alt="Product Image"
                                 class="img-fluid rounded product-img">

                        </div>

                        <!-- PRODUCT DETAILS -->
                        <div class="col-8">

                            <h5 class="fw-bold"
                                th:text="${product.productName}">
                            </h5>

                            <p class="text-muted mb-2">
                                Category:
                                <span th:text="${product.category.categoryName}"></span>
                            </p>

                            <p>
                                Stock:
                                <span class="badge bg-danger stock-badge"
                                      th:text="${product.stock}">
                        </span>
                            </p>

                            <p>
                                Threshold:
                                <span class="badge bg-secondary stock-badge"
                                      th:text="${product.stockThreshold}">
                        </span>
                            </p>

                            <a th:href="@{/seller/edit-product/{id}(id=${product.productId})}"
                               class="btn btn-outline-primary w-100">
                                Restock / Edit Product
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
