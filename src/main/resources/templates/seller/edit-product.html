<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">


<nav th:fragment="sellerNavbar"
     class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <div class="ms-auto d-flex align-items-center gap-4">

        <a th:href="@{/seller/notifications}"
           class="position-relative text-light"
           title="Order Notifications">
            <i class="bi bi-bell fs-5"></i>

            <span id="notificationCount"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                0
            </span>
        </a>

        <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle"
                    type="button"
                    data-bs-toggle="dropdown">
                <i class="bi bi-person-circle me-1"></i>
                My Account
            </button>

            <ul class="dropdown-menu dropdown-menu-end shadow">
                <li>
                    <a class="dropdown-item" th:href="@{/seller/profile}">
                        <i class="bi bi-person me-2"></i>
                        Profile
                    </a>
                </li>
                <li>
                    <a class="dropdown-item text-danger" th:href="@{/logout}">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        Logout
                    </a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<!---->
<div class="container mt-5">
    <h3>Edit Product</h3>
    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show mt-3">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!--  ERROR MESSAGE -->
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show mt-3">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <form th:action="@{'/seller/update/' + ${product.productId}}" th:object="${product}" method="post">
        <div class="mb-3">
            <label>Product Name</label>
            <input type="text" th:field="*{productName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Manufacturer</label>
            <input type="text" th:field="*{manufacturer}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea th:field="*{description}" class="form-control" required></textarea>
        </div>

        <div class="mb-3">
            <label>MRP</label>
            <input type="number" step="0.01" id="mrp" th:field="*{mrp}" class="form-control" required oninput="updateSellingPrice()">
        </div>

        <div class="mb-3">
            <label>Discount (%)</label>
            <input type="number"
                   step="0.01"
                   id="discount"
                   th:field="*{discount}"
                   class="form-control"
                   oninput="updateSellingPrice()">
        </div>

        <div class="mb-3">
            <label>Selling Price</label>
            <input type="number" step="0.01" id="sellingPrice" th:field="*{sellingPrice}" class="form-control" readonly>
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input type="number" th:field="*{stock}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Threshold</label>
            <input type="number" th:field="*{stockThreshold}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Update</button>
        <a th:href="@{/seller/my-products}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script>
    function updateSellingPrice() {
        const mrp = parseFloat(document.getElementById('mrp').value) || 0;
        const discount = parseFloat(document.getElementById('discount').value) || 0;
        document.getElementById('sellingPrice').value = (mrp - (mrp * discount / 100)).toFixed(2);
    }

    window.onload = updateSellingPrice;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
