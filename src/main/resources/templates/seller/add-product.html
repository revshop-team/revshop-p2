<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h3>Add Product</h3>

<form th:action="@{/seller/save-product}"
      th:object="${product}"
      method="post">

    <div class="mb-3">
        <label>Product Name</label>
        <input type="text" th:field="*{productName}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea th:field="*{description}" class="form-control"></textarea>
    </div>

    <div class="mb-3">
        <label>Manufacturer</label>
        <input type="text" th:field="*{manufacturer}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>MRP</label>
        <input type="number" step="0.01" th:field="*{mrp}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Selling Price</label>
        <input type="number" step="0.01" th:field="*{sellingPrice}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Stock</label>
        <input type="number" th:field="*{stock}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Stock Threshold</label>
        <input type="number" th:field="*{stockThreshold}" class="form-control">
    </div>

    <!-- Category Dropdown -->
    <div class="mb-3">
        <label>Category</label>
        <select th:field="*{category}" class="form-select">
            <option value="">Select Category</option>
            <option th:each="c : ${categories}"
                    th:value="${c.categoryId}"
                    th:text="${c.categoryName}">
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label>Or Add New Category</label>
        <input type="text"
               name="newCategoryName"
               class="form-control"
               placeholder="Enter new category (optional)">
    </div>

    <button type="submit" class="btn btn-success">Save Product</button>

</form>

</body>
</html>
