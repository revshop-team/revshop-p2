<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | RevShop</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        .register-card {
            border-radius: 15px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-lg register-card">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4 text-primary">
                        Create Your Account
                    </h3>
                    <div th:if="${error}" class="alert alert-danger text-center">
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/register-user}"
                          th:object="${user}"
                          method="post">

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   placeholder="Enter your email"
                                   required>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   placeholder="Enter your password"
                                   required>
                        </div>

                        <!-- Security Question -->
                        <!-- Security Question -->
                        <div class="mb-3">
                            <label class="form-label">Security Question</label>
                            <select class="form-select"
                                    th:field="*{securityQuestion}"
                                    required>

                                <option value="">Select Question</option>

                                <option th:each="q : ${questions}"
                                        th:value="${q.questionId}"
                                        th:text="${q.questionText}">
                                </option>

                            </select>
                        </div>

                        <!-- Security Answer -->
                        <div class="mb-3">
                            <label class="form-label">Security Answer</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{securityAnswer}"
                                   placeholder="Your answer"
                                   required>
                        </div>

                        <!-- Role -->
                        <div class="mb-4">
                            <label class="form-label">Register As</label>
                            <select class="form-select"
                                    th:field="*{role}"
                                    required>
                                <option value="">Select Role</option>
                                <option value="BUYER">Buyer</option>
                                <option value="SELLER">Seller</option>
                            </select>
                        </div>

                        <!-- Button -->
                        <div class="d-grid">
                            <button type="submit"
                                    class="btn btn-primary btn-lg">
                                Register
                            </button>
                        </div>

                    </form>

                    <div class="text-center mt-3">
                        Already have an account?
                        <a th:href="@{/login}" class="text-decoration-none fw-semibold">
                            Login
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
