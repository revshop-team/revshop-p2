
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>RevShop | My Favourites</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #0A192F, #132d55);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .page-title {
            color: white;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .product-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            background: white;
            box-shadow: 0 15px 45px rgba(0,0,0,.2);
            transition: all .35s;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 60px rgba(0,0,0,.25);
        }

        .product-card img {
            height: 200px;
            width: 100%;
            object-fit: cover;
            border-bottom: 1px solid #f1f5f9;
        }

        .heart-btn {
            border: none;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,.2);
            transition: all .3s;
        }

        .heart-btn:hover {
            transform: scale(1.15);
            background: #ffffff;
        }

        .price {
            font-weight: 700;
            color: #0A192F;
            font-size: 1.15rem;
        }

        /* BUTTONS */
        .btn-cart {
            background: linear-gradient(135deg, #D4AF37, #e6c557);
            border: none;
            color: #0A192F;
            font-weight: 600;
            transition: .35s;
        }

        .btn-cart:hover {
            background: linear-gradient(135deg, #e6c557, #ffd95e);
            transform: scale(1.06);
            box-shadow: 0 10px 25px rgba(0,0,0,.35);
        }

        .btn-details {
            border: 1px solid #0A192F;
            color: #0A192F;
            background: white;
            transition: all .35s ease;
        }

        .btn-details:hover {
            background-color: #0d6efd !important;
            border-color: #0d6efd !important;
            color: white !important;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(13, 110, 253, .4) !important;
        }

        .empty-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            color: #0A192F;
        }

        /* TOAST POPUP */
        .action-toast {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-40px);
            background: #198754;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
        }

        .action-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

    </style>

</head>

<body>

<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<div id="actionToast" class="action-toast">
    <i id="toastIcon" class="bi bi-check-circle-fill fs-5"></i>
    <span id="toastText">Action Successful</span>
</div>

<div class="container py-5">

    <h3 class="page-title"><i class="bi bi-heart-fill text-danger me-2"></i>My Favourite Products</h3>

    <div th:if="${#lists.isEmpty(favourites)}" class="empty-box mx-auto mt-5" style="max-width: 600px;">
        <i class="bi bi-heartbreak text-muted mb-3 d-block" style="font-size: 4rem; opacity: 0.5;"></i>
        <h4 class="mt-3 fw-bold">No favourite products yet</h4>
        <p class="text-muted mb-4">Start exploring and save the products you love.</p>
        <a th:href="@{/buyer/products}" class="btn px-4 py-2" style="background: #D4AF37; color: #0A192F; font-weight: 600; border-radius: 30px;">
            Explore Products
        </a>
    </div>

    <div class="row g-4" th:if="${!#lists.isEmpty(favourites)}">

        <div class="col-md-4 col-lg-3" th:each="fav : ${favourites}">

            <div class="card product-card h-100 position-relative">

                <form th:action="@{/buyer/favourite/toggle/{id}(id=${fav.product.productId})}" method="post" class="position-absolute top-0 end-0 m-3" style="z-index: 10;">
                    <input type="hidden" name="redirectTo" value="favourites"/>
                    <button type="submit" class="heart-btn" title="Remove from Favourites">
                        <i class="bi bi-heart-fill text-danger fs-5"></i>
                    </button>
                </form>

                <img th:src="@{/images/{img}(img=${fav.product.imageName})}" class="card-img-top" alt="Product Image">

                <div class="card-body d-flex flex-column p-4">

                    <h6 class="fw-bold mb-2 text-truncate" th:text="${fav.product.productName}"></h6>

                    <p class="text-muted small mb-3 text-truncate" th:text="${fav.product.description}"></p>

                    <div class="price mb-4">
                        ₹ <span th:text="${fav.product.sellingPrice}"></span>
                    </div>

                    <div class="mt-auto d-flex flex-column gap-2">

                        <a th:href="@{/buyer/product/{id}(id=${fav.product.productId})}" class="btn btn-details btn-sm w-100 py-2">
                            View Details
                        </a>

                        <a th:href="@{/buyer/cart/add/{id}(id=${fav.product.productId})}" class="btn btn-cart addCartBtn btn-sm w-100 py-2">
                            <i class="bi bi-cart-plus me-1"></i> Add to Cart
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
    // Show toast notification
    function showToast(message, bgColor, iconClass) {
        const toast = document.getElementById("actionToast");
        const toastText = document.getElementById("toastText");
        const toastIcon = document.getElementById("toastIcon");

        toastText.innerText = message;
        toast.style.background = bgColor;
        toastIcon.className = "bi fs-5 " + iconClass;

        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 1500);
    }

    // Add to Cart Logic with Toast
    document.querySelectorAll(".addCartBtn").forEach(btn => {
        btn.addEventListener("click", function(e) {
            e.preventDefault();
            const targetUrl = this.getAttribute("href");

            // Show green popup for cart
            showToast("Added to Cart Successfully", "#198754", "bi-check-circle-fill");

            // Redirect after delay
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1500);
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
