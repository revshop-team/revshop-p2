<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Checkout</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="mb-4">Shipping Details</h4>

                    <form th:action="@{/buyer/cart/checkout}" method="post">

                        <input type="text" name="fullName" class="form-control mb-3" placeholder="Full Name" required>
                        <input type="text" name="phone" class="form-control mb-3" placeholder="Phone" required>
                        <input type="text" name="addressLine1" class="form-control mb-3" placeholder="Address Line 1" required>
                        <input type="text" name="addressLine2" class="form-control mb-3" placeholder="Address Line 2">
                        <input type="text" name="city" class="form-control mb-3" placeholder="City" required>
                        <input type="text" name="state" class="form-control mb-3" placeholder="State" required>
                        <input type="text" name="pincode" class="form-control mb-4" placeholder="Pincode" required>

                        <button type="submit" class="btn btn-success w-100">
                            Place Order
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
