<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | RevShop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        /* BACKGROUND */

        body{
        min-height:100vh;
        margin:0;
        display:flex;
        align-items:center;
        justify-content:center;
        background:radial-gradient(circle at 20% 20%,#0f172a,#020617 70%);
        font-family:'Inter',sans-serif;
        overflow:hidden;
        position:relative;
        color:white;
        }

        /* FLOATING ICONS */

        .icon{
        position:absolute;
        font-size:30px;
        color:rgba(250,204,21,0.15);
        animation:floatIcon 14s infinite linear;
        }

        .icon:nth-child(1){top:10%;left:10%;}
        .icon:nth-child(2){top:80%;left:15%;}
        .icon:nth-child(3){top:25%;left:80%;}
        .icon:nth-child(4){top:75%;left:75%;}
        .icon:nth-child(5){top:15%;left:60%;}
        .icon:nth-child(6){top:55%;left:40%;}

        @keyframes floatIcon{
        0%{transform:translateY(0) rotate(0deg);}
        50%{transform:translateY(-35px) rotate(180deg);}
        100%{transform:translateY(0) rotate(360deg);}
        }

        /* WRAPPER */

        .login-wrapper{
        width:340px;
        z-index:10;
        }

        /* GLASS CARD */

        .login-card{
        background:rgba(17,24,39,0.92);
        backdrop-filter:blur(14px);
        border-radius:20px;
        padding:35px 30px;
        box-shadow:
        0 25px 60px rgba(0,0,0,.7),
        0 0 25px rgba(250,204,21,.25);
        border:1px solid rgba(250,204,21,.25);
        animation:cardFloat 6s ease-in-out infinite;
        }

        /* CARD FLOAT */

        @keyframes cardFloat{
        0%{transform:translateY(0)}
        50%{transform:translateY(-6px)}
        100%{transform:translateY(0)}
        }

        /* BRAND */

        .brand{
        font-family:'Poppins',sans-serif;
        font-size:28px;
        font-weight:700;
        letter-spacing:2px;
        background:linear-gradient(90deg,#facc15,#f59e0b,#fbbf24);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        }

        .tagline{
        font-size:12px;
        letter-spacing:1px;
        color:#94a3b8;
        }

        /* INPUT GROUP */

        .input-group-text{
        background:#020617;
        border:1px solid #1e293b;
        color:#facc15;
        border-radius:8px 0 0 8px;
        }

        .form-control{
        background:#020617;
        border:1px solid #1e293b;
        border-radius:0 8px 8px 0;
        color:white;
        padding:8px 10px;
        font-size:13px;
        }

        .form-control:focus{
        background:#020617;
        border-color:#facc15;
        box-shadow:0 0 0 .15rem rgba(250,204,21,.25);
        color:white;
        }

        /* PASSWORD TOGGLE */

        .password-toggle{
        position:absolute;
        right:12px;
        top:50%;
        transform:translateY(-50%);
        cursor:pointer;
        color:#cbd5f5;
        }

        /* DIVIDER */

        .divider{
        height:1px;
        background:linear-gradient(to right,transparent,#facc15,transparent);
        margin:18px 0;
        }

        /* LOGIN BUTTON */

        .btn-login{
        background:linear-gradient(135deg,#facc15,#f59e0b);
        border:none;
        border-radius:8px;
        font-weight:600;
        font-family:'Poppins',sans-serif;
        font-size:13px;
        padding:9px;
        transition:.3s;
        color:#111827;
        }

        .btn-login:hover{
        transform:translateY(-2px);
        box-shadow:0 10px 25px rgba(250,204,21,.5);
        }

        /* LINKS */

        .login-links a{
        font-size:12px;
        color:#94a3b8;
        }

        .login-links a:hover{
        color:#facc15;
        }

    </style>

</head>

<body>

<!-- FLOATING BACKGROUND ICONS -->

<i class="bi bi-cart icon"></i> <i class="bi bi-bag icon"></i> <i class="bi bi-box-seam icon"></i> <i class="bi bi-tag icon"></i> <i class="bi bi-credit-card icon"></i> <i class="bi bi-truck icon"></i>

<div class="login-wrapper">

    <div class="login-card">

        <div class="text-center mb-4">
            <div class="brand">REVSHOP</div>
            <div class="tagline">Premium Shopping Experience</div>
        </div>

        <div th:if="${param.error}" class="alert alert-danger text-center p-2 small">
            Invalid username or password
        </div>

        <div th:if="${param.logout}" class="alert alert-success text-center p-2 small">
            You have been logged out
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Email Address" required>
                </div>
            </div>

            <div class="mb-3 position-relative">

                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                </div>

                <i class="bi bi-eye password-toggle" onclick="togglePassword()"></i>

            </div>

            <div class="divider"></div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-login">Login</button>
            </div>

        </form>

        <div class="text-center login-links">

            <div>
                <a th:href="@{/register}" class="text-decoration-none">Create Account</a>
            </div>

            <div class="mt-2">
                <a th:href="@{/forgot-password}" class="text-decoration-none">Forgot Password?</a>
            </div>

        </div>

    </div>
</div>

<script>

    function togglePassword(){

    const password=document.getElementById("password");
    const icon=document.querySelector(".password-toggle");

    if(password.type==="password"){
    password.type="text";
    icon.classList.remove("bi-eye");
    icon.classList.add("bi-eye-slash");
    }else{
    password.type="password";
    icon.classList.remove("bi-eye-slash");
    icon.classList.add("bi-eye");
    }

    }

</script>

</body>
</html>
