<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Products | RevShop</title>
  <meta charset="UTF-8">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (REQUIRED) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .product-img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #ddd;
    }
  </style>
</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

  <a class="navbar-brand fw-bold d-flex align-items-center"
     th:href="@{/seller/dashboard}">
    <i class="bi bi-shop me-2"></i>
    RevShop <span class="fw-light ms-1">Seller</span>
  </a>

  <button class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#sellerNavbar">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="sellerNavbar">
    <div class="ms-auto d-flex align-items-center gap-4">

      <!-- Notifications -->
      <a th:href="@{/seller/notifications}"
         class="position-relative text-light text-decoration-none">
        <i class="bi bi-bell fs-5"></i>

        <span id="notificationCount"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
          0
        </span>
      </a>

      <!-- Account Dropdown -->
      <div class="dropdown">
        <button class="btn btn-outline-light btn-sm dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown">
          <i class="bi bi-person-circle me-1"></i>
          <span th:text="${businessName}">Business Name</span>
        </button>

        <ul class="dropdown-menu dropdown-menu-end shadow">
          <li>
            <a class="dropdown-item" th:href="@{/seller/profile}">
              <i class="bi bi-person me-2"></i>
              Profile
            </a>
          </li>
          <li>
            <a class="dropdown-item text-danger" th:href="@{/logout}">
              <i class="bi bi-box-arrow-right me-2"></i>
              Logout
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>
</nav>

<!-- ================= PAGE CONTENT ================= -->
<div class="container mt-5">

  <div th:if="${successMessage}"
       class="alert alert-success alert-dismissible fade show text-center fw-semibold">
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:if="${errorMessage}"
       class="alert alert-danger alert-dismissible fade show text-center fw-semibold">
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <h3 class="fw-bold">My Products</h3>

  <table class="table table-bordered table-striped mt-3 align-middle">
    <thead class="table-dark">
    <tr>
      <th>Image</th>
      <th>Name</th>
      <th>Category</th>
      <th>Stock</th>
      <th>Threshold</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="product : ${products}">
      <td>
        <img th:src="${product.imageName != null}
                       ? @{/images/{img}(img=${product.imageName})}
                       : @{/images/default.png}"
             class="product-img"
             alt="Product Image"/>
      </td>

      <td class="fw-semibold" th:text="${product.productName}"></td>

      <td th:text="${product.category != null
                      ? product.category.categoryName
                      : 'N/A'}"></td>

      <td th:text="${product.stock}"></td>

      <td th:text="${product.stockThreshold}"></td>

      <td>
          <span th:if="${product.stock == 0}" class="badge bg-dark">
            Out of Stock
          </span>

        <span th:if="${product.stock > 0 and product.stock <= product.stockThreshold}"
              class="badge bg-danger">
            Low Stock
          </span>

        <span th:if="${product.stock > product.stockThreshold}"
              class="badge bg-success">
            In Stock
          </span>
      </td>

      <td>
        <a th:href="@{'/seller/edit-product/' + ${product.productId}}"
           class="btn btn-primary btn-sm">
          Edit
        </a>

        <button class="btn btn-danger btn-sm"
                th:onclick="'confirmDelete(' + ${product.productId} + ')'"
                type="button">
          Delete
        </button>
      </td>
    </tr>

    <tr th:if="${#lists.isEmpty(products)}">
      <td colspan="7" class="text-center text-muted">
        No products added yet.
      </td>
    </tr>

    </tbody>
  </table>
</div>

<!-- ================= DELETE CONFIRM ================= -->
<script>
  function confirmDelete(productId) {
      if (confirm("Do you want to delete this product?")) {
          window.location.href = '/seller/delete-product/' + productId;
      }
  }
</script>

<!-- ================= NOTIFICATION COUNT ================= -->
<script>
  function loadNotificationCount() {
      fetch('/seller/notifications/unread-count')
          .then(res => res.text())
          .then(count => {
              const badge = document.getElementById('notificationCount');
              const num = parseInt(count);

              if (!isNaN(num) && num > 0) {
                  badge.classList.remove('d-none');
                  badge.textContent = num;
              } else {
                  badge.classList.add('d-none');
              }
          })
          .catch(err => console.error("Notification error:", err));
  }

  loadNotificationCount();
  setInterval(loadNotificationCount, 5000);
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
