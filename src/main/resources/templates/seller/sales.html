<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sales Analytics | RevShop</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">
        RevShop - Seller Analytics
    </a>
</nav>

<div class="container mt-5">

    <h2 class="fw-bold text-center mb-5">📊 Advanced Sales Analytics</h2>

    <!-- KPI CARDS -->
    <div class="row text-center mb-4">

        <div class="col-md-3">
            <div class="card shadow-sm p-4">
                <h3 class="fw-bold" th:text="${totalOrders}">0</h3>
                <p class="text-muted mb-0">Total Orders</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-4">
                <h3 class="fw-bold text-warning" th:text="${pendingOrders}">0</h3>
                <p class="text-muted mb-0">Pending Orders</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-4">
                <h3 class="fw-bold text-success" th:text="${deliveredOrders}">0</h3>
                <p class="text-muted mb-0">Delivered Orders</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-4">
                <h3 class="fw-bold text-primary">
                    ₹ <span th:text="${#numbers.formatDecimal(totalRevenue,1,2)}">0.00</span>
                </h3>
                <p class="text-muted mb-0">Total Revenue</p>
            </div>
        </div>

    </div>

    <!-- ADVANCED INSIGHTS -->
    <div class="row mb-4">

        <div class="col-md-6">
            <div class="card shadow-sm p-4 text-center">
                <h5 class="fw-bold">💰 Average Order Value</h5>
                <h2 class="text-success">
                    ₹ <span th:text="${#numbers.formatDecimal(averageOrderValue,1,2)}">0.00</span>
                </h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm p-4 text-center">
                <h5 class="fw-bold">🏆 Top Selling Product</h5>
                <h4 class="text-primary" th:text="${topProduct}">Product</h4>
            </div>
        </div>

    </div>

    <!-- MONTHLY REVENUE CHART (PREMIUM FEATURE) -->
    <div class="card shadow-sm p-4">
        <h4 class="fw-bold mb-3 text-center">📈 Monthly Revenue Chart</h4>
        <canvas id="revenueChart" height="100"></canvas>
    </div>

</div>

<script th:inline="javascript">
    const months = [[${months}]];
    const revenues = [[${revenues}]];

    const ctx = document.getElementById('revenueChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: months,
            datasets: [{
                label: 'Revenue (₹)',
                data: revenues,
                borderWidth: 2,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
