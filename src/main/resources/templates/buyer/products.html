<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Shop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 22px;
        }

        .product-card {
            border: none;
            border-radius: 14px;
            transition: 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.12);
        }

        .product-img {
            height: 200px;
            object-fit: cover;
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
        }

        .price {
            font-size: 18px;
            font-weight: 600;
            color: #198754;
        }

        .mrp {
            text-decoration: line-through;
            color: #6c757d;
            font-size: 14px;
        }

        .discount-badge {
            font-size: 12px;
        }

        .pagination .page-item.active .page-link {
            background-color: #198754;
            border-color: #198754;
        }

        /* ❤️ Favourite Button */
        .favourite-btn {
            width: 36px;
            height: 36px;
            transition: all 0.2s ease;
        }

        .favourite-btn:hover {
            transform: scale(1.08);
        }

        /* Tooltip Wrapper */
        .favourite-wrapper {
            position: relative;
        }

        /* Custom Tooltip */
        .favourite-tooltip {
            position: absolute;
            bottom: 115%;
            right: 50%;
            transform: translateX(50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        /* Tooltip Arrow */
        .favourite-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.75) transparent transparent transparent;
        }

        /* Show on hover */
        .favourite-wrapper:hover .favourite-tooltip {
            opacity: 1;
            transform: translateX(50%) translateY(-4px);
        }
    </style>
</head>

<body>

<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div class="container py-5">

    <!-- Page Title -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Explore Products</h3>
        <form method="get" th:action="@{/buyer/products}" class="d-flex">
            <input type="hidden" name="page" value="0"/>

            <select class="form-select w-auto"
                    name="sort"
                    onchange="this.form.submit()">

                <option value="default"
                        th:selected="${sort == 'default'}">
                    Sort By
                </option>

                <option value="priceAsc"
                        th:selected="${sort == 'priceAsc'}">
                    Price: Low to High
                </option>

                <option value="priceDesc"
                        th:selected="${sort == 'priceDesc'}">
                    Price: High to Low
                </option>

                <option value="newest"
                        th:selected="${sort == 'newest'}">
                    Newest
                </option>

            </select>
        </form>
    </div>

    <!-- PRODUCT GRID -->
    <div class="row g-4">

        <div class="col-md-4 col-lg-3"
             th:each="product : ${productPage.content}">

            <div class="card product-card shadow-sm h-100 position-relative">

                <!-- ❤️ Custom Favourite Button -->
                <form th:action="@{/buyer/favourite/toggle/{id}(id=${product.productId})}"
                      method="post"
                      class="position-absolute top-0 end-0 m-2 favourite-wrapper">

                    <input type="hidden" name="redirectTo" value="products"/>

                    <span class="favourite-tooltip"
                          th:text="${favouriteProductIds.contains(product.productId) ? 'Remove from Favourites' : 'Add to Favourites'}">
                    </span>

                    <button type="submit"
                            class="btn btn-light rounded-circle shadow-sm d-flex align-items-center justify-content-center favourite-btn">

                        <i th:if="${favouriteProductIds.contains(product.productId)}"
                           class="bi bi-heart-fill text-danger fs-5"></i>

                        <i th:unless="${favouriteProductIds.contains(product.productId)}"
                           class="bi bi-heart text-danger fs-5"></i>

                    </button>
                </form>

                <!-- Product Image -->
                <img src="https://via.placeholder.com/300x200"
                     class="card-img-top product-img"
                     alt="Product">

                <div class="card-body d-flex flex-column">

                    <h6 class="fw-semibold"
                        th:text="${product.productName}"></h6>

                    <p class="text-muted small"
                       th:text="${product.description}"></p>

                    <!-- Price Section -->
                    <div class="mb-2">
                        <span class="price">
                            ₹ <span th:text="${product.sellingPrice}"></span>
                        </span>
                        <span class="ms-2 mrp">
                            ₹ <span th:text="${product.mrp}"></span>
                        </span>
                    </div>

                    <!-- Discount Badge -->
                    <span class="badge bg-danger discount-badge mb-3"
                          th:if="${product.mrp != null and product.mrp > product.sellingPrice}"
                          th:text="${T(java.lang.Math).round((product.mrp - product.sellingPrice) * 100 / product.mrp)} + '% OFF'">
                    </span>

                    <!-- Buttons -->
                    <div class="mt-auto">
                        <a class="btn btn-outline-primary btn-sm w-100 mb-2"
                           th:href="@{/buyer/product/{id}(id=${product.productId})}">
                            View Details
                        </a>

                        <a th:href="@{/buyer/cart/add/{id}(id=${product.productId})}"
                           class="btn btn-success btn-sm w-100">
                            Add to Cart
                        </a>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- PAGINATION -->
    <nav class="mt-5">
        <ul class="pagination justify-content-center">

            <li class="page-item"
                th:classappend="${!productPage.hasPrevious()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/buyer/products(page=${currentPage - 1})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/buyer/products(page=${i})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${!productPage.hasNext()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/buyer/products(page=${currentPage + 1})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
