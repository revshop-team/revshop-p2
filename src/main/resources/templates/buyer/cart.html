<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Cart</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 INTERNAL CSS (Since you don’t have CSS file) -->
    <style>
        body {
            background-color: #f8f9fa;
        }

        .qty-btn-group .btn {
            min-width: 40px;
            font-weight: 600;
        }

        .stock-warning {
            font-size: 12px;
            font-weight: 500;
            color: #dc3545;
        }

        .cart-card {
            border-radius: 12px;
        }

        .price-text {
            font-size: 18px;
        }
    </style>
</head>

<body class="bg-light">

<!-- Navbar -->
<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="row g-4">

        <!-- 🛒 CART ITEMS -->
        <div class="col-lg-8">

            <h4 class="fw-bold mb-4">Shopping Cart</h4>

            <!-- Empty Cart -->
            <div th:if="${cart == null || #lists.isEmpty(cart.cartItems)}"
                 class="alert alert-info rounded-4">
                Your cart is empty.
            </div>

            <!-- Cart Items -->
            <div th:if="${cart != null && !#lists.isEmpty(cart.cartItems)}">

                <div class="card mb-3 shadow-sm cart-card"
                     th:each="item : ${cart.cartItems}">

                    <div class="card-body">
                        <div class="row align-items-center">

                            <!-- Image -->
                            <div class="col-md-2 text-center">
                                <img src="https://via.placeholder.com/100"
                                     class="img-fluid rounded">
                            </div>

                            <!-- Name & Description -->
                            <div class="col-md-4">
                                <h6 class="fw-semibold mb-1"
                                    th:text="${item.product.productName}"></h6>

                                <small class="text-muted d-block"
                                       th:text="${item.product.description}"></small>

                                <!-- 🔥 Stock Info (NEW UX) -->
                                <small class="text-muted">
                                    Available Stock:
                                    <span th:text="${item.product.stock}"></span>
                                </small>
                            </div>

                            <!-- Price -->
                            <div class="col-md-2 text-center">
                                <span class="text-success fw-semibold price-text">
                                    ₹ <span th:text="${item.product.sellingPrice}"></span>
                                </span>
                            </div>

                            <!-- Quantity Controls (FIXED STRUCTURE) -->
                            <div class="col-md-2 text-center">

                                <div class="btn-group btn-group-sm qty-btn-group">

                                    <!-- Decrease -->
                                    <a th:href="@{/buyer/cart/decrease/{id}(id=${item.cartItemId})}"
                                       class="btn btn-outline-secondary">
                                        −
                                    </a>

                                    <!-- Quantity Display -->
                                    <button class="btn btn-light" disabled
                                            th:text="${item.quantity}">
                                    </button>

                                    <!-- Increase (ONLY if stock available) -->
                                    <a th:if="${item.quantity < item.product.stock}"
                                       th:href="@{/buyer/cart/increase/{id}(id=${item.cartItemId})}"
                                       class="btn btn-outline-secondary">
                                        +
                                    </a>

                                    <!-- Disabled + when stock limit reached -->
                                    <button th:if="${item.quantity >= item.product.stock}"
                                            class="btn btn-outline-secondary"
                                            disabled>
                                        +
                                    </button>

                                </div>

                                <!-- 🚨 Stock Limit Warning (SINGLE & CLEAN) -->
                                <div class="stock-warning mt-1"
                                     th:if="${item.quantity >= item.product.stock}">
                                    Maximum stock reached (Only
                                    <span th:text="${item.product.stock}"></span> available)
                                </div>

                            </div>

                            <!-- Total -->
                            <div class="col-md-2 text-end">
                                <span class="fw-bold price-text">
                                    ₹
                                    <span th:text="${item.product.sellingPrice * item.quantity}"></span>
                                </span>
                            </div>

                        </div>
                    </div>

                </div>

            </div>

        </div>

        <!-- 💳 ORDER SUMMARY -->
        <div class="col-lg-4">

            <div class="card shadow-sm cart-card">

                <div class="card-body">

                    <h5 class="fw-bold mb-4">Order Summary</h5>

                    <div th:if="${cart != null && !#lists.isEmpty(cart.cartItems)}">

                        <div class="d-flex justify-content-between mb-2">
                            <span>Items</span>
                            <span th:text="${#lists.size(cart.cartItems)}"></span>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal</span>
                            <span>
                                ₹
                                <span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}">
                                </span>
                            </span>
                        </div>

                        <div class="d-flex justify-content-between mb-3">
                            <span>Shipping</span>
                            <span class="text-success">Free</span>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between fw-bold fs-5 mb-4">
                            <span>Total</span>
                            <span>
                                ₹
                                <span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}">
                                </span>
                            </span>
                        </div>

                        <a th:href="@{/buyer/cart/checkout}"
                           class="btn btn-success w-100">
                            Proceed to Checkout
                        </a>

                    </div>

                    <div th:if="${cart == null || #lists.isEmpty(cart.cartItems)}"
                         class="text-muted text-center">
                        Nothing to summarize.
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
