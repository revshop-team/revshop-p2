<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>RevShop | My Favourites</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#0A192F,#132d55);
            font-family:'Inter','Segoe UI',sans-serif;
        }

        .page-title{
            color:white;
            font-weight:700;
            margin-bottom:30px;
        }

        .product-card{
            border:none;
            border-radius:16px;
            overflow:hidden;
            background:white;
            box-shadow:0 15px 45px rgba(0,0,0,.2);
            transition:all .35s;
        }

        .product-card:hover{
            transform:translateY(-8px);
            box-shadow:0 25px 60px rgba(0,0,0,.25);
        }

        .product-card img{
            height:200px;
            object-fit:cover;
        }

        .heart-btn{
            border:none;
            background:white;
            border-radius:50%;
            width:40px;
            height:40px;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
            transition:all .3s;
        }

        .heart-btn:hover{
            transform:scale(1.15);
        }

        .heart-pop{
            animation:heartPop .35s ease;
        }

        @keyframes heartPop{
            0%{transform:scale(1);}
            50%{transform:scale(1.4);}
            100%{transform:scale(1);}
        }

        .price{
            font-weight:700;
            color:#0A192F;
        }

        /* =================================================
           BUTTONS & HOVERS (Imported from products.html)
           ================================================= */
        .btn-cart{
            background:linear-gradient(135deg,#D4AF37,#e6c557);
            border:none;
            color:#0A192F;
            font-weight:600;
            transition:.35s;
        }

        .btn-cart:hover{
            background:linear-gradient(135deg,#e6c557,#ffd95e);
            transform:scale(1.06);
            box-shadow:0 10px 25px rgba(0,0,0,.35);
        }

        .btn-details{
            border:1px solid #0A192F;
            color:#0A192F;
            background:white;
            transition:all .35s ease;
        }

        /* Blue Hover Effect */
        .btn-details:hover{
            background-color:#0d6efd !important;
            border-color:#0d6efd !important;
            color:white !important;
            transform:scale(1.05);
            box-shadow:0 10px 25px rgba(13, 110, 253, .4) !important;
        }

        .empty-box{
            background:white;
            padding:40px;
            border-radius:16px;
            text-align:center;
            box-shadow:0 20px 60px rgba(0,0,0,.2);
        }

        /* =================================================
           TOAST POPUP (Top Middle)
           ================================================= */
        .action-toast {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-40px);
            background: #198754; /* Default Green */
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
        }

        .action-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

    </style>

</head>

<body>

<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div id="actionToast" class="action-toast">
    <i id="toastIcon" class="bi bi-check-circle-fill fs-5"></i>
    <span id="toastText">Action Successful</span>
</div>

<div class="container py-5">

    <h3 class="page-title">My Favourite Products</h3>

    <div th:if="${#lists.isEmpty(favourites)}" class="empty-box">

        <i class="bi bi-heart fs-1 text-danger"></i>
        <h5 class="mt-3">No favourite products yet</h5>
        <p class="text-muted">Start exploring and add products you love.</p>

        <a th:href="@{/buyer/products}" class="btn btn-dark">
            Explore Products
        </a>

    </div>

    <div class="row g-4" th:if="${!#lists.isEmpty(favourites)}">

        <div class="col-md-4 col-lg-3" th:each="fav : ${favourites}">

            <div class="card product-card h-100 position-relative">

                <button class="heart-btn position-absolute top-0 end-0 m-3"
                        th:onclick="'toggleFavourite(' + ${fav.product.productId} + ', this)'">
                    <i class="bi bi-heart-fill text-danger"></i>
                </button>

                <img src="https://via.placeholder.com/300x200" class="card-img-top">

                <div class="card-body d-flex flex-column">

                    <h6 class="fw-semibold"
                        th:text="${fav.product.productName}"></h6>

                    <p class="text-muted small"
                       th:text="${fav.product.description}"></p>

                    <div class="price mb-2">
                        ₹ <span th:text="${fav.product.sellingPrice}"></span>
                    </div>

                    <div class="mt-auto">

                        <a th:href="@{/buyer/product/{id}(id=${fav.product.productId})}"
                           class="btn btn-details btn-sm w-100 mb-2">
                            View Details
                        </a>

                        <a th:href="@{/buyer/cart/add/{id}(id=${fav.product.productId})}"
                           class="btn btn-cart addCartBtn btn-sm w-100">
                            Add to Cart
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
    // Reusable function to show the toast with dynamic colors and text
    function showToast(message, bgColor, iconClass) {
        const toast = document.getElementById("actionToast");
        const toastText = document.getElementById("toastText");
        const toastIcon = document.getElementById("toastIcon");

        toastText.innerText = message;
        toast.style.background = bgColor;
        toastIcon.className = "bi fs-5 " + iconClass;

        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 1500);
    }

    // Removing from Favourites Logic
    function toggleFavourite(id, btn){
        btn.classList.add("heart-pop");

        fetch('/buyer/favourite/toggle/'+id, {
            method:'POST'
        }).then(() => {
            // Show red popup for removal
            showToast("Removed from Favourites", "#dc3545", "bi-trash-fill");

            // Wait a moment before removing the card so user sees the popup
            setTimeout(() => {
                btn.closest(".col-md-4").remove();

                // Optional: Refresh page if no items left to show the empty box
                if(document.querySelectorAll('.col-md-4').length === 0) {
                    location.reload();
                }
            }, 800);
        });
    }

    // Add to Cart Logic
    document.querySelectorAll(".addCartBtn").forEach(btn => {
        btn.addEventListener("click", function(e) {
            e.preventDefault();
            const targetUrl = this.getAttribute("href");

            // Show green popup for cart
            showToast("Added to Cart Successfully", "#198754", "bi-check-circle-fill");

            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1500);
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
