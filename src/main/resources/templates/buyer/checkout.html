<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Checkout</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .checkout-title {
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .checkout-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        .order-summary {
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            background: #ffffff;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 10px 14px;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 0.2rem rgba(25,135,84,0.15);
            border-color: #198754;
        }

        .btn-place {
            border-radius: 14px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: 0.3s ease;
        }

        .btn-place:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(25,135,84,0.3);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-total {
            font-size: 18px;
            font-weight: 700;
        }

    </style>
</head>

<body class="bg-light">

<div class="container py-5">

    <h3 class="checkout-title mb-4">Secure Checkout</h3>

    <div class="row g-5">

        <!-- LEFT SIDE - SHIPPING FORM -->
        <div class="col-lg-7">

            <div class="card checkout-card p-4">

                <h5 class="mb-4">Shipping Details</h5>

                <form th:action="@{/buyer/cart/checkout}" method="post">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <input type="text"
                                   name="fullName"
                                   class="form-control"
                                   placeholder="Full Name"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <input type="text"
                                   name="phone"
                                   class="form-control"
                                   placeholder="Phone Number"
                                   required>
                        </div>

                        <div class="col-12">
                            <input type="text"
                                   name="addressLine1"
                                   class="form-control"
                                   placeholder="Address Line 1"
                                   required>
                        </div>

                        <div class="col-12">
                            <input type="text"
                                   name="addressLine2"
                                   class="form-control"
                                   placeholder="Address Line 2 (Optional)">
                        </div>

                        <div class="col-md-4">
                            <input type="text"
                                   name="city"
                                   class="form-control"
                                   placeholder="City"
                                   required>
                        </div>

                        <div class="col-md-4">
                            <input type="text"
                                   name="state"
                                   class="form-control"
                                   placeholder="State"
                                   required>
                        </div>

                        <div class="col-md-4">
                            <input type="text"
                                   name="pincode"
                                   class="form-control"
                                   placeholder="Pincode"
                                   required>
                        </div>

                    </div>

                    <hr class="my-4">

                    <label class="form-label fw-semibold">Payment Method</label>
                    <select class="form-select mb-4"
                            name="paymentMethod"
                            required>
                        <option value="">Select Payment Method</option>
                        <option value="COD">Cash On Delivery</option>
                        <option value="UPI">UPI</option>
                        <option value="CARD">Credit / Debit Card</option>
                    </select>

                    <button type="submit"
                            class="btn btn-success w-100 btn-place">
                        Place Order
                    </button>

                </form>

            </div>

        </div>

        <!-- RIGHT SIDE - ORDER SUMMARY -->
        <div class="col-lg-5">

            <div class="order-summary p-4">

                <h5 class="mb-4">Order Summary</h5>

                <div th:if="${cart != null && !#lists.isEmpty(cart.cartItems)}">

                    <!-- Item Count -->
                    <div class="summary-row">
                        <span>Items</span>
                        <span th:text="${#lists.size(cart.cartItems)}"></span>
                    </div>

                    <!-- Subtotal -->
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>
                            ₹
                            <span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}">
                            </span>
                        </span>
                    </div>

                    <!-- Shipping -->
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span class="text-success">Free</span>
                    </div>

                    <hr>

                    <!-- Total -->
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span>
                            ₹
                            <span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}">
                            </span>
                        </span>
                    </div>

                    <div class="mt-3 small text-muted">
                        🔒 Your payment information is processed securely.
                    </div>

                </div>

                <div th:if="${cart == null || #lists.isEmpty(cart.cartItems)}"
                     class="text-muted text-center">
                    Your cart is empty.
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
