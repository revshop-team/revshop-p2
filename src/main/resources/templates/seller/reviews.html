<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Reviews | RevShop</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">
        RevShop - Seller
    </a>
</nav>

<div class="container mt-5">

    <h3 class="fw-bold mb-4">Product Reviews & Ratings</h3>

    <!-- Empty State -->
    <div th:if="${reviews == null || #lists.isEmpty(reviews)}"
         class="alert alert-info text-center rounded-3">
        No reviews received for your products yet.
    </div>

    <!-- Reviews List -->
    <div th:each="review : ${reviews}" class="card shadow-sm mb-4">
        <div class="card-body">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="fw-bold mb-1"
                        th:text="${review.product.productName}">
                        Product Name
                    </h5>

                    <small class="text-muted">
                        Reviewed on:
                        <span th:text="${#temporals.format(review.reviewDate, 'dd MMM yyyy')}"></span>
                    </small>
                </div>

                <!--  Rating Badge -->
                <span class="badge bg-warning text-dark fs-6">
                    ⭐ <span th:text="${review.rating}"></span> / 5
                </span>
            </div>

            <hr>

            <!--  Buyer -->
            <p class="mb-2">
                <strong>Buyer:</strong>
                <span th:text="${review.buyer.email}"></span>
            </p>

            <!--  Comment -->
            <p class="mb-3">
                <strong>Review:</strong><br>
                <span th:text="${review.reviewComment}"></span>
            </p>

            <!-- Product Rating Summary -->
            <div class="bg-light p-3 rounded">
                <strong>Average Rating:</strong>
                ⭐ <span th:text="${#numbers.formatDecimal(avgRatingMap[review.product.productId], 1, 1)}"></span>
                / 5
                <br>
                <strong>Total Reviews:</strong>
                <span th:text="${reviewCountMap[review.product.productId]}"></span>
            </div>

        </div>
    </div>

</div>
</body>
</html>
