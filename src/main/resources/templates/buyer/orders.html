<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | My Orders</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body{
        background: linear-gradient(135deg,#0f1c3f,#142b6f,#1f3f9e);
        min-height:100vh;
        font-family:'Segoe UI',sans-serif;
        color:white;
        }

 /* GOLD FLOATING PAGE TITLE */

.page-title{
font-weight:700;
font-size:32px;
color:#D4AF37;
letter-spacing:1px;

animation:titleFloat 4s ease-in-out infinite alternate;
}

/* Floating animation */

@keyframes titleFloat{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-5px);
}
}
        @keyframes slideDown{
        from{
        opacity:0;
        transform:translateY(-30px);
        }
        to{
        opacity:1;
        transform:translateY(0);
        }
        }

        /* ORDER CARD */

        .order-card{
        border:none;
        border-radius:20px;
        background:rgba(255,255,255,0.95);
        color:#0f1c3f;
        transition:0.4s;
        animation:floatCard 6s ease-in-out infinite;
        }

        .order-card:hover{
        transform:translateY(-8px) scale(1.01);
        box-shadow:0 25px 60px rgba(0,0,0,0.35);
        }

        /* Floating animation */

        @keyframes floatCard{
        0%{transform:translateY(0px);}
        50%{transform:translateY(-8px);}
        100%{transform:translateY(0px);}
        }

        /* ORDER HEADER */

        .order-header{
        background:linear-gradient(135deg,#0f1c3f,#1f3f9e);
        border-radius:14px;
        padding:15px 18px;
        color:white;
        }

        /* PRODUCT ROW */

        .product-row:last-child{
        border-bottom:none !important;
        }

        /* TOTAL BOX */

        .total-box{
        background:linear-gradient(135deg,#ffd700,#ffcc00);
        border-radius:12px;
        padding:12px 22px;
        font-size:18px;
        color:#0f1c3f;
        transition:0.3s;
        }

        .total-box:hover{
        transform:scale(1.06);
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        /* REVIEW BOX */

        .review-box{
        background:white;
        border-radius:12px;
        border:2px solid #ffd700;
        transition:0.3s;
        }

        .review-box:hover{
        box-shadow:0 10px 25px rgba(0,0,0,0.15);
        transform:translateY(-2px);
        }

        /* BUTTON */

        .btn-success{
        background:linear-gradient(135deg,#ffd700,#ffcc00);
        border:none;
        color:#0f1c3f;
        font-weight:600;
        border-radius:10px;
        transition:0.3s;
        }

        .btn-success:hover{
        background:#0f1c3f;
        color:#ffd700;
        transform:translateY(-2px);
        box-shadow:0 8px 18px rgba(0,0,0,0.3);
        }

        /* BADGES */

        .badge.bg-primary{
        background:linear-gradient(135deg,#1f3f9e,#3f6df5) !important;
        }

        .badge.bg-success{
        background:linear-gradient(135deg,#16a34a,#22c55e) !important;
        }

        .badge.bg-warning{
        background:linear-gradient(135deg,#ffd700,#ffcc00) !important;
        color:#0f1c3f !important;
        }

        .badge.bg-danger{
        background:linear-gradient(135deg,#dc2626,#ef4444) !important;
        }

        /* FLASH MESSAGE */

        .flash-message{
        animation:fadeIn 0.6s;
        }

        @keyframes fadeIn{
        from{opacity:0}
        to{opacity:1}
        }
        .product-row{
color:#000;
font-weight:500;
}

.product-row .text-muted{
color:#000 !important;
}

.product-row span{
color:#000;
}


    </style>
</head>

<body>

<!-- Navbar -->
<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div class="container py-5">

    <h3 class="page-title mb-4">My Orders</h3>

    <!-- SUCCESS -->
    <div th:if="${successMessage}"
         class="alert alert-success rounded-4 text-center fw-semibold flash-message">
        <span th:text="${successMessage}"></span>
    </div>

    <!-- ERROR -->
    <div th:if="${errorMessage}"
         class="alert alert-danger rounded-4 text-center fw-semibold flash-message">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- EMPTY -->

    <div th:if="${orders == null || #lists.isEmpty(orders)}"
         class="alert alert-info rounded-4 text-center">
        You haven’t placed any orders yet.
    </div>

    <!-- ORDERS -->

    <div th:each="order : ${orders}"
         class="card order-card shadow-lg mb-4 animate__animated animate__fadeInUp">

        <div class="card-body">

            <!-- HEADER -->

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 order-header mb-4">

                <div>
                    <div class="fw-bold">
                        Order ID:
                        <span th:text="${order.orderId}"></span>
                    </div>

                    <small>
                        Placed on
                        <span th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}"></span>
                    </small>
                </div>

                <div class="d-flex gap-3">

                    <div>
                        <small>Order</small><br>
                        <span class="badge rounded-pill px-3 py-2 bg-primary"
                              th:text="${order.status}">
</span>
                    </div>

                    <div>
                        <small>Payment</small><br>

                        <span class="badge rounded-pill px-3 py-2"
                              th:if="${paymentStatusMap != null and paymentStatusMap[order.orderId] != null}"
                              th:classappend="${paymentStatusMap[order.orderId] == 'SUCCESS'} ? ' bg-success' :
(${paymentStatusMap[order.orderId] == 'PENDING'} ? ' bg-warning text-dark' : ' bg-danger')"
                              th:text="${paymentStatusMap[order.orderId]}">
</span>

                    </div>

                </div>

            </div>

            <!-- ITEMS -->

            <div th:if="${order.orderItems != null}">

                <div th:each="item : ${order.orderItems}"
                     class="row align-items-center border-bottom pb-3 mb-3 product-row">

                    <div class="col-md-5 fw-semibold">
                        <span th:text="${item.product.productName}"></span>
                    </div>

                    <div class="col-md-2 text-muted">
                        ₹ <span th:text="${item.price}"></span>
                    </div>

                    <div class="col-md-2 text-muted">
                        Qty: <span th:text="${item.quantity}"></span>
                    </div>

                    <div class="col-md-3 text-end fw-bold">
                        ₹ <span th:text="${item.price * item.quantity}"></span>
                    </div>

                    <!-- REVIEW -->

                    <div class="col-12 mt-3"
                         th:if="${order.status == 'DELIVERED'}">

                        <div th:if="${!@reviewServiceImpl.hasReviewed(order.orderId,
item.product.productId,
buyerEmail)}"
                             class="review-box p-3 mt-2">

                            <h6 class="fw-bold mb-3">
                                ⭐ Write a Review for
                                <span th:text="${item.product.productName}"></span>
                            </h6>

                            <form th:action="@{/buyer/review}" method="post">

                                <input type="hidden"
                                       name="orderId"
                                       th:value="${order.orderId}" />

                                <input type="hidden"
                                       name="productId"
                                       th:value="${item.product.productId}" />

                                <div class="row g-3">

                                    <div class="col-md-3">
                                        <input type="number"
                                               name="rating"
                                               min="1"
                                               max="5"
                                               class="form-control"
                                               placeholder="1-5"
                                               required />
                                    </div>

                                    <div class="col-md-7">
<textarea name="comment"
          class="form-control"
          rows="2"
          placeholder="Share your experience..."
          required></textarea>
                                    </div>

                                    <div class="col-md-2">
                                        <button type="submit"
                                                class="btn btn-success w-100">
                                            Submit
                                        </button>
                                    </div>

                                </div>
                            </form>

                        </div>

                        <div th:if="${@reviewServiceImpl.hasReviewed(order.orderId,
item.product.productId,
buyerEmail)}"
                             class="alert alert-success mt-2 rounded-4">
                            ✔ You have already reviewed this product.
                        </div>

                    </div>

                </div>

            </div>

            <!-- TOTAL -->

            <div class="d-flex justify-content-end mt-4">
                <div class="total-box fw-bold">
                    Total: ₹ <span th:text="${order.totalAmount}"></span>
                </div>
            </div>

        </div>
    </div>

</div>

<script>

    document.addEventListener("DOMContentLoaded", function () {

    const flashMessages = document.querySelectorAll('.flash-message');

    if (flashMessages.length > 0) {

    setTimeout(() => {
    flashMessages.forEach(msg => {
    msg.style.display = 'none';
    });
    }, 3000);

    }

    });

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
