<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Orders | RevShop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        .order-card{
            border-radius:14px;
            border:none;
        }

        .section-box{
            background:#f8f9fa;
            border-radius:10px;
            padding:15px;
        }

        .filter-btn{
            border-radius:20px;
        }

        /* highlight pending orders */
        .pending-order{
            border-left:6px solid #198754;
        }

    </style>

</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">

        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>

    </a>

</nav>

<!-- PAGE CONTENT -->
<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3 class="fw-bold">📦 Orders For Your Products</h3>

    </div>

    <!-- EMPTY STATE -->
    <div th:if="${orderItems == null || #lists.isEmpty(orderItems)}"
         class="alert alert-info text-center shadow-sm">

        No orders received yet for your products.

    </div>

    <!-- ORDER CARDS -->
    <div th:each="item : ${orderItems}"
         th:class="'card shadow-sm mb-4 order-card ' + (${item.order.status=='PLACED'} ? 'pending-order' : '')">

        <div class="card-body">

            <div class="d-flex justify-content-between align-items-start">

                <div>

                    <h5 class="fw-bold mb-1">

                        Order #
                        <span th:text="${item.order.orderId}"></span>

                        <!-- NEW badge -->
                        <span th:if="${newOrderMap[item.order.orderId] and item.order.status!='DELIVERED'}"
                              class="badge bg-success ms-2">

                            NEW

                        </span>

                    </h5>

                    <small class="text-muted">

                        Placed on:
                        <span th:text="${#temporals.format(item.order.orderDate,'dd MMM yyyy, hh:mm a')}"></span>

                    </small>

                    <div class="mt-2">

                        <span class="badge bg-secondary"
                              th:text="${item.order.status}">
                        </span>

                    </div>

                </div>

                <div class="text-end">

                    <!-- Payment Mode -->
                    <span class="badge bg-dark mb-2"
                          th:text="${paymentMap[item.order.orderId]?.paymentMethod}">
                    </span>

                    <br>

                    <!-- Mark Delivered -->
                    <div th:if="${item.order.status=='PLACED'}">

                        <form th:action="@{/seller/orders/deliver/{id}(id=${item.order.orderId})}"
                              method="post">

                            <button type="submit"
                                    class="btn btn-success btn-sm">

                                Mark as Delivered

                            </button>

                        </form>

                    </div>

                    <!-- Delivered badge -->
                    <div th:if="${item.order.status=='DELIVERED'}">

                        <span class="badge bg-success">

                            DELIVERED

                        </span>

                    </div>

                </div>

            </div>

            <hr>

            <!-- PRODUCT DETAILS -->
            <h6 class="fw-bold mb-2">

                🛍 Product Details

            </h6>

            <div class="section-box">

                <p class="mb-1">

                    <strong>Name:</strong>
                    <span th:text="${item.product.productName}"></span>

                </p>

                <p class="mb-1">

                    <strong>Quantity:</strong>
                    <span th:text="${item.quantity}"></span>

                </p>

                <p class="mb-0 fw-bold text-success">

                    Order Value:
                    ₹ <span th:text="${item.price * item.quantity}"></span>

                </p>

            </div>

            <hr>

            <!-- BUYER -->
            <p class="mb-0">

                <strong>👤 Buyer:</strong>
                <span th:text="${item.order.buyer.email}"></span>

            </p>

        </div>

    </div>

</div>

<!-- AUTO REFRESH ORDERS -->
<script>

    setInterval(function(){

        location.reload();

    },10000);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
