<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | My Orders</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f8;
        }
        .order-card {
            border: none;
            border-radius: 16px;
            transition: 0.2s ease;
        }
        .order-card:hover {
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }
        .order-meta small {
            color: #6c757d;
        }
        .product-row:last-child {
            border-bottom: none !important;
        }
        .total-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px 18px;
        }
    </style>
</head>

<body>

<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div class="container py-5">

    <h3 class="fw-bold mb-4">My Orders</h3>

    <!-- Empty -->
    <div th:if="${orders == null || #lists.isEmpty(orders)}"
         class="alert alert-info rounded-4">
        You haven’t placed any orders yet.
    </div>

    <!-- Orders -->
    <div th:each="order : ${orders}"
         class="card order-card mb-4 shadow-sm">

        <div class="card-body">

            <!-- Top Header -->
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-3">

                <div class="order-meta">
                    <div class="fw-semibold">OrderId: <span th:text="${order.orderId}"></span></div>
                    <small>
                        Placed on
                        <span th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}"></span>
                    </small>
                </div>

                <div class="d-flex gap-2">

                    <!-- Order Status -->
                    <div>
                        <small class="text-muted">Order:</small>
                        <span class="badge rounded-pill px-3 py-2 bg-primary"
                              th:text="${order.status}">

                        </span>
                    </div>

                    <!-- Payment Status -->
                    <div>
                        <small class="text-muted">Payment:</small>
                        <span class="badge rounded-pill px-3 py-2"
                              th:if="${paymentStatusMap != null and paymentStatusMap[order.orderId] != null}"
                              th:classappend="${paymentStatusMap[order.orderId] == 'SUCCESS'} ? ' bg-success' :
                                (${paymentStatusMap[order.orderId] == 'PENDING'} ? ' bg-warning text-dark' :
                                ' bg-danger')"
                              th:text="${paymentStatusMap[order.orderId]}">
                        </span>
                    </div>

                </div>

            </div>

            <hr class="mt-2 mb-4">

            <!-- Items -->
            <div th:if="${order.orderItems != null}">

                <div th:each="item : ${order.orderItems}"
                     class="row align-items-center product-row border-bottom pb-3 mb-3">

                    <div class="col-md-6 fw-semibold">
                        <span th:text="${item.product != null ? item.product.productName : 'Product'}"></span>
                    </div>

                    <div class="col-md-2 text-muted">
                        ₹ <span th:text="${item.price}"></span>
                    </div>

                    <div class="col-md-2 text-muted">
                        Qty: <span th:text="${item.quantity}"></span>
                    </div>

                    <div class="col-md-2 text-end fw-semibold">
                        ₹ <span th:text="${item.price * item.quantity}"></span>
                    </div>

                    <!-- Review Section -->
                    <div class="col-12 mt-3"
                         th:if="${order.status == 'DELIVERED'}">

                        <!-- Not Reviewed -->
                        <div th:if="${!@reviewServiceImpl.hasReviewed(order.orderId,
                                                   item.product.productId,
                                                   buyerEmail)}"
                             class="bg-light p-3 rounded-4">

                            <h6 class="fw-bold mb-3">Write a Review</h6>

                            <form th:action="@{/buyer/review}" method="post">

                                <input type="hidden"
                                       name="orderId"
                                       th:value="${order.orderId}" />

                                <input type="hidden"
                                       name="productId"
                                       th:value="${item.product.productId}" />

                                <div class="row g-3">

                                    <div class="col-md-3">
                                        <input type="number"
                                               name="rating"
                                               min="1"
                                               max="5"
                                               class="form-control"
                                               placeholder="Rating"
                                               required />
                                    </div>

                                    <div class="col-md-7">
                                        <textarea name="comment"
                                                  class="form-control"
                                                  rows="2"
                                                  placeholder="Write your review..."
                                                  required></textarea>
                                    </div>

                                    <div class="col-md-2">
                                        <button type="submit"
                                                class="btn btn-success w-100">
                                            Submit
                                        </button>
                                    </div>

                                </div>

                            </form>

                        </div>

                        <!-- Already Reviewed -->
                        <div th:if="${@reviewServiceImpl.hasReviewed(order.orderId,
                                                 item.product.productId,
                                                 buyerEmail)}"
                             class="alert alert-success rounded-4 mt-2">
                            ✔ You have already reviewed this product.
                        </div>

                    </div>

                </div>

            </div>

            <!-- Total -->
            <div class="d-flex justify-content-end mt-3">
                <div class="total-section fw-semibold">
                    Total: ₹ <span th:text="${order.totalAmount}"></span>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
