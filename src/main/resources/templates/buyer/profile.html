
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | My Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* UNIFIED BACKGROUND THEME */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0A192F, #132a4d, #1b355d);
            background-size: 300% 300%;
            animation: bgMove 12s ease infinite;
            color: white;
            min-height: 100vh;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* NAVBAR FIX */
        .navbar-wrapper {
            position: relative;
            z-index: 1050 !important;
        }

        /* PAGE TITLE */
        .page-title {
            font-weight: 700;
            color: #D4AF37;
            animation: titleFloat 4s ease-in-out infinite alternate;
        }

        @keyframes titleFloat {
            0% { transform: translateY(0) }
            100% { transform: translateY(-5px) }
        }

        .slide-up {
            animation: slideUp .8s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* UNIFIED CARD STYLE (Matches Cart & Orders) */
        .profile-card, .stat-card {
            border-radius: 20px;
            background: rgba(255, 255, 255, .95);
            color: #0A192F;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,.35);
            transition: .35s;
        }

        .hover-lift:hover {
            transform: translateY(-6px);
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(0, 0, 0, .1);
            padding: 20px 24px;
        }

        /* TYPOGRAPHY */
        .stat-label {
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0A192F;
        }

        .info-label {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.15rem;
            font-weight: 600;
            color: #0A192F;
        }

        /* UNIFIED BUTTONS */
        .btn-gold {
            background: #D4AF37 !important;
            color: #0A192F !important;
            font-weight: 700;
            border-radius: 12px;
            padding: 10px 24px;
            border: none;
            transition: all .3s ease;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4) !important;
        }

        .btn-outline-navy {
            border: 2px solid #0A192F;
            color: #0A192F;
            font-weight: 600;
            border-radius: 12px;
            padding: 10px 24px;
            transition: all .3s ease;
            background: transparent;
            text-decoration: none;
            display: inline-block;
        }

        .btn-outline-navy:hover {
            background: #0A192F;
            color: #D4AF37;
            transform: translateY(-2px);
        }

        /* FORM INPUTS (Light theme for white cards) */
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            padding: 12px 15px;
            background: #f8fafc;
            color: #0A192F;
            font-weight: 500;
        }

        .form-control:focus, .form-select:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
            background: #ffffff;
        }
    </style>
</head>

<body>

<div class="navbar-wrapper">
    <div th:replace="~{buyer/fragments/navbar :: navbar}"></div>
</div>

<div class="container py-5 slide-up" style="position: relative; z-index: 1;">

    <div th:if="${error}" class="alert alert-danger rounded-4 fw-medium border-0 shadow-sm mb-4" style="background-color: rgba(220, 53, 69, 0.9); color: white;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    </div>

    <h3 class="page-title mb-4">
        <i class="bi bi-person-circle me-2"></i>My Profile
    </h3>

    <div class="row g-4 mb-5 text-center">

        <div class="col-md-6">
            <div class="card stat-card h-100 hover-lift">
                <div class="card-body py-4 d-flex flex-column justify-content-center">
                    <div class="stat-label mb-2">Total Orders</div>
                    <div class="stat-number text-primary" th:text="${totalOrders}">0</div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card stat-card h-100 hover-lift">
                <div class="card-body py-4 d-flex flex-column justify-content-center">
                    <div class="stat-label mb-2">Total Spending</div>
                    <div class="stat-number text-success" th:text="'₹ ' + ${totalSpending}">₹ 0</div>
                </div>
            </div>
        </div>

    </div>

    <div class="card profile-card hover-lift">

        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold fs-4"><i class="bi bi-info-circle me-2 text-warning"></i>Personal Details</h5>

            <a th:href="@{/buyer/profile(edit=true)}"
               class="btn btn-gold btn-sm px-4 py-2"
               th:if="${!editMode}">
                <i class="bi bi-pencil-square me-1"></i> Edit Profile
            </a>
        </div>

        <div class="card-body p-4 p-md-5">

            <div th:if="${!editMode}">
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="info-label">Full Name</div>
                        <div class="info-value" th:text="${buyerDetails.fullName != null ? buyerDetails.fullName : 'Not Provided'}"></div>
                    </div>

                    <div class="col-md-6">
                        <div class="info-label">Phone</div>
                        <div class="info-value" th:text="${buyerDetails.phone != null ? buyerDetails.phone : 'Not Provided'}"></div>
                    </div>

                    <div class="col-md-6">
                        <div class="info-label">Gender</div>
                        <div class="info-value" th:text="${buyerDetails.gender != null ? buyerDetails.gender : 'Not Provided'}"></div>
                    </div>

                    <div class="col-md-6">
                        <div class="info-label">Date of Birth</div>
                        <div class="info-value" th:text="${buyerDetails.dateOfBirth != null ? buyerDetails.dateOfBirth : 'Not Provided'}"></div>
                    </div>
                </div>
            </div>

            <div th:if="${editMode}">
                <form th:action="@{/buyer/profile/update}" th:object="${buyerDetails}" method="post">

                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold info-label mb-2">Full Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{fullName}"
                                   required
                                   minlength="3"
                                   pattern="[A-Za-z ]{3,}"
                                   title="Name must be at least 3 letters">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold info-label mb-2">Phone</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{phone}"
                                   pattern="[6-9][0-9]{9}"
                                   maxlength="10"
                                   minlength="10"
                                   title="Enter valid 10 digit phone number"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold info-label mb-2">Gender</label>
                            <select class="form-select" th:field="*{gender}">
                                <option value="">Select</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold info-label mb-2">Date of Birth</label>
                            <input type="date"
                                   class="form-control"
                                   th:name="dateOfBirth"
                                   th:value="${buyerDetails.dateOfBirth != null ? #temporals.format(buyerDetails.dateOfBirth,'yyyy-MM-dd') : ''}">
                        </div>
                    </div>

                    <div class="d-flex gap-3 pt-3 border-top border-light">
                        <button type="submit" class="btn btn-gold px-5 py-2">
                            <i class="bi bi-save me-1"></i> Save Changes
                        </button>

                        <a th:href="@{/buyer/profile}" class="btn-outline-navy px-5 py-2">
                            Cancel
                        </a>
                    </div>

                </form>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
