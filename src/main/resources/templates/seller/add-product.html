<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .form-card {
            border-radius: 16px;
        }

        .form-label {
            font-weight: 600;
        }

        .image-preview {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px dashed #dee2e6;
            margin-top: 10px;
            display: none;
        }

        .error-text {
            color: red;
            font-size: 13px;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">RevShop - Seller</a>
    <a class="nav-link text-white" th:href="@{/seller/dashboard}">Dashboard</a>

    <div class="ms-auto dropdown">
        <button class="btn btn-light btn-sm dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown">
            My Account
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" th:href="@{/seller/profile}">Profile</a></li>
            <li><a class="dropdown-item" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4 form-card">

        <h3 class="mb-4 fw-bold">Add New Product</h3>

        <!-- ERROR MESSAGE FROM BACKEND -->
        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/seller/save-product}"
              th:object="${product}"
              method="post"
              onsubmit="return validateProductForm()">

            <!-- Product Name -->
            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text"
                       id="productName"
                       class="form-control"
                       placeholder="Eg: Samsung Galaxy S23"
                       th:field="*{productName}"
                       required>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control"
                          rows="3"
                          placeholder="Enter product description"
                          th:field="*{description}"></textarea>
            </div>

            <!-- Manufacturer -->
            <div class="mb-3">
                <label class="form-label">Manufacturer</label>
                <input type="text"
                       id="manufacturer"
                       class="form-control"
                       placeholder="Eg: Samsung, Apple, Sony"
                       th:field="*{manufacturer}"
                       required>
            </div>

            <!-- MRP -->
            <div class="mb-3">
                <label class="form-label">MRP (₹)</label>
                <input type="number"
                       step="0.01"
                       id="mrp"
                       class="form-control"
                       placeholder="Eg: 25000"
                       th:field="*{mrp}"
                       required>
                <div id="mrpError" class="error-text"></div>
            </div>

            <!-- Selling Price -->
            <div class="mb-3">
                <label class="form-label">Selling Price (₹)</label>
                <input type="number"
                       step="0.01"
                       id="sellingPrice"
                       class="form-control"
                       placeholder="Eg: 19999"
                       th:field="*{sellingPrice}"
                       required>
                <div id="priceError" class="error-text"></div>
            </div>

            <!-- Stock -->
            <div class="mb-3">
                <label class="form-label">Stock Quantity</label>
                <input type="number"
                       id="stock"
                       class="form-control"
                       placeholder="Eg: 50"
                       min="0"
                       th:field="*{stock}"
                       required>
                <div id="stockError" class="error-text"></div>
            </div>

            <!-- Threshold -->
            <div class="mb-3">
                <label class="form-label">Stock Threshold (Low Alert)</label>
                <input type="number"
                       id="threshold"
                       class="form-control"
                       placeholder="Eg: 5"
                       min="0"
                       th:field="*{stockThreshold}"
                       required>
                <div id="thresholdError" class="error-text"></div>
            </div>

            <!-- Category -->
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select"
                        id="category"
                        th:field="*{category.categoryId}"
                        required>
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.categoryId}"
                            th:text="${cat.categoryName}">
                    </option>
                </select>
                <div id="categoryError" class="error-text"></div>
            </div>

            <!-- Static Image -->
            <div class="mb-3">
                <label class="form-label">Product Image</label>
                <select class="form-select"
                        id="imageName"
                        th:field="*{imageName}"
                        onchange="previewStaticImage(this.value)"
                        required>

                    <option value="">-- Select Product Image --</option>
                    <option value="mobile.png">Mobile (Electronics)</option>
                    <option value="tshirt.png">T-Shirt (Fashion)</option>
                    <option value="book.png">Book (Books)</option>
                    <option value="kitchen.png">Kitchen Item</option>
                    <option value="grocery.png">Grocery Item</option>
                    <option value="default.png">Default Image</option>
                </select>

                <div id="imageError" class="error-text"></div>

                <small class="text-muted">
                    Images are loaded from static/images folder
                </small>

                <img id="imagePreview" class="image-preview" alt="Preview"/>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Save Product
            </button>

        </form>
    </div>
</div>

<script>
    function previewStaticImage(imageName) {
        const preview = document.getElementById("imagePreview");
        if (imageName) {
            preview.src = "/images/" + imageName;
            preview.style.display = "block";
        } else {
            preview.style.display = "none";
        }
    }

    function validateProductForm() {
        let isValid = true;

        const mrp = parseFloat(document.getElementById("mrp").value);
        const sellingPrice = parseFloat(document.getElementById("sellingPrice").value);
        const stock = parseInt(document.getElementById("stock").value);
        const threshold = parseInt(document.getElementById("threshold").value);
        const category = document.getElementById("category").value;
        const imageName = document.getElementById("imageName").value;

        // Clear previous errors
        document.getElementById("priceError").innerText = "";
        document.getElementById("stockError").innerText = "";
        document.getElementById("thresholdError").innerText = "";
        document.getElementById("categoryError").innerText = "";
        document.getElementById("imageError").innerText = "";

        // 🔥 PRICE VALIDATION (VERY IMPORTANT)
        if (sellingPrice > mrp) {
            document.getElementById("priceError").innerText =
                "Selling price cannot be greater than MRP.";
            isValid = false;
        }

        // 🔥 STOCK VALIDATION
        if (stock < 0) {
            document.getElementById("stockError").innerText =
                "Stock cannot be negative.";
            isValid = false;
        }

        // 🔥 THRESHOLD VALIDATION
        if (threshold > stock) {
            document.getElementById("thresholdError").innerText =
                "Threshold cannot be greater than stock.";
            isValid = false;
        }

        // CATEGORY REQUIRED
        if (!category) {
            document.getElementById("categoryError").innerText =
                "Please select a category.";
            isValid = false;
        }

        // IMAGE REQUIRED
        if (!imageName) {
            document.getElementById("imageError").innerText =
                "Please select a product image.";
            isValid = false;
        }

        return isValid;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
