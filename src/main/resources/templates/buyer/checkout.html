<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>RevShop | Checkout</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
        font-family:'Poppins',sans-serif;
        background:linear-gradient(135deg,#0A192F,#132a4d,#1b355d);
        background-size:300% 300%;
        animation:bgMove 14s ease infinite;
        min-height:100vh;
        color:white;
        }

        @keyframes bgMove{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
        }

        .page-title{
        font-weight:700;
        font-size:30px;
        color:#D4AF37;
        }

        .checkout-card,
        .order-summary{
        border:none;
        border-radius:20px;
        background:linear-gradient(145deg,#ffffff,#f6f7fb);
        color:#0A192F;
        box-shadow:0 18px 40px rgba(0,0,0,.35);
        }

        .order-summary{
        position:sticky;
        top:30px;
        }

        .form-control,
        .form-select{
        border-radius:12px;
        padding:12px 16px;
        border:1px solid #dce1e6;
        }

        .form-control:focus,
        .form-select:focus{
        border-color:#D4AF37;
        box-shadow:0 0 0 3px rgba(212,175,55,.25);
        }

        .summary-row{
        display:flex;
        justify-content:space-between;
        margin-bottom:12px;
        font-size:15px;
        }

        .summary-total{
        font-weight:700;
        font-size:18px;
        }

        .btn-place{
        background:#D4AF37 !important;
        color:#0A192F !important;
        font-weight:600;
        border-radius:12px;
        padding:12px;
        }

        .secure-note{
        font-size:13px;
        color:#6c757d;
        text-align:center;
        margin-top:10px;
        }

    </style>
</head>

<body>

<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <h3 class="page-title mb-4">Secure Checkout</h3>

    <div class="row g-5">

        <div class="col-lg-7">

            <div class="card checkout-card p-4">

                <h5 class="mb-4 fw-bold">Shipping Details</h5>

                <form th:action="@{/buyer/cart/checkout}" method="post">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <input type="text"
                                   name="fullName"
                                   class="form-control"
                                   placeholder="Full Name"
                                   pattern="[A-Za-z ]{3,50}"
                                   oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <input type="tel"
                                   name="phone"
                                   class="form-control"
                                   placeholder="Phone Number"
                                   pattern="[6-9]{1}[0-9]{9}"
                                   maxlength="10"
                                   inputmode="numeric"
                                   oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                                   required>
                        </div>

                        <div class="col-12">
                            <input type="text"
                                   name="addressLine1"
                                   class="form-control"
                                   placeholder="Address Line 1"
                                   required>
                        </div>

                        <div class="col-12">
                            <input type="text"
                                   name="addressLine2"
                                   class="form-control"
                                   placeholder="Address Line 2 (Optional)">
                        </div>

                        <div class="col-md-4">
                            <input type="text"
                                   id="city"
                                   name="city"
                                   class="form-control"
                                   placeholder="City"
                                   readonly
                                   required>
                        </div>

                        <div class="col-md-4">
                            <input type="text"
                                   id="state"
                                   name="state"
                                   class="form-control"
                                   placeholder="State"
                                   readonly
                                   required>
                        </div>

                        <div class="col-md-4">
                            <input type="text"
                                   id="pincode"
                                   name="pincode"
                                   class="form-control"
                                   placeholder="Pincode"
                                   pattern="[0-9]{6}"
                                   maxlength="6"
                                   inputmode="numeric"
                                   oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                                   required>
                        </div>

                    </div>

                    <hr class="my-4">

                    <label class="form-label fw-semibold">Payment Method</label>

                    <select class="form-select mb-4" name="paymentMethod" required>

                        <option value="">Select Payment Method</option>

                        <option value="COD">
                            Cash On Delivery
                        </option>

                        <option value="ONLINE">
                            Online Payment
                        </option>

                    </select>

                    <button type="submit" class="btn btn-place w-100">

                        <i class="bi bi-lock-fill me-2"></i>
                        Place Order Securely

                    </button>

                </form>

            </div>

        </div>

        <div class="col-lg-5">

            <div class="order-summary p-4">

                <h5 class="fw-bold mb-4">Order Summary</h5>

                <div th:if="${cart != null && !#lists.isEmpty(cart.cartItems)}">

                    <div class="summary-row">
                        <span>Items</span>
                        <span th:text="${#lists.size(cart.cartItems)}"></span>
                    </div>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>
₹
<span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}"></span>
</span>
                    </div>

                    <div class="summary-row">
                        <span>Shipping</span>
                        <span class="text-success">Free</span>
                    </div>

                    <hr>

                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span>
₹
<span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}"></span>
</span>
                    </div>

                    <div class="secure-note">
                        <i class="bi bi-shield-lock-fill text-success"></i>
                        Payment information processed securely
                    </div>

                </div>

                <div th:if="${cart == null || #lists.isEmpty(cart.cartItems)}"
                     class="text-muted text-center">

                    Your cart is empty

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    document.getElementById("pincode").addEventListener("keyup",function(){

    let pincode=this.value;

    if(pincode.length===6){

    document.getElementById("city").value="Loading...";
    document.getElementById("state").value="Loading...";

    fetch("https://api.postalpincode.in/pincode/"+pincode)

    .then(response=>response.json())

    .then(data=>{

    if(data[0].Status==="Success"){

    let postOffice=data[0].PostOffice[0];

    document.getElementById("city").value=postOffice.District;
    document.getElementById("state").value=postOffice.State;

    }else{

    alert("Invalid Pincode");

    document.getElementById("city").value="";
    document.getElementById("state").value="";

    }

    });

    }

    });

</script>

</body>
</html>
