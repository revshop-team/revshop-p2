<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Cart</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
        font-family:'Poppins',sans-serif;
        background:linear-gradient(135deg,#0A192F,#132a4d,#1b355d);
        background-size:300% 300%;
        animation:bgMove 12s ease infinite;
        min-height:100vh;
        color:white;
        }

        @keyframes bgMove{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
        }

        /* TITLE */

        .page-title{
        font-weight:700;
        font-size:32px;
        color:#D4AF37;
        letter-spacing:.4px;
        }

        /* CART CARD */

        .cart-card{
        border-radius:18px;
        border:none;
        background:linear-gradient(145deg,#ffffff,#f6f7fb);
        color:#0A192F;
        box-shadow:0 20px 50px rgba(0,0,0,.35);
        transition:.35s;
        }

        .cart-card:hover{
        transform:translateY(-4px);
        box-shadow:0 30px 70px rgba(0,0,0,.45);
        }

        /* ORDER SUMMARY */

        .order-summary{
        border-radius:20px;
        border:none;
        background:linear-gradient(145deg,#ffffff,#f6f7fb);
        color:#0A192F;
        box-shadow:0 20px 50px rgba(0,0,0,.35);
        position:sticky;
        top:30px;
        }

        /* PRICE */

        .price-text{
        font-size:18px;
        }

        /* QTY BUTTONS */

        .qty-btn-group .btn{
        min-width:40px;
        font-weight:600;
        }

        /* WARNING */

        .stock-warning{
        font-size:12px;
        font-weight:500;
        color:#dc3545;
        }

        /* CHECKOUT BUTTON */

        .btn-checkout{
        background:#D4AF37;
        border:none;
        color:#0A192F;
        font-weight:600;
        padding:12px;
        border-radius:12px;
        font-size:16px;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        text-decoration:none;
        transition:all .3s ease;
        }

        .btn-checkout:hover{
        background:#0A192F;
        color:#D4AF37;
        transform:translateY(-2px);
        box-shadow:0 10px 25px rgba(0,0,0,.4);
        }

    </style>

</head>

<body>

<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <h3 class="page-title mb-4">Shopping Cart</h3>

    <div class="row g-4">

        <!-- CART ITEMS -->

        <div class="col-lg-8">

            <div th:if="${cart == null || #lists.isEmpty(cart.cartItems)}"
                 class="alert alert-info rounded-4">

                Your cart is empty.

            </div>

            <div th:if="${cart != null && !#lists.isEmpty(cart.cartItems)}">

                <div class="card mb-3 cart-card"
                     th:each="item : ${cart.cartItems}">

                    <div class="card-body">

                        <div class="row align-items-center">

                            <!-- IMAGE -->

                            <div class="col-md-2 text-center">

                                <img th:src="@{/images/{img}(img=${item.product.imageName})}"
                                     class="img-fluid rounded"
                                     style="height:80px; object-fit:cover;">

                            </div>

                            <!-- NAME -->

                            <div class="col-md-4">

                                <h6 class="fw-semibold mb-1"
                                    th:text="${item.product.productName}"></h6>

                                <small class="text-muted d-block"
                                       th:text="${item.product.description}"></small>

                                <small class="text-muted">
                                    Available Stock:
                                    <span th:text="${item.product.stock}"></span>
                                </small>

                            </div>

                            <!-- PRICE -->

                            <div class="col-md-2 text-center">

<span class="text-success fw-semibold price-text">
₹ <span th:text="${item.product.sellingPrice}"></span>
</span>

                            </div>

                            <!-- QUANTITY -->

                            <div class="col-md-2 text-center">

                                <div class="btn-group btn-group-sm qty-btn-group">

                                    <a th:href="@{/buyer/cart/decrease/{id}(id=${item.cartItemId})}"
                                       class="btn btn-outline-secondary">
                                        −
                                    </a>

                                    <button class="btn btn-light" disabled
                                            th:text="${item.quantity}">
                                    </button>

                                    <a th:if="${item.quantity < item.product.stock}"
                                       th:href="@{/buyer/cart/increase/{id}(id=${item.cartItemId})}"
                                       class="btn btn-outline-secondary">
                                        +
                                    </a>

                                    <button th:if="${item.quantity >= item.product.stock}"
                                            class="btn btn-outline-secondary"
                                            disabled>
                                        +
                                    </button>

                                </div>

                                <div class="stock-warning mt-1"
                                     th:if="${item.quantity >= item.product.stock}">
                                    Maximum stock reached (Only
                                    <span th:text="${item.product.stock}"></span> available)
                                </div>

                                <div class="mt-2">

                                    <form th:action="@{/buyer/cart/remove/{id}(id=${item.cartItemId})}"
                                          method="post">

                                        <button type="submit"
                                                class="btn btn-sm btn-outline-danger w-100">
                                            Remove
                                        </button>

                                    </form>

                                </div>

                            </div>

                            <!-- TOTAL -->

                            <div class="col-md-2 text-end">

<span class="fw-bold price-text">

₹
<span th:text="${item.product.sellingPrice * item.quantity}"></span>

</span>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- ORDER SUMMARY -->

        <div class="col-lg-4">

            <div class="card order-summary">

                <div class="card-body">

                    <h5 class="fw-bold mb-4">Order Summary</h5>

                    <div th:if="${cart != null && !#lists.isEmpty(cart.cartItems)}">

                        <div class="d-flex justify-content-between mb-2">
                            <span>Items</span>
                            <span th:text="${#lists.size(cart.cartItems)}"></span>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal</span>
                            <span>
₹
<span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}">
</span>
</span>
                        </div>

                        <div class="d-flex justify-content-between mb-3">
                            <span>Shipping</span>
                            <span class="text-success">Free</span>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between fw-bold fs-5 mb-4">

                            <span>Total</span>

                            <span>
₹
<span th:text="${#aggregates.sum(cart.cartItems.?[true].![product.sellingPrice * quantity])}">
</span>
</span>

                        </div>

                        <a th:href="@{/buyer/cart/checkout}"
                           class="btn-checkout w-100">

                            <i class="bi bi-lock-fill"></i>
                            Proceed to Checkout

                        </a>

                    </div>

                    <div th:if="${cart == null || #lists.isEmpty(cart.cartItems)}"
                         class="text-muted text-center">

                        Nothing to summarize.

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
