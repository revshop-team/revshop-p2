<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>RevShop | Shop</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(180deg,#0A192F,#112240);
            min-height:100vh;
            color:white;
            overflow-x:hidden;
        }

        /* TITLE */
        .page-title{
            font-weight:700;
            color:#D4AF37;
            animation:titleFloat 4s ease-in-out infinite alternate;
        }

        @keyframes titleFloat{
            0%{transform:translateY(0)}
            100%{transform:translateY(-5px)}
        }

        /* PRODUCT CARDS */
        .product-card{
            border:none;
            border-radius:18px;
            overflow:hidden;
            background:white;
            color:#0A192F;
            box-shadow:0 12px 30px rgba(0,0,0,.3);
            transition:.5s;
            position:relative;
            animation:slideUp 1.2s ease forwards, floatCard 4s ease-in-out infinite;
            opacity:0;
        }

        @keyframes slideUp{
            0%{transform:translateY(80px);opacity:0;}
            100%{transform:translateY(0);opacity:1;}
        }

        @keyframes floatCard{
            0%{transform:translateY(0)}
            50%{transform:translateY(-8px)}
            100%{transform:translateY(0)}
        }

        .product-card:hover{
            transform:translateY(-12px) scale(1.03);
            box-shadow:0 25px 60px rgba(0,0,0,.45);
        }

        /* IMAGE ZOOM */
        .product-img{
            height:200px;
            object-fit:cover;
            transition:transform .6s ease;
        }

        .product-card:hover .product-img{
            transform:scale(1.12);
        }

        /* PRICE */
        .price{
            font-size:18px;
            font-weight:600;
        }

        .mrp{
            text-decoration:line-through;
            font-size:14px;
            color:#6c757d;
        }

        /* DISCOUNT */
        .discount-badge{
            background:#D4AF37;
            color:#0A192F;
            font-weight:600;
        }

        /* =================================================
           SORT BUTTON STYLING & NEW ANIMATION
           ================================================= */
        .sort-dropdown{
            border-radius:30px;
            padding:10px 40px 10px 22px;
            font-weight:600;
            border:2px solid #D4AF37;

            background-color:#0A192F;
            color:#D4AF37;

            box-shadow:0 8px 20px rgba(0,0,0,.35);
            cursor:pointer;
            transition:all .35s ease;

            appearance:none;
            background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23D4AF37%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat:no-repeat;
            background-position:right 15px top 50%;
            background-size:12px auto;

            /* Added floating and pulsing animation */
            animation: sortFloat 3s ease-in-out infinite alternate, pulseSort 2s infinite alternate;
        }

        /* Sort animations */
        @keyframes pulseSort {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            100% { box-shadow: 0 0 15px 5px rgba(212, 175, 55, 0.1); }
        }

        @keyframes sortFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }

        .sort-dropdown:hover, .sort-dropdown:focus{
            background-color:#D4AF37;
            color:#0A192F;
            transform:translateY(-5px) scale(1.03);
            box-shadow:0 14px 35px rgba(212, 175, 55, .4);
            outline:none;
            animation-play-state: paused; /* Pauses float/pulse on hover */

            background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%230A192F%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }

        .sort-dropdown option {
            background:#0A192F;
            color:white;
            font-weight:500;
        }

        /* =================================================
           BUTTONS
           ================================================= */
        .btn-cart{
            background:linear-gradient(135deg,#D4AF37,#e6c557);
            border:none;
            color:#0A192F;
            font-weight:600;
            transition:.35s;
        }

        .btn-cart:hover{
            background:linear-gradient(135deg,#e6c557,#ffd95e);
            transform:scale(1.06);
            box-shadow:0 10px 25px rgba(0,0,0,.35);
        }

        .btn-details{
            border:1px solid #0A192F;
            color:#0A192F;
            transition:.35s;
        }

        /* NEW BLUE HOVER EFFECT */
        .btn-details:hover{
            background-color:#0d6efd !important;
            border-color:#0d6efd !important;
            color:white !important;
            transform:scale(1.05);
            box-shadow:0 10px 25px rgba(13, 110, 253, .4) !important;
        }

        /* HEART */
        .favourite-btn{
            position:absolute;
            top:10px;
            right:10px;
            background:white;
            border:none;
            border-radius:50%;
            width:38px;
            height:38px;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 6px 15px rgba(0,0,0,.25);
            cursor:pointer;
            z-index:5;
        }

        .heart-icon{
            color:#999;
            font-size:20px;
            transition:.3s;
        }

        .heart-icon.active{
            color:#ff4d6d;
            animation:heartPop .4s ease;
        }

        @keyframes heartPop{
            0%{transform:scale(1);}
            40%{transform:scale(1.5);}
            70%{transform:scale(1.2);}
            100%{transform:scale(1);}
        }

        /* CATEGORY BUTTON */
        .btn-outline-primary{
            border-color:#D4AF37;
            color:#D4AF37;
        }

        .btn-outline-primary:hover{
            background:#D4AF37;
            color:#0A192F;
            transform:scale(1.05);
        }

        /* PAGINATION */
        .pagination .page-link{
            border-radius:50px;
            padding:6px 14px;
            border:none;
            color:#0A192F;
        }

        .page-item.active .page-link{
            background:#D4AF37;
            color:#0A192F;
        }

        /* =================================================
           NEW CART TOAST POPUP (Top Middle Green)
           ================================================= */
        .cart-toast {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-40px);
            background: #198754;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 10px 30px rgba(25, 135, 84, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
        }

        .cart-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

    </style>
</head>

<body>

<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<div id="cartToast" class="cart-toast">
    <i class="bi bi-check-circle-fill fs-5"></i>
    Added to Cart Successfully
</div>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

        <h3 class="page-title">Explore Products</h3>

        <form method="get" th:action="@{/buyer/products}">

            <input type="hidden" name="page" value="0"/>
            <input type="hidden" name="keyword" th:value="${keyword}"/>
            <input type="hidden" name="categoryId" th:value="${selectedCategoryId}"/>

            <select class="sort-dropdown"
                    name="sort"
                    onchange="this.form.submit()">

                <option value="default" th:selected="${sort == 'default'}">Sort By</option>
                <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Price: Low to High</option>
                <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Price: High to Low</option>
                <option value="newest" th:selected="${sort == 'newest'}">Newest</option>

            </select>

        </form>

    </div>

    <div class="row g-4"
         th:if="${!productPage.content.isEmpty()}">

        <div class="col-md-4 col-lg-3"
             th:each="product : ${productPage.content}">

            <div class="card product-card h-100">

                <form th:action="@{/buyer/favourite/toggle/{id}(id=${product.productId})}"
                      method="post"
                      class="position-absolute top-0 end-0 m-2">

                    <input type="hidden" name="redirectTo" value="products"/>

                    <button type="submit" class="favourite-btn">

                        <i th:if="${favouriteProductIds.contains(product.productId)}"
                           class="bi bi-heart-fill heart-icon active"></i>

                        <i th:unless="${favouriteProductIds.contains(product.productId)}"
                           class="bi bi-heart heart-icon"></i>

                    </button>

                </form>

                <img src="https://via.placeholder.com/300x200"
                     class="card-img-top product-img">

                <div class="card-body d-flex flex-column">

                    <h6 class="fw-semibold"
                        th:text="${product.productName}"></h6>

                    <p class="text-muted small"
                       th:text="${product.description}"></p>

                    <div class="mb-2">

                        <span class="price">
                        ₹ <span th:text="${product.sellingPrice}"></span>
                        </span>

                        <span class="ms-2 mrp">
                        ₹ <span th:text="${product.mrp}"></span>
                        </span>

                    </div>

                    <span class="badge discount-badge mb-3 w-50"
                          th:if="${product.mrp != null and product.mrp > product.sellingPrice}"
                          th:text="${T(java.lang.Math).round((product.mrp - product.sellingPrice) * 100 / product.mrp)} + '% OFF'">
                    </span>

                    <div class="mt-auto">

                        <a class="btn btn-details btn-sm w-100 mb-2"
                           th:href="@{/buyer/product/{id}(id=${product.productId})}">
                            View Details
                        </a>

                        <a th:if="${product.stock > 0}"
                           th:href="@{/buyer/cart/add/{id}(id=${product.productId})}"
                           class="btn btn-cart btn-sm w-100 addCartBtn">
                            Add to Cart
                        </a>

                        <button th:if="${product.stock == 0}"
                                class="btn btn-secondary btn-sm w-100"
                                disabled>
                            Out of Stock
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
    document.querySelectorAll(".addCartBtn").forEach(btn => {
        btn.addEventListener("click", function(e) {
            // Prevent immediate redirect so the animation can play
            e.preventDefault();

            const targetUrl = this.getAttribute("href");
            const toast = document.getElementById("cartToast");

            // Show the popup
            toast.classList.add("show");

            // Wait 1.5 seconds, then hide the popup and redirect to cart
            setTimeout(() => {
                toast.classList.remove("show");
                window.location.href = targetUrl;
            }, 1500);
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
