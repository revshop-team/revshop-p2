<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Notifications | RevShop</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f8;
        }

        .notification-card {
            border: none;
            border-radius: 18px;
            padding: 18px;
            transition: 0.25s ease;
        }

        .notification-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .unread {
            border-left: 5px solid #0d6efd;
            background: #ffffff;
        }

        .read {
            background: #f8f9fa;
            opacity: 0.9;
        }

        .icon-box {
            font-size: 28px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .placed-icon {
            background: #e7f1ff;
            color: #0d6efd;
        }

        .delivered-icon {
            background: #e9f7ef;
            color: #198754;
        }

        .time-text {
            font-size: 13px;
            color: #6c757d;
        }

        .section-title {
            font-weight: 700;
        }
    </style>
</head>

<body>

<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">🔔 My Notifications</h2>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${notifications == null || #lists.isEmpty(notifications)}"
         class="alert alert-info text-center rounded-4">
        No notifications yet.
    </div>

    <!-- NOTIFICATION LIST -->
    <div th:each="n : ${notifications}"
         th:class="'notification-card shadow-sm mb-3 ' + (${n.isRead} == 'N' ? 'unread' : 'read')">

        <div class="d-flex justify-content-between align-items-center">

            <!-- LEFT SIDE -->
            <div class="d-flex align-items-center gap-3">

                <!-- ORDER PLACED -->
                <div th:if="${#strings.contains(n.message, 'placed')}"
                     class="icon-box placed-icon">
                    📦
                </div>

                <!-- ORDER DELIVERED -->
                <div th:if="${#strings.contains(n.message, 'delivered')}"
                     class="icon-box delivered-icon">
                    🚚
                </div>

                <!-- TEXT -->
                <div>
                    <div class="fw-semibold fs-5"
                         th:text="${n.message}">
                    </div>

                    <div class="time-text"
                         th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy, hh:mm a')}">
                    </div>
                </div>

            </div>

            <!-- RIGHT SIDE -->
            <div class="text-end">

                <!-- NEW BADGE -->
                <span th:if="${n.isRead == 'N'}"
                      class="badge bg-danger mb-2">
                    NEW
                </span>

                <!-- TYPE BADGE -->
                <div>
                    <span th:if="${#strings.contains(n.message, 'placed')}"
                          class="badge bg-primary">
                        ORDER PLACED
                    </span>

                    <span th:if="${#strings.contains(n.message, 'delivered')}"
                          class="badge bg-success">
                        DELIVERED
                    </span>
                </div>

                <!-- MARK AS READ -->
                <div class="mt-2" th:if="${n.isRead == 'N'}">
                    <a th:href="@{/buyer/notifications/read/{id}(id=${n.notificationId})}"
                       class="btn btn-sm btn-outline-primary">
                        Mark as Read
                    </a>
                </div>

                <!-- REMOVE BUTTON -->
                <div class="mt-2" th:if="${n.isRead == 'Y'}">
                    <a th:href="@{/buyer/notifications/delete/{id}(id=${n.notificationId})}"
                       onclick="return confirm('Remove this notification?')"
                       class="btn btn-sm btn-outline-danger">
                        Remove
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
