<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Orders | RevShop</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">
        RevShop - Seller
    </a>
</nav>

<div class="container mt-5">

    <h3 class="fw-bold mb-4">Orders For Your Products</h3>

    <!-- Empty -->
    <div th:if="${orderItems == null || #lists.isEmpty(orderItems)}"
         class="alert alert-info text-center">
        No orders received yet for your products.
    </div>

    <!-- Order Cards -->
    <div th:each="item : ${orderItems}" class="card shadow-sm mb-4">
        <div class="card-body">

            <!--  HEADER -->
            <div class="d-flex justify-content-between">
                <div>
                    <h5 class="fw-bold">
                        Order #<span th:text="${item.order.orderId}"></span>
                    </h5>
                    <small class="text-muted">
                        Placed on:
                        <span th:text="${#temporals.format(item.order.orderDate, 'dd MMM yyyy, hh:mm a')}"></span>
                    </small>
                </div>

                <span class="badge bg-primary fs-6"
                      th:text="${item.order.status}"></span>
            </div>

            <hr>

            <!--  PRODUCT INFO -->
            <h6 class="fw-bold mb-2">Product Details</h6>
            <p class="mb-1">
                <strong>Name:</strong>
                <span th:text="${item.product.productName}"></span>
            </p>
            <p class="mb-1">
                <strong>Quantity:</strong>
                <span th:text="${item.quantity}"></span>
            </p>
            <p class="mb-2">
                <strong>Amount:</strong>
                ₹ <span th:text="${item.price * item.quantity}"></span>
            </p>

            <hr>

            <!-- PAYMENT INFO -->
            <h6 class="fw-bold mb-2">Payment Details</h6>
            <div th:if="${paymentMap[item.order.orderId] != null}">
                <p class="mb-1">
                    <strong>Method:</strong>
                    <span th:text="${paymentMap[item.order.orderId].paymentMethod}"></span>
                </p>
                <p class="mb-1">
                    <strong>Status:</strong>
                    <span class="badge bg-success"
                          th:text="${paymentMap[item.order.orderId].paymentStatus}"></span>
                </p>
                <p class="mb-2">
                    <strong>Paid At:</strong>
                    <span th:text="${paymentMap[item.order.orderId].paidAt}"></span>
                </p>
            </div>

            <hr>

            <!--  ADDRESS -->
            <h6 class="fw-bold mb-2">Shipping Address</h6>
            <div th:if="${addressMap[item.order.orderId] != null}">
                <p class="mb-0">
                    <span th:text="${addressMap[item.order.orderId].fullName}"></span>,
                    <span th:text="${addressMap[item.order.orderId].phone}"></span><br>

                    <span th:text="${addressMap[item.order.orderId].addressLine1}"></span>,
                    <span th:text="${addressMap[item.order.orderId].addressLine2}"></span><br>

                    <span th:text="${addressMap[item.order.orderId].city}"></span> -
                    <span th:text="${addressMap[item.order.orderId].pincode}"></span>,
                    <span th:text="${addressMap[item.order.orderId].state}"></span>
                </p>
            </div>

            <hr>

            <!--  BUYER -->
            <p class="mb-0">
                <strong>Buyer:</strong>
                <span th:text="${item.order.buyer.email}"></span>
            </p>

        </div>
    </div>

</div>
</body>
</html>
