<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product | RevShop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons (REQUIRED) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background-color: #f5f7fa; }

        .form-card { border-radius: 16px; }

        .form-label { font-weight: 600; }

        .image-preview {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px dashed #dee2e6;
    margin-top: 10px;
    display: none;
}

        .error-text {
            color: red;
            font-size: 13px;
        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#sellerNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="sellerNavbar">
        <div class="ms-auto d-flex align-items-center gap-4">

            <!-- Notifications -->
            <a th:href="@{/seller/notifications}"
               class="position-relative text-light text-decoration-none">
                <i class="bi bi-bell fs-5"></i>

                <span id="notificationCount"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                    0
                </span>
            </a>

            <!-- Account Dropdown -->
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    My Account
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li>
                        <a class="dropdown-item" th:href="@{/seller/profile}">
                            <i class="bi bi-person me-2"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item text-danger" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<!-- ================= PAGE CONTENT ================= -->
<div class="container mt-5">
    <div class="card shadow p-4 form-card">

        <h3 class="mb-4 fw-bold">Add New Product</h3>

        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/seller/save-product}"
              th:object="${product}"
              method="post"
              onsubmit="return validateProductForm()">

            <!-- Product Name -->
            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" id="productName"
                       class="form-control"
                       th:field="*{productName}" required>
            </div>

            <!-- Manufacturer -->
            <div class="mb-3">
                <label class="form-label">Manufacturer</label>
                <input type="text" id="manufacturer"
                       class="form-control"
                       th:field="*{manufacturer}" required>
            </div>

            <!-- MRP -->
            <div class="mb-3">
                <label class="form-label">MRP (₹)</label>
                <input type="number" step="0.01" id="mrp"
                       class="form-control"
                       th:field="*{mrp}" required>
                <div id="priceError" class="error-text"></div>
            </div>

            <!-- Selling Price -->
            <div class="mb-3">
                <label class="form-label">Selling Price (₹)</label>
                <input type="number" step="0.01" id="sellingPrice"
                       class="form-control"
                       th:field="*{sellingPrice}" required>
            </div>

            <!-- Stock -->
            <div class="mb-3">
                <label class="form-label">Stock Quantity</label>
                <input type="number" id="stock"
                       class="form-control"
                       th:field="*{stock}" required>
            </div>

            <!-- Category -->
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select"
                        id="category"
                        th:field="*{category.categoryId}" required>
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.categoryId}"
                            th:text="${cat.categoryName}">
                    </option>
                </select>
            </div>

            <!-- Image -->
            <!-- Product Image -->
            <div class="mb-3">
                <label class="form-label">
                    Product Image
                    <small class="text-muted">(auto selected based on category)</small>
                </label>
                <img id="imagePreview"
                     class="image-preview"
                     src="/images/default.png"
                     alt="Preview"
                     style="display:block;">

                <input type="hidden"
                       id="imageName"
                       th:field="*{imageName}">
            </div>

            <button type="submit" class="btn btn-success w-100">
                Save Product
            </button>

        </form>
    </div>
</div>

<!-- ================= IMAGE PREVIEW ================= -->
<script>

    document.addEventListener("DOMContentLoaded", function(){

        function loadNotificationCount() {
            fetch('/seller/notifications/unread-count')
                .then(res => res.text())
                .then(count => {

                    const badge = document.getElementById('notificationCount');
                    const num = parseInt(count);

                    if (!isNaN(num) && num > 0) {
                        badge.classList.remove('d-none');
                        badge.textContent = num;
                    } else {
                        badge.classList.add('d-none');
                    }

                });
        }

        loadNotificationCount();
        setInterval(loadNotificationCount, 5000);


        const category = document.getElementById("category");

        category.addEventListener("change", function(){

            const selectedCategory = this.options[this.selectedIndex].text;

            const imageMap = {

                "Electronics": "electronics.png",
                "Mobiles": "mobile.png",
                "Laptops": "laptop.png",
                "Books": "books.png",
                "Fashion": "fashion.png",
                "Home & Kitchen": "home_kitchen.png",
                "Furniture": "furniture.png",
                "Groceries": "groceries.png",
                "Beauty": "beauty.png",
                "Sports": "sports.png",
                "Toys": "toys.png"

            };

            let image = imageMap[selectedCategory] || "default.png";

            document.getElementById("imagePreview").src = "/images/" + image;
            document.getElementById("imagePreview").style.display = "block";

            document.getElementById("imageName").value = image;

        });

    });

</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
