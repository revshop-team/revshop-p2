<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">RevShop - Seller</a>
    <a class="navbar-brand me-4" th:href="@{/seller/dashboard}">Dashboard</a>

    <div class="ms-auto dropdown">
        <button class="btn btn-light btn-sm dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown">
            My Account
        </button>

        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" th:href="@{/seller/profile}">Profile</a></li>
            <li><a class="dropdown-item" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>
<div class="container mt-5">
    <div class="card shadow p-4">

        <h3 class="mb-4">Add New Product</h3>

        <form th:action="@{/seller/save-product}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

            <!-- Product Name -->
            <div class="mb-3">
                <label>Product Name</label>
                <input type="text" class="form-control"
                       th:field="*{productName}" required>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label>Description</label>
                <textarea class="form-control"
                          th:field="*{description}"></textarea>
            </div>

            <!-- Manufacturer -->
            <div class="mb-3">
                <label>Manufacturer</label>
                <input type="text" class="form-control"
                       th:field="*{manufacturer}" required>
            </div>

            <!-- MRP -->
            <div class="mb-3">
                <label>MRP</label>
                <input type="number" step="0.01"
                       class="form-control"
                       th:field="*{mrp}">
            </div>

            <!-- Selling Price -->
            <div class="mb-3">
                <label>Selling Price</label>
                <input type="number" step="0.01"
                       class="form-control"
                       th:field="*{sellingPrice}" required>
            </div>

            <!-- Stock -->
            <div class="mb-3">
                <label>Stock Quantity</label>
                <input type="number"
                       class="form-control"
                       th:field="*{stock}" required>
            </div>

            <!-- Threshold -->
            <div class="mb-3">
                <label>Stock Threshold (Low Alert)</label>
                <input type="number"
                       class="form-control"
                       th:field="*{stockThreshold}" required>
            </div>

            <!-- Category -->
            <div class="mb-3">
                <!-- Category Dropdown -->
                <select th:field="*{category.categoryId}">
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.categoryId}"
                            th:text="${cat.categoryName}">
                    </option>
                </select>
            </div>

            <!-- Image -->
            <div class="mb-3">
                <label>Product Image</label>
                <input type="file"
                       name="imageFile"
                       class="form-control"
                       required>
            </div>

            <button type="submit" class="btn btn-success">
                Save Product
            </button>

        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
