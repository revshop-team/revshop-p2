<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Payment Cancelled | RevShop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0A192F, #132a4d, #1b355d);
            background-size: 300% 300%;
            animation: bgMove 14s ease infinite;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cancel-card {
            max-width: 500px;
            width: 100%;
            border: none;
            border-radius: 20px;
            background: linear-gradient(145deg, #ffffff, #f6f7fb);
            color: #0A192F;
            box-shadow: 0 18px 40px rgba(0,0,0,.35);
            transition: .45s ease;
            animation: slideUp 0.8s ease forwards, floatItem 6s ease-in-out infinite;
            opacity: 0;
            padding: 40px 30px;
        }

        .cancel-card:hover {
            box-shadow: 0 30px 70px rgba(0,0,0,.5);
        }

        @keyframes slideUp {
            0% { transform: translateY(60px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes floatItem {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: #ffe6e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #dc3545;
            font-size: 45px;
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.2);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        .cancel-title {
            font-weight: 700;
            color: #dc3545;
            letter-spacing: 0.5px;
        }

        /* BUTTONS */
        .btn-action {
            background: #D4AF37 !important;
            border: 2px solid transparent !important;
            color: #0A192F !important;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px 24px;
            transition: all .35s ease !important;
            letter-spacing: .3px;
        }

        .btn-action:hover {
            background: #0A192F !important;
            border-color: #0A192F !important;
            color: #D4AF37 !important;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(10,25,47,.2) !important;
        }

        .btn-outline-action {
            background: transparent;
            border: 2px solid #0A192F;
            color: #0A192F;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px 24px;
            transition: all .35s ease;
            letter-spacing: .3px;
        }

        .btn-outline-action:hover {
            background: #0A192F;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(10,25,47,.2);
        }

    </style>

</head>

<body>

<div class="container px-4">

    <div class="card cancel-card text-center mx-auto">

        <div class="icon-wrapper">
            <i class="bi bi-x-lg"></i>
        </div>

        <h2 class="mt-2 cancel-title">
            Payment Cancelled
        </h2>

        <p class="text-muted mt-3 mb-4" style="font-size: 15px;">
            You cancelled the payment. Your order was not placed. Don't worry, no charges were made to your account.
        </p>

        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-2">

            <a th:href="@{/buyer/products}" class="btn btn-action">
                <i class="bi bi-cart me-2"></i>Continue Shopping
            </a>

            <a th:href="@{/buyer/orders}" class="btn btn-outline-action">
                <i class="bi bi-box-seam me-2"></i>My Orders
            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
