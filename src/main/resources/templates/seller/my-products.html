<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand" th:href="@{/seller/dashboard}">RevShop - Seller</a>
  <a class="navbar-brand me-4" th:href="@{/seller/dashboard}">Dashboard</a>

  <div class="ms-auto dropdown">
    <button class="btn btn-light btn-sm dropdown-toggle"
            type="button"
            data-bs-toggle="dropdown">
      My Account
    </button>

    <ul class="dropdown-menu dropdown-menu-end">
      <li><a class="dropdown-item" th:href="@{/seller/profile}">Profile</a></li>
      <li><a class="dropdown-item" th:href="@{/logout}">Logout</a></li>
    </ul>
  </div>
</nav>
<div class="container mt-5">
  <h3>My Products</h3>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" th:href="@{/seller/dashboard}">RevShop Seller Dashboard</a>
    </div>
  </nav>
  <table class="table table-bordered table-striped mt-3">
    <thead class="table-dark">
    <tr>
      <th>Image</th>
      <th>Name</th>
      <th>Category</th>
      <th>Stock</th>
      <th>Threshold</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
      <td>
        <img th:src="@{'/product-images/' + ${product.imageName}}" width="60" height="60" class="img-thumbnail"/>
      </td>
      <td th:text="${product.productName}"></td>
      <td th:text="${product.category != null ? product.category.categoryName : 'N/A'}"></td>
      <td th:text="${product.stock}"></td>
      <td th:text="${product.stockThreshold}"></td>
      <td>
        <span th:if="${product.stock <= product.stockThreshold}" class="badge bg-danger">Low Stock</span>
        <span th:if="${product.stock > product.stockThreshold}" class="badge bg-success">In Stock</span>
      </td>

      <td>
        <a th:href="@{'/seller/edit-product/' + ${product.productId}}" class="btn btn-primary btn-sm">Edit</a>
        <button class="btn btn-danger btn-sm"
                th:onclick="'confirmDelete(' + ${product.productId} + ')'" type="button">
          Delete
        </button>
      </td>
    </tr>
    </tbody>
  </table>
</div>
<script>
  function confirmDelete(productId) {
      if (confirm("Do you want to delete this product?")) {
          // redirect to delete endpoint
          window.location.href = '/seller/delete-product/' + productId;
      }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
