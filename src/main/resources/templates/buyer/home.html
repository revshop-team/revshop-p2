<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Buyer Home</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg,#f8fafc,#eef2f7);
        }

        .welcome-card {
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color: white;
            border-radius: 16px;
        }

        .welcome-card .btn-light {
            font-weight: 500;
        }

        .section-title {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .product-card {
            border: none;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .product-card img {
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        .price {
            font-size: 1.1rem;
        }

        footer {
            background: transparent;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div class="container py-5">

    <!-- Welcome Hero Card -->
    <div class="welcome-card p-4 p-md-5 shadow-lg mb-5">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>
                <h3 class="fw-bold mb-2">
                    Welcome back,
                    <span class="text-warning"
                          th:text="${buyerEmail}"></span>
                </h3>
                <p class="mb-0 text-light opacity-75">
                    Discover fresh arrivals curated just for you.
                </p>
            </div>

            <div class="mt-4 mt-md-0">
                <a th:href="@{/buyer/products}"
                   class="btn btn-warning px-4 me-2 shadow-sm">
                    Browse Products
                </a>

                <a th:href="@{/buyer/orders}"
                   class="btn btn-outline-light px-4">
                    My Orders
                </a>
            </div>

        </div>

    </div>

    <!-- Section Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="section-title mb-0">Latest Products</h4>
        <a th:href="@{/buyer/products}"
           class="text-decoration-none fw-semibold text-primary">
            View All →
        </a>
    </div>

    <!-- Product Grid -->
    <div class="row g-4">

        <div class="col-xl-3 col-lg-4 col-md-6"
             th:each="product : ${latestProducts}">

            <div class="card product-card shadow-sm h-100">

                <img th:src="@{/images/{img}(img=${product.imageName})}"
                     class="card-img-top"
                     style="height:220px; object-fit:cover;">

                <div class="card-body d-flex flex-column p-4">

                    <h6 class="fw-semibold mb-2"
                        th:text="${product.productName}">
                    </h6>

                    <p class="price text-success fw-bold mb-2"
                       th:text="'₹ ' + ${product.sellingPrice}">
                    </p>

                    <div class="mb-3">
                        <span th:if="${product.stock > 0}"
                              class="badge bg-success-subtle text-success">
                            In Stock
                        </span>

                        <span th:if="${product.stock == 0}"
                              class="badge bg-danger-subtle text-danger">
                            Out of Stock
                        </span>
                    </div>

                    <div class="mt-auto">
                        <a th:href="@{/buyer/product/{id}(id=${product.productId})}"
                           class="btn btn-dark w-100 rounded-pill">
                            View Details
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->
<footer class="py-4 mt-5 text-center text-muted small">
    © 2026 RevShop. Crafted with precision.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
