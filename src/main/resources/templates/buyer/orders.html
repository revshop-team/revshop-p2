<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | My Orders</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
        background:linear-gradient(135deg,#0f1c3f,#142b6f,#1f3f9e);
        min-height:100vh;
        font-family:'Poppins',sans-serif;
        color:white;
        overflow-x:hidden;
        }

        /* Navbar Fix */

        .navbar{
        position:relative;
        z-index:1050!important;
        }

        /* Page Title */

        .page-title{
        font-weight:700;
        font-size:32px;
        color:#D4AF37;
        letter-spacing:1px;
        }

        /* Order Card */

        .order-card{
        border:none;
        border-radius:20px;
        background:white;
        color:#0f1c3f;
        transition:.3s ease;
        overflow:hidden;
        }

        .order-card:hover{
        transform:translateY(-6px);
        box-shadow:0 20px 50px rgba(0,0,0,.35);
        }

        /* Header */

        .order-header{
        background:linear-gradient(135deg,#0f1c3f,#1f3f9e);
        padding:20px 24px;
        color:white;
        }

        /* Product Row */

        .product-row{
        color:#0A192F;
        font-weight:500;
        padding-bottom:12px;
        border-bottom:1px solid #e5e7eb;
        }

        .product-row:last-child{
        border-bottom:none;
        }

        /* Product Image */

        .product-img{
        width:60px;
        height:60px;
        object-fit:cover;
        border-radius:10px;
        border:1px solid #e2e8f0;
        }

        /* Total Box */

        .total-box{
        background:linear-gradient(135deg,#D4AF37,#ffcc00);
        border-radius:12px;
        padding:12px 22px;
        font-size:18px;
        color:#0f1c3f;
        display:inline-block;
        font-weight:700;
        }

        /* Retry Button */

        .btn-retry{
        background:#ffcc00;
        color:#0f1c3f;
        font-weight:700;
        border-radius:30px;
        padding:6px 16px;
        text-decoration:none;
        display:inline-flex;
        align-items:center;
        gap:6px;
        }

        .btn-retry:hover{
        background:white;
        color:#dc3545;
        }

        /* Review Box */

        .review-box{
        background:#f8fafc;
        border-radius:12px;
        border:2px dashed #D4AF37;
        }

        /* Badges */

        .badge.bg-primary{
        background:linear-gradient(135deg,#1f3f9e,#3f6df5)!important;
        }

        .badge.bg-success{
        background:linear-gradient(135deg,#16a34a,#22c55e)!important;
        }

        .badge.bg-warning{
        background:linear-gradient(135deg,#D4AF37,#ffcc00)!important;
        color:#0f1c3f!important;
        }

        .badge.bg-danger{
        background:linear-gradient(135deg,#dc2626,#ef4444)!important;
        }

        /* Failed Payment Alert */

        .payment-alert{
        background:#fee2e2;
        color:#991b1b;
        border-radius:10px;
        padding:12px 16px;
        font-size:14px;
        margin-bottom:14px;
        font-weight:500;
        display:flex;
        align-items:center;
        gap:8px;
        }

    </style>

</head>

<body>

<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <h3 class="page-title mb-4">
        <i class="bi bi-box-seam me-2"></i>My Orders
    </h3>

    <!-- Empty Orders -->

    <div th:if="${orders == null || #lists.isEmpty(orders)}"
         class="alert alert-info rounded-4 text-center p-5 shadow-lg bg-white">

        <i class="bi bi-bag-x text-muted mb-3"
           style="font-size:3rem;opacity:.5;"></i>

        <h5 class="fw-bold mt-2" style="color:#0f1c3f;">
            No orders found
        </h5>

        <p class="text-muted">
            You haven’t placed any orders yet.
        </p>

        <a th:href="@{/buyer/products}"
           class="btn btn-warning px-4 py-2 fw-semibold">
            Start Shopping </a>

    </div>

    <!-- Orders Loop -->

    <div th:each="order : ${orders}"
         class="card order-card shadow-lg mb-5 animate__animated animate__fadeInUp">

        <!-- Header -->

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 order-header">

            <div>

                <div class="fw-bold fs-5" style="color:#D4AF37;">
                    Order ID: #<span th:text="${order.orderId}"></span>
                </div>

                <small class="opacity-75">

                    <i class="bi bi-calendar3 me-1"></i>

                    <span th:if="${order.status == 'PLACED'}">
Placed on
</span>

                    <span th:if="${order.status == 'PENDING_PAYMENT'}">
Payment attempt on
</span>

                    <span th:text="${#temporals.format(order.orderDate,'dd MMM yyyy, hh:mm a')}"></span>

                </small>

            </div>

            <div class="d-flex gap-4 align-items-center">

                <div class="text-center">
                    <small class="d-block mb-1 opacity-75"
                           style="font-size:.75rem;text-transform:uppercase;">
                        Order
                    </small>

                    <span class="badge rounded-pill px-3 py-2"
                          th:classappend="${order.status == 'PLACED'} ? ' bg-success' :
(${order.status == 'PENDING_PAYMENT'} ? ' bg-warning text-dark' : ' bg-primary')"
                          th:text="${order.status}"> </span>

                </div>

                <div class="text-center">

                    <small class="d-block mb-1 opacity-75"
                           style="font-size:.75rem;text-transform:uppercase;">
                        Payment </small>

                    <span class="badge rounded-pill px-3 py-2"
                          th:classappend="${paymentStatusMap[order.orderId] == 'SUCCESS'} ? ' bg-success' :
(${paymentStatusMap[order.orderId] == 'PENDING'} ? ' bg-warning text-dark' : ' bg-danger')"
                          th:text="${paymentStatusMap[order.orderId]}"> </span>

                </div>

                <div th:if="${paymentStatusMap[order.orderId] == 'FAILED'}">

                    <a th:href="@{/buyer/payment/{id}(id=${order.orderId})}"
                       class="btn-retry">

                        <i class="bi bi-arrow-clockwise"></i>
                        Retry

                    </a>

                </div>

            </div>

        </div>

        <!-- Body -->

        <div class="card-body p-4">

            <!-- Failed Payment Alert -->

            <div th:if="${paymentStatusMap[order.orderId] == 'FAILED'}"
                 class="payment-alert">

                <i class="bi bi-x-circle"></i>
                Payment failed. Please retry payment to confirm this order.

            </div>

            <!-- Items -->

            <div th:each="item : ${order.orderItems}"
                 class="row align-items-center product-row mb-3">

                <div class="col-md-5 d-flex align-items-center gap-3 fw-semibold">

                    <img th:src="@{/images/{img}(img=${item.product.imageName})}"
                         class="product-img shadow-sm">

                    <span th:text="${item.product.productName}"></span>

                </div>

                <div class="col-md-2 text-muted">
                    ₹ <span th:text="${item.price}"></span>
                </div>

                <div class="col-md-2 text-muted">
                    Qty: <span th:text="${item.quantity}"></span>
                </div>

                <div class="col-md-3 text-end fw-bold">
                    ₹ <span th:text="${item.price * item.quantity}"></span>
                </div>

                <!-- Review Section -->

                <div class="col-12 mt-3"
                     th:if="${order.status == 'DELIVERED'}">

                    <div th:if="${!@reviewServiceImpl.hasReviewed(order.orderId,item.product.productId,buyerEmail)}"
                         class="review-box p-3 mt-2">

                        <h6 class="fw-bold mb-3">
                            ⭐ Write a Review for
                            <span th:text="${item.product.productName}"></span>
                        </h6>

                        <form th:action="@{/buyer/review}" method="post">

                            <input type="hidden" name="orderId"
                                   th:value="${order.orderId}" />

                            <input type="hidden" name="productId"
                                   th:value="${item.product.productId}" />

                            <div class="row g-3">

                                <div class="col-md-3">
                                    <input type="number"
                                           name="rating"
                                           min="1"
                                           max="5"
                                           class="form-control"
                                           placeholder="Rating (1-5)"
                                           required />
                                </div>

                                <div class="col-md-7">
<textarea name="comment"
          class="form-control"
          rows="2"
          placeholder="Share your experience..."
          required></textarea>
                                </div>

                                <div class="col-md-2">
                                    <button type="submit"
                                            class="btn btn-success w-100">
                                        Submit
                                    </button>
                                </div>

                            </div>

                        </form>

                    </div>

                    <div th:if="${@reviewServiceImpl.hasReviewed(order.orderId,item.product.productId,buyerEmail)}"
                         class="alert alert-success mt-2 rounded-3 py-2 px-3">

                        ✔ You have already reviewed this product.

                    </div>

                </div>

            </div>

            <!-- Total -->

            <div class="d-flex justify-content-end mt-4">

                <div class="total-box shadow-sm">
                    Total: ₹ <span th:text="${order.totalAmount}"></span>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
