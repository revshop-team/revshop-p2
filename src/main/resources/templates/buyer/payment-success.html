<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Payment Successful | RevShop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6f9;
        font-family:Segoe UI;
        }

        .success-card{
        max-width:650px;
        margin:auto;
        margin-top:90px;
        border-radius:12px;
        }

        .success-icon{
        font-size:70px;
        color:#22c55e;
        }

        .order-box{
        background:#f8fafc;
        border-radius:10px;
        padding:20px;
        margin-top:20px;
        }

        .countdown{
        font-size:14px;
        color:#6b7280;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card shadow success-card text-center p-5">

        <div class="success-icon">
            ✔
        </div>

        <h2 class="mt-3 text-success">
            Payment Successful
        </h2>

        <p class="text-muted">
            Your payment has been processed successfully.
        </p>

        <div class="order-box">

            <h5 class="mb-3">
                Order ID :
                <span th:text="${order.orderId}"></span>
            </h5>

            <p class="mb-2">
                <b>Amount Paid:</b> ₹
                <span th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',2,'POINT')}"></span>
            </p>

            <p class="mb-0">
                <b>Expected Delivery:</b> 3-5 Business Days
            </p>

        </div>

        <div class="mt-4">

            <a th:href="@{/buyer/orders}" class="btn btn-success me-2">
                View My Orders
            </a>

            <a th:href="@{/buyer/products}" class="btn btn-outline-secondary">
                Continue Shopping
            </a>

        </div>

        <p class="countdown mt-4">
            Redirecting to orders in <span id="timer">5</span> seconds...
        </p>

    </div>

</div>


<!-- CONFETTI LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

    let time = 5;

    setInterval(function(){

    time--;

    document.getElementById("timer").innerText = time;

    if(time <= 0){

    window.location="/buyer/orders";

    }

    },1000);


    /* 🎉 CONFETTI CELEBRATION */

    confetti({
    particleCount: 150,
    spread: 100,
    origin: { y: 0.6 }
    });

</script>

</body>
</html>
