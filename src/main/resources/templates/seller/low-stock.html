<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Low Stock Alerts | RevShop</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
        font-family:'Poppins',sans-serif;
        background:linear-gradient(180deg,#0A192F,#112240);
        min-height:100vh;
        color:white;
        }

       /* NAVBAR */

    .classic-navbar{
    background:#0A192F;
    border-bottom:1px solid #061022;
    padding-top:8px;
    padding-bottom:8px;
    }

    /* LOGO */

    .navbar-brand{
    padding-top:4px;
    padding-bottom:4px;
    }

    .brand-text{
    font-size:1.1rem;
    line-height:1.3;   /* FIXES CUTTING */
    letter-spacing:.5px;
    }

    .brand-subtext{
    font-size:.65rem;
    line-height:1.3;
    }

    /* GOLD SHIMMER */

    .brand-accent{
    background:linear-gradient(90deg,#D4AF37,#f5d76e,#bfa132,#D4AF37);
    background-size:300% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:goldMove 3s linear infinite;
    }

    @keyframes goldMove{
    0%{background-position:0%}
    100%{background-position:300%}
    }

    /* DIAMOND ANIMATION */

    .brand-diamond{
    color:#D4AF37;
    font-size:11px;
    margin-left:4px;
    display:inline-block;
    animation:diamondSpin 2s infinite linear;
    }

    @keyframes diamondSpin{

    0%{
    transform:rotate(0deg) scale(1);
    }

    50%{
    transform:rotate(180deg) scale(1.4);
    }

    100%{
    transform:rotate(360deg) scale(1);
    }

    }

    /* PROFILE PILL */

    .profile-pill{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 14px;
    border-radius:40px;
    color:#fff;
    font-size:.85rem;
    border:1px solid rgba(212,175,55,.7);
    }

    .seller-tag{
    font-size:.55rem;
    font-weight:700;
    background:#D4AF37;
    color:#0A192F;
    padding:2px 6px;
    border-radius:12px;
    }

    /* BELL */

    .bell-icon{
    color:white;
    cursor:pointer;
    transition:.3s;
    display:inline-block;
    transform-origin:top;
    }

    .bell-icon:hover{
    color:#D4AF37;
    animation:bellRing .6s ease;
    }

    @keyframes bellRing{
    0%{transform:rotate(0)}
    20%{transform:rotate(20deg)}
    40%{transform:rotate(-18deg)}
    60%{transform:rotate(14deg)}
    80%{transform:rotate(-10deg)}
    100%{transform:rotate(0)}
    }

    /* DROPDOWN */

    .dropdown-menu{
        background:#0A192F;
        border:1px solid rgba(212,175,55,.5);
        border-radius:14px;
        box-shadow:0 12px 35px rgba(0,0,0,.6);
        animation:dropdownFade .35s ease;
        padding-top:8px;
        }

        @keyframes dropdownFade{
        0%{opacity:0;transform:translateY(-10px) scale(.95);}
        100%{opacity:1;transform:translateY(0) scale(1);}
        }

        .dropdown-item{
        color:white;
        font-size:.9rem;
        transition:.25s;
        }

        .dropdown-item:hover{
        background:#D4AF37;
        color:#0A192F;
        transform:translateX(5px);
        }
    .dropdown-account{
    color:white;
    font-size:.85rem;
    }

        /* TITLE */

        .page-title{
        color:#D4AF37;
        font-weight:700;
        letter-spacing:.5px;
        animation:slideDown .6s ease;
        }

        /* CARD */

        .stock-card{
        background:white;
        color:#0A192F;
        border-radius:18px;
        padding:30px;
        box-shadow:0 25px 60px rgba(0,0,0,.5);
        animation:floatCard 4s ease-in-out infinite;
        }

        /* FLOAT ANIMATION */

        @keyframes floatCard{
        0%{transform:translateY(0)}
        50%{transform:translateY(-10px)}
        100%{transform:translateY(0)}
        }

        /* SLIDE ANIMATION */

        @keyframes slideDown{
        0%{opacity:0;transform:translateY(-20px)}
        100%{opacity:1;transform:translateY(0)}
        }

        /* TABLE */

        .table thead{
        background:#0A192F;
        color:white;
        }

        .table tbody tr{
        transition:.25s;
        }

        .table tbody tr:hover{
        transform:scale(1.02);
        box-shadow:0 6px 15px rgba(0,0,0,.15);
        }

        /* BADGE */

        .badge{
        font-size:.75rem;
        padding:6px 10px;
        border-radius:20px;
        }

        /* ALERT */

        .alert{
        border-radius:14px;
        font-weight:500;
        }
        .product-img{
         width:60px;
         height:60px;
          object-fit:contain;
           }

    </style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg sticky-top shadow-sm classic-navbar">

    <div class="container">

        <a class="navbar-brand d-flex flex-column align-items-start text-decoration-none"
           th:href="@{/seller/dashboard}">

<span class="fst-italic fw-bold text-white brand-text">
Rev<span class="brand-accent">Shop</span>
</span>

            <span class="brand-subtext text-white">
Shop <span class="brand-accent fw-bold">Smart</span>
<i class="bi bi-gem brand-diamond"></i>
</span>

        </a>

        <button class="navbar-toggler border-0 text-white"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent">

            <i class="bi bi-list fs-2"></i>

        </button>

        <div class="collapse navbar-collapse" id="navbarContent">

            <ul class="navbar-nav ms-auto align-items-center gap-3">

                <li class="nav-item">

                    <a th:href="@{/seller/notifications}"
                       class="nav-link position-relative text-decoration-none">

                        <i class="bi bi-bell-fill fs-5 bell-icon"></i>

                        <span id="notificationCount"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
0
</span>

                    </a>

                </li>

                <li class="nav-item dropdown">

                    <a href="#"
                       class="text-decoration-none d-flex align-items-center dropdown-toggle"
                       data-bs-toggle="dropdown">

                        <div class="profile-pill">

                            <i class="bi bi-person-circle text-white"></i>

                            <span class="fw-semibold text-capitalize"
                                  th:text="${businessName}" >
Seller
</span>

                            <span class="seller-tag">SELLER</span>

                        </div>

                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">

                        <li class="px-3 py-2 dropdown-account">
                            <strong th:text="${businessName}"></strong><br>
                            <small th:text="${#authentication.name}"></small>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <a class="dropdown-item" th:href="@{/seller/profile}">
                                <i class="bi bi-person me-2"></i>
                                My Profile
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item text-danger" th:href="@{/logout}">
                                <i class="bi bi-box-arrow-right me-2"></i>
                                Logout
                            </a>
                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h3 class="page-title mb-4 text-danger">Low Stock Alerts</h3>

    <div th:if="${lowStockProducts == null || #lists.isEmpty(lowStockProducts)}"
         class="alert alert-success text-center">
        All products are well stocked!
    </div>

    <div th:if="${lowStockProducts != null && !#lists.isEmpty(lowStockProducts)}"
         class="stock-card">

        <table class="table align-middle">

            <thead>
            <tr>
                <th>Image</th>
                <th>Product</th>
                <th>Category</th>
                <th>Stock</th>
                <th>Threshold</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="product : ${lowStockProducts}">

                <td>
                    <img th:src="@{/images/{img}(img=${product.imageName})}"
                         onerror="this.src='/images/default.png'"
                         style="width:60px;height:60px;object-fit:contain;">
                </td>

                <td th:text="${product.productName}"></td>

                <td th:text="${product.category.categoryName}"></td>

                <td>
<span class="badge bg-danger"
      th:text="${product.stock}">
</span>
                </td>

                <td>
<span class="badge bg-secondary"
      th:text="${product.stockThreshold}">
</span>
                </td>

                <td>
                    <span class="badge bg-danger">Low Stock</span>
                </td>

                <td>
                    <a th:href="@{/seller/edit-product/{id}(id=${product.productId})}"
                       class="btn btn-sm btn-outline-primary">
                        Restock
                    </a>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>
<script>

    document.addEventListener("DOMContentLoaded", function () {

    function loadNotificationCount() {

    fetch('/seller/notifications/unread-count')

    .then(response => response.text())

    .then(count => {

    const badge = document.getElementById("notificationCount");

    if(!badge) return;

    const num = parseInt(count);

    if(!isNaN(num) && num > 0){

    badge.classList.remove("d-none");
    badge.textContent = num;

    }else{

    badge.classList.add("d-none");

    }

    })

    .catch(error => console.error("Notification error:", error));

    }

    loadNotificationCount();

    setInterval(loadNotificationCount,5000);

    });

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
