<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Notifications | RevShop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f8;
        }

        .notification-card {
            border: none;
            border-radius: 18px;
            transition: 0.25s ease;
            background: #ffffff;
        }

        .notification-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .order-icon {
            background: #e7f1ff;
            color: #0d6efd;
        }

        .stock-icon {
            background: #fff3cd;
            color: #f59e0b;
        }

        .new-badge {
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .section-title {
            font-weight: 700;
            color: #2c3e50;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">
        RevShop - Seller
    </a>
</nav>

<div class="container py-5">

    <!-- Title -->
    <h3 class="section-title mb-4">
        🔔 Notifications
    </h3>

    <!-- Empty State -->
    <div th:if="${notifications == null || #lists.isEmpty(notifications)}"
         class="alert alert-info text-center rounded-4">
        No notifications yet.
    </div>

    <!-- Notification List -->
    <div th:each="n : ${notifications}"
         class="card notification-card shadow-sm mb-3 p-3">

        <div class="d-flex justify-content-between align-items-center">

            <!-- LEFT: Icon + Message -->
            <div class="d-flex align-items-center gap-3">

                <!-- Dynamic Icon -->
                <div th:classappend="${#strings.contains(n.message, 'Low stock')} ? 'icon-box stock-icon' : 'icon-box order-icon'"
                     class="icon-box">
                    <i th:classappend="${#strings.contains(n.message, 'Low stock')} ? 'bi bi-exclamation-triangle-fill' : 'bi bi-bag-check-fill'"></i>
                </div>

                <!-- Message Content -->
                <div>
                    <h6 class="mb-1 fw-semibold"
                        th:text="${n.message}">
                    </h6>

                    <small class="text-muted"
                           th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy, hh:mm a')}">
                    </small>
                </div>
            </div>

            <!-- RIGHT: Status + Action -->
            <div class="text-end">

                <!-- NEW Badge -->
                <span th:if="${n.isRead == 'N'}"
                      class="badge bg-danger new-badge me-2">
                    NEW
                </span>

                <!-- Mark as Read Button -->
                <a th:if="${n.isRead == 'N'}"
                   th:href="@{/seller/notifications/read/{id}(id=${n.notificationId})}"
                   class="btn btn-sm btn-outline-primary">
                    Mark as Read
                </a>

                <!-- Already Read -->
                <span th:if="${n.isRead == 'Y'}"
                      class="badge bg-success px-3 py-2">
                    Read
                </span>

            </div>

        </div>

    </div>

</div>

</body>
</html>
