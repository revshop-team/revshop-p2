<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Buyer Home</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div class="container py-4">

    <!-- Welcome Card -->
    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center flex-wrap">

            <div>
                <h4 class="fw-bold mb-1">
                    Welcome back,
                    <span class="text-primary" th:text="${buyerEmail}"></span>
                </h4>
                <p class="text-muted mb-0">
                    Explore new arrivals and trending products.
                </p>
            </div>

            <div class="mt-3 mt-md-0">
                <a th:href="@{/buyer/products}" class="btn btn-dark me-2">
                    Browse Products
                </a>
                <a th:href="@{/buyer/orders}" class="btn btn-outline-secondary">
                    My Orders
                </a>
            </div>

        </div>
    </div>

    <!-- Latest Products Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Latest Products</h5>
        <a th:href="@{/buyer/products}" class="text-decoration-none small">
            View All
        </a>
    </div>

    <!-- Product Grid -->
    <div class="row g-4">

        <div class="col-xl-3 col-lg-4 col-md-6"
             th:each="product : ${latestProducts}">

            <div class="card h-100 shadow-sm">

                <!-- Static Image -->
                <img src="/images/default-product.png"
                     class="card-img-top"
                     style="height:200px; object-fit:cover;">

                <div class="card-body d-flex flex-column">

                    <h6 class="fw-semibold"
                        th:text="${product.productName}"></h6>

                    <p class="text-success fw-bold mb-1"
                       th:text="'₹ ' + ${product.sellingPrice}"></p>

                    <!-- Stock Badge -->
                    <div class="mb-2">
                        <span th:if="${product.stock > 0}"
                              class="badge bg-success">
                            In Stock
                        </span>

                        <span th:if="${product.stock == 0}"
                              class="badge bg-danger">
                            Out of Stock
                        </span>
                    </div>

                    <div class="mt-auto">
                        <a th:href="@{/buyer/product/{id}(id=${product.productId})}"
                           class="btn btn-sm btn-outline-dark w-100">
                            View Details
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->
<footer class="bg-white border-top py-3 mt-5">
    <div class="container text-center small text-muted">
        © 2026 RevShop. All rights reserved.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
