<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h3>Notifications</h3>

    <div th:if="${notifications.size() == 0}">
        <p class="text-muted">No new notifications.</p>
    </div>

    <ul class="list-group">
        <li th:each="notif : ${notifications}" class="list-group-item d-flex justify-content-between align-items-center">
            <span th:text="${notif.message}"></span>
            <a th:href="@{'/seller/notifications/read/' + ${notif.id}}" class="btn btn-sm btn-primary">
                Mark as Read & View Orders
            </a>
        </li>
    </ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
