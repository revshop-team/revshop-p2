<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #ef4444, #b91c1c);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            width: 500px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<div class="card error-card p-5 text-center">

    <h1 class="display-4 text-danger">403</h1>

    <h3 class="mb-3">Access Denied</h3>

    <p class="text-muted">
        You do not have permission to access this page. Get back to previous page
    </p>

    <div class="mt-4">
        <a th:href="@{/}" class="btn btn-dark me-2">Go Home</a>
        <a th:href="@{/login}" class="btn btn-outline-danger">Login Again</a>
    </div>

</div>

</body>
</html>
