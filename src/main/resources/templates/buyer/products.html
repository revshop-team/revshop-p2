<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | Shop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 22px;
        }

        .product-card {
            border: none;
            border-radius: 14px;
            transition: 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.12);
        }

        .product-img {
            height: 200px;
            object-fit: cover;
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
        }

        .price {
            font-size: 18px;
            font-weight: 600;
            color: #198754;
        }

        .mrp {
            text-decoration: line-through;
            color: #6c757d;
            font-size: 14px;
        }

        .discount-badge {
            font-size: 12px;
        }

        /* ❤️ Favourite Button */
        .favourite-btn {
            width: 36px;
            height: 36px;
            transition: all 0.2s ease;
        }

        .favourite-btn:hover {
            transform: scale(1.08);
        }

        .favourite-wrapper {
            position: relative;
        }

        .favourite-tooltip {
            position: absolute;
            bottom: 115%;
            right: 50%;
            transform: translateX(50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        /* FORCE disable click + cursor */
.page-item.disabled .page-link {
    pointer-events: none !important;
    cursor: not-allowed !important;
    opacity: 0.6;
}

/* Also handle aria-disabled (extra safety) */
.page-link[aria-disabled="true"] {
    pointer-events: none !important;
    cursor: not-allowed !important;
    opacity: 0.6;
}

/* Rounded pagination (your requirement) */
.pagination .page-link {
    border-radius: 50px;
    padding: 6px 14px;
}
        .favourite-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.75) transparent transparent transparent;
        }

        .favourite-wrapper:hover .favourite-tooltip {
            opacity: 1;
            transform: translateX(50%) translateY(-4px);
        }

        /* 🔥 FIX: Disabled Pagination Pointer + Rounded Buttons */
        .page-item.disabled .page-link {
            pointer-events: none;
            cursor: not-allowed;
            opacity: 0.6;
            border-radius: 50px;
        }

        .pagination .page-link {
            border-radius: 50px;
            padding: 6px 14px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<!-- Success & Error Messages -->
<div class="container mt-3">
    <div th:if="${successMessage}" class="alert alert-success text-center">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger text-center">
        <span th:text="${errorMessage}"></span>
    </div>
</div>

<!-- 🔥 SINGLE CONTAINER (FIXED) -->
<div class="container py-5">

    <!-- Title + Search + Sort -->
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
        <h3 class="fw-bold">Explore Products</h3>

        <!-- Search -->
        <form method="get" th:action="@{/buyer/products}" class="d-flex">
            <input type="hidden" name="page" value="0"/>
            <input type="hidden" name="sort" th:value="${sort}"/>

            <input type="text"
                   name="keyword"
                   class="form-control me-2"
                   placeholder="Search products..."
                   th:value="${keyword}">

            <button class="btn btn-outline-success">
                <i class="bi bi-search"></i>
            </button>
        </form>

        <!-- Sort -->
        <form method="get" th:action="@{/buyer/products}" class="d-flex">
            <input type="hidden" name="page" value="0"/>
            <input type="hidden" name="keyword" th:value="${keyword}"/>
            <input type="hidden" name="categoryId" th:value="${selectedCategoryId}"/>

            <select class="form-select w-auto"
                    name="sort"
                    onchange="this.form.submit()">
                <option value="default" th:selected="${sort == 'default'}">Sort By</option>
                <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Price: Low to High</option>
                <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Price: High to Low</option>
                <option value="newest" th:selected="${sort == 'newest'}">Newest</option>
            </select>
        </form>
    </div>

    <!-- Category Filter -->
    <div class="mb-4">
        <div class="d-flex flex-wrap gap-2">

            <a class="btn btn-outline-dark btn-sm"
               th:classappend="${selectedCategoryId == null} ? 'active'"
               th:href="@{/buyer/products(page=0, sort=${sort}, keyword=${keyword})}">
                All
            </a>

            <a class="btn btn-outline-primary btn-sm"
               th:each="cat : ${categories}"
               th:text="${cat.categoryName}"
               th:classappend="${selectedCategoryId == cat.categoryId} ? 'active'"
               th:href="@{/buyer/products(page=0, sort=${sort}, keyword=${keyword}, categoryId=${cat.categoryId})}">
            </a>

        </div>
    </div>

    <!-- No Products -->
    <div class="text-center w-100"
         th:if="${productPage.content.isEmpty()}">
        <h5 class="text-muted mt-4">No products found</h5>
        <p class="text-secondary">Try searching with a different keyword or category.</p>
    </div>

    <!-- Product Grid -->
    <div class="row g-4"
         th:if="${!productPage.content.isEmpty()}">

        <div class="col-md-4 col-lg-3"
             th:each="product : ${productPage.content}">

            <div class="card product-card shadow-sm h-100 position-relative">

                <!-- Favourite -->
                <form th:action="@{/buyer/favourite/toggle/{id}(id=${product.productId})}"
                      method="post"
                      class="position-absolute top-0 end-0 m-2 favourite-wrapper">

                    <input type="hidden" name="redirectTo" value="products"/>

                    <span class="favourite-tooltip"
                          th:text="${favouriteProductIds.contains(product.productId) ? 'Remove from Favourites' : 'Add to Favourites'}">
                    </span>

                    <button type="submit"
                            class="btn btn-light rounded-circle shadow-sm d-flex align-items-center justify-content-center favourite-btn">
                        <i th:if="${favouriteProductIds.contains(product.productId)}"
                           class="bi bi-heart-fill text-danger fs-5"></i>

                        <i th:unless="${favouriteProductIds.contains(product.productId)}"
                           class="bi bi-heart text-danger fs-5"></i>
                    </button>
                </form>

                <!-- Image -->
                <img src="https://via.placeholder.com/300x200"
                     class="card-img-top product-img"
                     alt="Product">

                <div class="card-body d-flex flex-column">

                    <h6 class="fw-semibold"
                        th:text="${product.productName}"></h6>

                    <p class="text-muted small"
                       th:text="${product.description}"></p>

                    <!-- Price -->
                    <div class="mb-2">
                        <span class="price">
                            ₹ <span th:text="${product.sellingPrice}"></span>
                        </span>
                        <span class="ms-2 mrp">
                            ₹ <span th:text="${product.mrp}"></span>
                        </span>
                    </div>

                    <!-- Discount -->
                    <span class="badge bg-danger discount-badge mb-3"
                          th:if="${product.mrp != null and product.mrp > product.sellingPrice}"
                          th:text="${T(java.lang.Math).round((product.mrp - product.sellingPrice) * 100 / product.mrp)} + '% OFF'">
                    </span>

                    <!-- Buttons -->
                    <div class="mt-auto">
                        <a class="btn btn-outline-primary btn-sm w-100 mb-2"
                           th:href="@{/buyer/product/{id}(id=${product.productId})}">
                            View Details
                        </a>

                        <!-- Add to Cart if stock available -->
                        <a th:if="${product.stock > 0}"
                           th:href="@{/buyer/cart/add/{id}(id=${product.productId})}"
                           class="btn btn-success btn-sm w-100">
                            Add to Cart
                        </a>

                        <!-- Disabled Out of Stock -->
                        <button th:if="${product.stock == 0}"
                                class="btn btn-secondary btn-sm w-100"
                                disabled>
                            Out of Stock
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- 🔥 FIXED PAGINATION (ROUNDED + PROPER DISABLE) -->
    <nav class="mt-5" th:if="${productPage.totalPages > 0}">
        <ul class="pagination justify-content-center">

            <!-- Previous -->
            <li class="page-item"
                th:classappend="${!productPage.hasPrevious()} ? 'disabled'">
                <a class="page-link"
                   th:href="${productPage.hasPrevious()} ? @{/buyer/products(page=${currentPage - 1}, sort=${sort}, keyword=${keyword}, categoryId=${selectedCategoryId})} : '#'"
                   th:attr="aria-disabled=${!productPage.hasPrevious()}">
                    Previous
                </a>
            </li>

            <!-- Page Numbers -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/buyer/products(page=${i}, sort=${sort}, keyword=${keyword}, categoryId=${selectedCategoryId})}">
                </a>
            </li>

            <!-- Next -->
            <li class="page-item"
                th:classappend="${!productPage.hasNext()} ? 'disabled'">
                <a class="page-link"
                   th:href="${productPage.hasNext()} ? @{/buyer/products(page=${currentPage + 1}, sort=${sort}, keyword=${keyword}, categoryId=${selectedCategoryId})} : '#'"
                   th:attr="aria-disabled=${!productPage.hasNext()}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
