<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Low Stock Alerts | RevShop</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!---->
<nav th:fragment="sellerNavbar"
     class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <div class="ms-auto d-flex align-items-center gap-4">

        <a th:href="@{/seller/notifications}"
           class="position-relative text-light"
           title="Order Notifications">
            <i class="bi bi-bell fs-5"></i>

            <span id="notificationCount"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                0
            </span>
        </a>

        <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle"
                    type="button"
                    data-bs-toggle="dropdown">
                <i class="bi bi-person-circle me-1"></i>
                My Account
            </button>

            <ul class="dropdown-menu dropdown-menu-end shadow">
                <li>
                    <a class="dropdown-item" th:href="@{/seller/profile}">
                        <i class="bi bi-person me-2"></i>
                        Profile
                    </a>
                </li>
                <li>
                    <a class="dropdown-item text-danger" th:href="@{/logout}">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        Logout
                    </a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<!---->
<div class="container mt-5">

    <h3 class="fw-bold mb-4 text-danger">
        Low Stock Alerts
    </h3>

    <!-- Empty State -->
    <div th:if="${lowStockProducts == null || #lists.isEmpty(lowStockProducts)}"
         class="alert alert-success text-center rounded-3">
        All products are well stocked!
    </div>

    <!-- Low Stock Table -->
    <div th:if="${lowStockProducts != null && !#lists.isEmpty(lowStockProducts)}"
         class="card shadow">
        <div class="card-body">

            <table class="table table-bordered align-middle">
                <thead class="table-danger">
                <tr>
                    <th>Product</th>
                    <th>Stock</th>
                    <th>Threshold</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="product : ${lowStockProducts}">
                    <td th:text="${product.productName}"></td>
                    <td th:text="${product.stock}"></td>
                    <td th:text="${product.stockThreshold}"></td>
                    <td>
                        <span class="badge bg-danger">
                            Low Stock
                        </span>
                    </td>
                </tr>
                </tbody>

            </table>
        </div>
    </div>

</div>
</body>
</html>
