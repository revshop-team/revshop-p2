<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Orders | RevShop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .order-card {
            border-radius: 14px;
            border: none;
        }
        .section-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
        }
        .filter-btn {
            border-radius: 20px;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#sellerNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="sellerNavbar">
        <div class="ms-auto d-flex align-items-center gap-4">

            <!-- Notifications -->
            <a th:href="@{/seller/notifications}"
               class="position-relative text-light text-decoration-none">
                <i class="bi bi-bell fs-5"></i>

                <span id="notificationCount"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                    0
                </span>
            </a>

            <!-- Account Dropdown -->
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    My Account
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li>
                        <a class="dropdown-item"
                           th:href="@{/seller/profile}">
                            <i class="bi bi-person me-2"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item text-danger"
                           th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">📦 Orders For Your Products</h3>
    </div>

    <!-- FILTER BUTTONS -->
    <div class="mb-4">
        <a th:href="@{/seller/orders}"
           class="btn btn-outline-dark filter-btn me-2">
            All Orders
        </a>

        <a th:href="@{/seller/orders(status='PLACED')}"
           class="btn btn-outline-primary filter-btn me-2">
            Pending
        </a>

        <a th:href="@{/seller/orders(status='DELIVERED')}"
           class="btn btn-outline-success filter-btn">
            Delivered
        </a>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${orderItems == null || #lists.isEmpty(orderItems)}"
         class="alert alert-info text-center shadow-sm">
        No orders received yet for your products.
    </div>

    <!-- ORDER CARDS -->
    <div th:each="item : ${orderItems}" class="card shadow-sm mb-4 order-card">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-start">

                <div>
                    <h5 class="fw-bold mb-1">
                        Order #<span th:text="${item.order.orderId}"></span>
                    </h5>

                    <small class="text-muted">
                        Placed on:
                        <span th:text="${#temporals.format(item.order.orderDate, 'dd MMM yyyy, hh:mm a')}"></span>
                    </small>

                    <div class="mt-2">
                        <span class="badge bg-secondary">PLACED</span>
                        →
                        <span class="badge"
                              th:classappend="${item.order.status == 'DELIVERED'} ? 'bg-success' : 'bg-light text-dark'">
                            DELIVERED
                        </span>
                    </div>
                </div>

                <div class="text-end">

                    <div th:if="${item.order.status == 'PLACED'}">
                        <span class="badge bg-primary fs-6 mb-2">
                            PLACED
                        </span>

                        <form th:action="@{/seller/orders/deliver/{id}(id=${item.order.orderId})}"
                              method="post">
                            <button type="submit"
                                    class="btn btn-sm btn-success">
                                Mark as Delivered
                            </button>
                        </form>
                    </div>

                    <div th:if="${item.order.status == 'DELIVERED'}">
                        <span class="badge bg-success fs-6">
                            DELIVERED
                        </span>
                    </div>

                </div>
            </div>

            <hr>

            <h6 class="fw-bold mb-2">🛍 Product Details</h6>
            <div class="section-box">
                <p class="mb-1">
                    <strong>Name:</strong>
                    <span th:text="${item.product.productName}"></span>
                </p>
                <p class="mb-1">
                    <strong>Quantity:</strong>
                    <span th:text="${item.quantity}"></span>
                </p>
                <p class="mb-0 fw-bold text-success">
                    Order Value: ₹ <span th:text="${item.price * item.quantity}"></span>
                </p>
            </div>

            <hr>

            <p class="mb-0">
                <strong>👤 Buyer:</strong>
                <span th:text="${item.order.buyer.email}"></span>
            </p>

        </div>
    </div>

</div>

<!-- Notification Auto Refresh -->
<script>
    function loadNotificationCount() {
        fetch('/seller/notifications/unread-count')
            .then(res => res.text())
            .then(count => {
                const badge = document.getElementById('notificationCount');
                if (count > 0) {
                    badge.classList.remove('d-none');
                    badge.textContent = count;
                } else {
                    badge.classList.add('d-none');
                }
            });
    }

    loadNotificationCount();
    setInterval(loadNotificationCount, 5000);
</script>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
