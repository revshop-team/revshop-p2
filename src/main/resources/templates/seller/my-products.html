<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>My Products | RevShop</title>
  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    /* Delete Modal Fix */
.modal-content{
    background:#0A192F;
    color:white;
    border-radius:12px;
}

.modal-header{
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.modal-body{
    color:#e6edf3;
    font-size:15px;
}

.modal-body small{
    color:#ff6b6b;
    font-weight:500;
}

.modal-footer{
    border-top:1px solid rgba(255,255,255,0.1);
}
    /* PAGE */

    body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#0A192F,#112240);
    min-height:100vh;
    color:white;
    overflow-x:hidden;
    }

    /* NAVBAR */

    .classic-navbar{
    background:#0A192F;
    border-bottom:1px solid #061022;
    padding-top:8px;
    padding-bottom:8px;
    }

    /* LOGO */

    .navbar-brand{
    padding-top:4px;
    padding-bottom:4px;
    }

    .brand-text{
    font-size:1.1rem;
    line-height:1.3;   /* FIXES CUTTING */
    letter-spacing:.5px;
    }

    .brand-subtext{
    font-size:.65rem;
    line-height:1.3;
    }

    /* GOLD SHIMMER */

    .brand-accent{
    background:linear-gradient(90deg,#D4AF37,#f5d76e,#bfa132,#D4AF37);
    background-size:300% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:goldMove 3s linear infinite;
    }

    @keyframes goldMove{
    0%{background-position:0%}
    100%{background-position:300%}
    }

    /* DIAMOND ANIMATION */

    .brand-diamond{
    color:#D4AF37;
    font-size:11px;
    margin-left:4px;
    display:inline-block;
    animation:diamondSpin 2s infinite linear;
    }

    @keyframes diamondSpin{

    0%{
    transform:rotate(0deg) scale(1);
    }

    50%{
    transform:rotate(180deg) scale(1.4);
    }

    100%{
    transform:rotate(360deg) scale(1);
    }

    }

    /* PROFILE PILL */

    .profile-pill{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 14px;
    border-radius:40px;
    color:#fff;
    font-size:.85rem;
    border:1px solid rgba(212,175,55,.7);
    }

    .seller-tag{
    font-size:.55rem;
    font-weight:700;
    background:#D4AF37;
    color:#0A192F;
    padding:2px 6px;
    border-radius:12px;
    }

    /* BELL */

    .bell-icon{
    color:white;
    cursor:pointer;
    transition:.3s;
    display:inline-block;
    transform-origin:top;
    }

    .bell-icon:hover{
    color:#D4AF37;
    animation:bellRing .6s ease;
    }

    @keyframes bellRing{
    0%{transform:rotate(0)}
    20%{transform:rotate(20deg)}
    40%{transform:rotate(-18deg)}
    60%{transform:rotate(14deg)}
    80%{transform:rotate(-10deg)}
    100%{transform:rotate(0)}
    }

    /* DROPDOWN */

   .dropdown-menu{
        background:#0A192F;
        border:1px solid rgba(212,175,55,.5);
        border-radius:14px;
        box-shadow:0 12px 35px rgba(0,0,0,.6);
        animation:dropdownFade .35s ease;
        padding-top:8px;
        }

        @keyframes dropdownFade{
        0%{opacity:0;transform:translateY(-10px) scale(.95);}
        100%{opacity:1;transform:translateY(0) scale(1);}
        }

        .dropdown-item{
        color:white;
        font-size:.9rem;
        transition:.25s;
        }

        .dropdown-item:hover{
        background:#D4AF37;
        color:#0A192F;
        transform:translateX(5px);
        }

    .dropdown-account{
    color:white;
    font-size:.85rem;
    }

    /* PAGE */

    .page-title{
    color:#D4AF37;
    font-weight:600;
    margin-bottom:20px;
    }

    /* FLOATING CARD */

    .table-card{
    background:white;
    color:#0A192F;
    border-radius:18px;
    padding:30px;
    box-shadow:0 30px 70px rgba(0,0,0,.5);
    animation:cardFloat 4s ease-in-out infinite;
    }

    @keyframes cardFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
    100%{transform:translateY(0)}
    }

    .table thead{
    background:#0A192F;
    color:white;
    }

    /* ROW HOVER */

    .table tbody tr{
    transition:.3s;
    }

    .table tbody tr:hover{
    transform:scale(1.02);
    box-shadow:0 8px 18px rgba(0,0,0,.15);
    }

    /* PRODUCT IMAGE */

    .product-img{
    width:65px;
    height:65px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid #e6e6e6;
    }

    /* BADGES */

    .badge{
    font-size:.75rem;
    padding:6px 10px;
    border-radius:30px;
    }

    /* BUTTON */

    .btn-primary{
    background:#D4AF37;
    border:none;
    color:#0A192F;
    font-weight:600;
    }

    .btn-primary:hover{
    background:#c79c25;
    }

  </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg sticky-top shadow-sm classic-navbar">

  <div class="container">

    <a class="navbar-brand d-flex flex-column align-items-start text-decoration-none"
       th:href="@{/seller/dashboard}">

<span class="fst-italic fw-bold text-white brand-text">
Rev<span class="brand-accent">Shop</span>
</span>

      <span class="brand-subtext text-white">
Shop <span class="brand-accent fw-bold">Smart</span>
<i class="bi bi-gem brand-diamond"></i>
</span>

    </a>

    <button class="navbar-toggler border-0 text-white"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent">

      <i class="bi bi-list fs-2"></i>

    </button>

    <div class="collapse navbar-collapse" id="navbarContent">

      <ul class="navbar-nav ms-auto align-items-center gap-3">

        <li class="nav-item">

          <a th:href="@{/seller/notifications}"
             class="nav-link position-relative text-decoration-none">

            <i class="bi bi-bell-fill fs-5 bell-icon"></i>

            <span id="notificationCount"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
0
</span>

          </a>

        </li>

        <li class="nav-item dropdown">

          <a href="#"
             class="text-decoration-none d-flex align-items-center dropdown-toggle"
             data-bs-toggle="dropdown">

            <div class="profile-pill">

              <i class="bi bi-person-circle text-white"></i>

              <span class="fw-semibold text-capitalize"
                    th:text="${#strings.substringBefore(#authentication.name,'@')}">
Seller
</span>

              <span class="seller-tag">SELLER</span>

            </div>

          </a>

          <ul class="dropdown-menu dropdown-menu-end">

            <li class="px-3 py-2 dropdown-account">
              Seller Account<br>
              <strong th:text="${#authentication.name}"></strong>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
              <a class="dropdown-item" th:href="@{/seller/profile}">
                <i class="bi bi-person me-2"></i>
                My Profile
              </a>
            </li>

            <li>
              <a class="dropdown-item text-danger" th:href="@{/logout}">
                <i class="bi bi-box-arrow-right me-2"></i>
                Logout
              </a>
            </li>

          </ul>

        </li>

      </ul>

    </div>

  </div>

</nav>

<!-- PAGE -->

<div class="container mt-5">

  <h3 class="page-title">My Products</h3>

  <div class="table-card">

    <table class="table table-hover align-middle">

      <thead>
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Category</th>
        <th>Stock</th>
        <th>Threshold</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
      </thead>

      <tbody>

      <tr th:each="product : ${products}">

        <td>
          <img th:src="${product.imageName != null}
? @{/images/{img}(img=${product.imageName})}
: @{/images/default.png}"
               class="product-img"/>
        </td>

        <td class="fw-semibold" th:text="${product.productName}"></td>

        <td th:text="${product.category != null ? product.category.categoryName : 'N/A'}"></td>

        <td th:text="${product.stock}"></td>

        <td th:text="${product.stockThreshold}"></td>

        <td>

<span th:if="${product.stock == 0}" class="badge bg-dark">
Out of Stock
</span>

          <span th:if="${product.stock > 0 and product.stock <= product.stockThreshold}"
                class="badge bg-danger">
Low Stock
</span>

          <span th:if="${product.stock > product.stockThreshold}"
                class="badge bg-success">
In Stock
</span>

        </td>

        <td>

          <a th:href="@{'/seller/edit-product/' + ${product.productId}}"
             class="btn btn-primary btn-sm me-2">
            Edit
          </a>

          <button class="btn btn-danger btn-sm"
                  th:attr="data-id=${product.productId}"
                  onclick="openDeleteModal(this)"
                  type="button">
            Delete
          </button>

        </td>

      </tr>

      </tbody>

    </table>

  </div>

</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-exclamation-triangle-fill text-warning"></i>
          Confirm Delete
        </h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        Are you sure you want to delete this product?
        <br><br>
        <small>This action cannot be undone.</small>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

        <form id="deleteForm" method="post">
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash"></i> Delete
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
<script>

  let deleteProductId=null;

  function openDeleteModal(button){

  deleteProductId=button.getAttribute("data-id");

  const modal=new bootstrap.Modal(document.getElementById("deleteModal"));
  modal.show();

  }

  document.getElementById("confirmDeleteBtn").onclick=function(){

  if(deleteProductId){
  window.location.href="/seller/delete-product/"+deleteProductId;
  }

  }

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
