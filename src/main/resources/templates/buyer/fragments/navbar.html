<nav class="navbar navbar-expand-lg custom-navbar"
     th:fragment="navbar">

    <!-- Bootstrap Icons (REQUIRED FOR BELL ICON) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .custom-navbar {
            background: #0f172a;
            padding: 18px 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .custom-navbar .navbar-brand {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffffff !important;
        }

        .custom-navbar .nav-link {
            color: #cbd5e1 !important;
            font-weight: 500;
            margin-right: 18px;
            transition: all 0.3s ease;
            position: relative;
        }

        .custom-navbar .nav-link:hover {
            color: #ffffff !important;
        }

        .custom-navbar .nav-link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #38bdf8;
            transition: 0.3s ease;
        }

        .custom-navbar .nav-link:hover::after {
            width: 100%;
        }

        .btn-logout {
            border-radius: 20px;
            padding: 6px 18px;
            border: 1px solid #38bdf8;
            color: #38bdf8;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .notification-badge {
            font-size: 10px;
        }

        .navbar-toggler {
            border-color: rgba(255,255,255,0.2);
        }
    </style>

    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand"
           th:href="@{/buyer/home}">
            RevShop
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarContent">

            <!-- LEFT MENU -->
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/buyer/home}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/buyer/products}">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/buyer/cart}">Cart</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/buyer/orders}">Orders</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/buyer/favourites}">Favourites</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/buyer/profile}">Profile</a>
                </li>

            </ul>

            <!-- RIGHT SIDE (BELL + LOGOUT) -->
            <div class="d-flex align-items-center">

                <!-- 🔔 NOTIFICATION BELL (FIXED POSITION) -->
                <a th:href="@{/buyer/notifications}"
                   class="text-decoration-none me-4 position-relative"
                   title="Notifications">

                    <i class="bi bi-bell fs-4 text-light"></i>

                    <!-- 🔴 UNREAD COUNT BADGE -->
                    <span id="buyerNotificationCount"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger notification-badge"
                          style="display:none;">
                        0
                    </span>
                </a>

                <!-- LOGOUT BUTTON -->
                <a th:href="@{/logout}"
                   class="btn btn-logout">
                    Logout
                </a>

            </div>

        </div>
    </div>

    <!-- 🔔 AUTO FETCH UNREAD NOTIFICATION COUNT -->
    <script>
        function loadBuyerNotificationCount() {
            fetch('/buyer/notifications/unread-count')
                .then(res => res.text())
                .then(count => {
                    const badge = document.getElementById('buyerNotificationCount');

                    if (!badge) return;

                    if (count > 0) {
                        badge.style.display = 'inline-block';
                        badge.textContent = count;
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(err => console.error("Buyer notification error:", err));
        }

        // Load immediately
        loadBuyerNotificationCount();

        // Auto refresh every 5 seconds (LIVE updates)
        setInterval(loadBuyerNotificationCount, 5000);
    </script>

</nav>
