<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password | RevShop</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        body{
        font-family:'Inter',sans-serif;
        background:radial-gradient(circle at 20% 20%,#0f172a,#020617 70%);
        min-height:100vh;
        color:white;
        }

        /* NAVBAR */

        .navbar{
        background:#020617;
        border-bottom:1px solid rgba(250,204,21,.2);
        }

        /* PASSWORD CARD */

        .password-card{
        background:rgba(17,24,39,.92);
        backdrop-filter:blur(14px);
        border-radius:20px;
        box-shadow:
        0 25px 60px rgba(0,0,0,.7),
        0 0 25px rgba(250,204,21,.25);
        border:1px solid rgba(250,204,21,.25);
        animation:floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard{
        0%{transform:translateY(0)}
        50%{transform:translateY(-6px)}
        100%{transform:translateY(0)}
        }

        /* HEADER */

        .card-header{
        background:linear-gradient(135deg,#facc15,#f59e0b);
        color:#111827;
        font-weight:600;
        font-family:'Poppins',sans-serif;
        }

        /* INPUT */

        .form-control{
        background:#020617;
        border:1px solid #1e293b;
        border-radius:10px;
        color:white;
        padding:9px;
        }

        .form-control:focus{
        border-color:#facc15;
        box-shadow:0 0 0 .15rem rgba(250,204,21,.25);
        background:#020617;
        color:white;
        }

        /* BUTTON */

        .btn-update{
        background:linear-gradient(135deg,#facc15,#f59e0b);
        border:none;
        font-weight:600;
        color:#111827;
        border-radius:8px;
        }

        .btn-update:hover{
        transform:translateY(-2px);
        box-shadow:0 10px 25px rgba(250,204,21,.45);
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark px-3">

<span class="navbar-brand fw-bold">
<i class="bi bi-bag-fill me-2"></i>
RevShop Buyer
</span>

    <div class="dropdown">

        <button class="btn btn-outline-light btn-sm dropdown-toggle"
                data-bs-toggle="dropdown">
            Account </button>

        <ul class="dropdown-menu dropdown-menu-end">

            <li>
                <a class="dropdown-item" th:href="@{/buyer/profile}">
                    Profile
                </a>
            </li>

            <li>
                <a class="dropdown-item" th:href="@{/change-password}">
                    Change Password
                </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
                <a class="dropdown-item text-danger" th:href="@{/logout}">
                    Logout
                </a>
            </li>

        </ul>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card password-card border-0">

                <div class="card-header text-center">
                    <h4>Change Password</h4>
                </div>

                <div class="card-body p-4">

                    <div th:if="${success}" class="alert alert-success">
                        <span th:text="${success}"></span>
                    </div>

                    <div th:if="${error}" class="alert alert-danger">
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/change-password}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" name="currentPassword"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" name="newPassword"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirmPassword"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="d-grid">

                            <button type="submit" class="btn btn-update">
                                Update Password
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
