<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- SAME NAVBAR AS DASHBOARD -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">RevShop - Seller</a>

    <div class="ms-auto dropdown">
        <button class="btn btn-light btn-sm dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown">
            My Account
        </button>

        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" th:href="@{/seller/profile}">Profile</a></li>
            <li><a class="dropdown-item" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container mt-5">

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Seller Profile</h4>
        </div>

        <div class="card-body">

            <!-- SUCCESS MESSAGE -->
            <div th:if="${param.success}"
                 class="alert alert-success">
                Profile updated successfully!
            </div>

            <form th:action="@{/seller/profile}"
                  th:object="${sellerDetails}"
                  method="post">

                <input type="hidden" th:field="*{sellerId}" />

                <div class="mb-3">
                    <label class="form-label">Business Name</label>
                    <input type="text" class="form-control"
                           th:field="*{businessName}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">GST Number</label>
                    <input type="text" class="form-control"
                           th:field="*{gstNumber}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control"
                           th:field="*{address}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control"
                           th:field="*{phone}">
                </div>

                <button type="submit" class="btn btn-success">
                    Update Profile
                </button>

                <a th:href="@{/seller/dashboard}"
                   class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
