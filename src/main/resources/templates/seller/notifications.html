<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifications | RevShop</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/seller/dashboard}">
        RevShop - Seller
    </a>
</nav>

<div class="container mt-5">

    <h3 class="fw-bold mb-4"> Notifications</h3>

    <!-- Empty -->
    <div th:if="${notifications == null || #lists.isEmpty(notifications)}"
         class="alert alert-info text-center">
        No notifications yet.
    </div>

    <!-- Notification List -->
    <div th:each="n : ${notifications}"
         class="card mb-3 shadow-sm">

        <div class="card-body d-flex justify-content-between align-items-center">

            <div>
                <h6 class="mb-1"
                    th:text="${n.message}">
                </h6>
                <small class="text-muted"
                       th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy, hh:mm a')}">
                </small>
            </div>

            <div>
                <!-- Show button only if NOT read -->
                <a th:if="${n.getIsRead() == 'N'}"
                   th:href="@{/seller/notifications/read/{id}(id=${n.notificationId})}"
                   class="btn btn-sm btn-outline-primary">
                    Mark as Read
                </a>

                <!-- Show badge if read -->
                <span th:if="${n.getIsRead() == 'Y'}"
                      class="badge bg-success">
        Read
    </span>
            </div>

        </div>
    </div>

</div>
</body>
</html>
