<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | My Orders</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f8;
        }

        .order-card {
            border: none;
            border-radius: 18px;
            transition: 0.25s ease;
        }

        .order-card:hover {
            box-shadow: 0 14px 35px rgba(0,0,0,0.08);
        }

        .order-header {
            background: #f8f9fa;
            border-radius: 14px;
            padding: 15px 18px;
        }

        .product-row:last-child {
            border-bottom: none !important;
        }

        .total-box {
            background: #eef2f7;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 18px;
        }

        .review-box {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .rating-input {
            max-width: 90px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div th:replace="buyer/fragments/navbar :: navbar"></div>

<div class="container py-5">

    <h3 class="fw-bold mb-4">My Orders</h3>

    <!-- ✅ SUCCESS FLASH MESSAGE (AUTO HIDE ONLY THIS) -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">

        ✔ <span th:text="${successMessage}"></span>

        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>

    </div>

    <!-- ❌ ERROR FLASH MESSAGE -->
    <div th:if="${errorMessage}"
         class="alert alert-danger rounded-4 text-center fw-semibold flash-message">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Empty State -->
    <div th:if="${orders == null || #lists.isEmpty(orders)}"
         class="alert alert-info rounded-4 text-center">
        You haven’t placed any orders yet.
    </div>

    <!-- Orders Loop -->
    <div th:each="order : ${orders}"
         class="card order-card shadow-sm mb-4">

        <div class="card-body">

            <!-- 🔷 Order Header -->
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 order-header mb-4">

                <div>
                    <div class="fw-bold">
                        Order ID:
                        <span th:text="${order.orderId}"></span>
                    </div>
                    <small class="text-muted">
                        Placed on
                        <span th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}"></span>
                    </small>
                </div>

                <div class="d-flex gap-3">

                    <!-- Order Status -->
                    <div>
                        <small class="text-muted">Order</small><br>
                        <span class="badge rounded-pill px-3 py-2 bg-primary"
                              th:text="${order.status}">
                        </span>
                    </div>

                    <!-- Payment Status -->
                    <div>
                        <small class="text-muted">Payment</small><br>
                        <span class="badge rounded-pill px-3 py-2"
                              th:if="${paymentStatusMap != null and paymentStatusMap[order.orderId] != null}"
                              th:classappend="${paymentStatusMap[order.orderId] == 'SUCCESS'} ? ' bg-success' :
                              (${paymentStatusMap[order.orderId] == 'PENDING'} ? ' bg-warning text-dark' : ' bg-danger')"
                              th:text="${paymentStatusMap[order.orderId]}">
                        </span>
                    </div>

                </div>
            </div>

            <!-- 🔹 Order Items -->
            <div th:if="${order.orderItems != null}">

                <div th:each="item : ${order.orderItems}"
                     class="row align-items-center border-bottom pb-3 mb-3 product-row">

                    <!-- Product Name -->
                    <div class="col-md-5 fw-semibold">
                        <span th:text="${item.product.productName}"></span>
                    </div>

                    <!-- Price -->
                    <div class="col-md-2 text-muted">
                        ₹ <span th:text="${item.price}"></span>
                    </div>

                    <!-- Quantity -->
                    <div class="col-md-2 text-muted">
                        Qty: <span th:text="${item.quantity}"></span>
                    </div>

                    <!-- Subtotal -->
                    <div class="col-md-3 text-end fw-bold">
                        ₹ <span th:text="${item.price * item.quantity}"></span>
                    </div>

                    <!-- ⭐ REVIEW SECTION -->
                    <div class="col-12 mt-3"
                         th:if="${order.status == 'DELIVERED'}">

                        <!-- If NOT reviewed -->
                        <div th:if="${!@reviewServiceImpl.hasReviewed(order.orderId,
                                                item.product.productId,
                                                buyerEmail)}"
                             class="review-box p-3 mt-2">

                            <h6 class="fw-bold mb-3">
                                ⭐ Write a Review for
                                <span th:text="${item.product.productName}"></span>
                            </h6>

                            <form th:action="@{/buyer/review}" method="post">

                                <input type="hidden"
                                       name="orderId"
                                       th:value="${order.orderId}" />

                                <input type="hidden"
                                       name="productId"
                                       th:value="${item.product.productId}" />

                                <div class="row g-3">
                                    <div class="col-md-3">
                                        <input type="number"
                                               name="rating"
                                               min="1"
                                               max="5"
                                               class="form-control"
                                               placeholder="1-5"
                                               required />
                                    </div>

                                    <div class="col-md-7">
                                        <textarea name="comment"
                                                  class="form-control"
                                                  rows="2"
                                                  placeholder="Share your experience..."
                                                  required></textarea>
                                    </div>

                                    <div class="col-md-2">
                                        <button type="submit"
                                                class="btn btn-success w-100">
                                            Submit
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <!-- If ALREADY reviewed (WILL NOT DISAPPEAR NOW) -->
                        <div th:if="${@reviewServiceImpl.hasReviewed(order.orderId,
                                                item.product.productId,
                                                buyerEmail)}"
                             class="alert alert-success mt-2 rounded-4">
                            ✔ You have already reviewed this product.
                        </div>

                    </div>

                </div>
            </div>

            <!-- 🔸 Total Section -->
            <div class="d-flex justify-content-end mt-4">
                <div class="total-box fw-bold">
                    Total: ₹ <span th:text="${order.totalAmount}"></span>
                </div>
            </div>

        </div>
    </div>

</div>

<!-- ✅ CORRECT SCRIPT (Only hides flash messages, NOT review alerts) -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const flashMessages = document.querySelectorAll('.flash-message');

        if (flashMessages.length > 0) {
            setTimeout(() => {
                flashMessages.forEach(msg => {
                    msg.style.display = 'none';
                });
            }, 3000); // 3 seconds
        }
    });
</script>

</body>
</html>
