<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password | RevShop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        body{
        min-height:100vh;
        margin:0;
        display:flex;
        align-items:center;
        justify-content:center;
        background:radial-gradient(circle at 20% 20%,#0f172a,#020617 70%);
        font-family:'Inter',sans-serif;
        overflow:hidden;
        position:relative;
        color:white;
        }

        /* FLOATING ICONS */

        .icon{
        position:absolute;
        font-size:30px;
        color:rgba(250,204,21,.15);
        animation:floatIcon 14s infinite linear;
        }

        .icon:nth-child(1){top:10%;left:10%;}
        .icon:nth-child(2){top:80%;left:15%;}
        .icon:nth-child(3){top:25%;left:80%;}
        .icon:nth-child(4){top:75%;left:75%;}
        .icon:nth-child(5){top:15%;left:60%;}
        .icon:nth-child(6){top:55%;left:40%;}

        @keyframes floatIcon{
        0%{transform:translateY(0) rotate(0deg);}
        50%{transform:translateY(-35px) rotate(180deg);}
        100%{transform:translateY(0) rotate(360deg);}
        }

        /* CARD */

        .reset-wrapper{
        width:340px;
        z-index:10;
        }

        .reset-card{
        background:rgba(17,24,39,.92);
        backdrop-filter:blur(14px);
        border-radius:20px;
        padding:35px 28px;
        border:1px solid rgba(250,204,21,.25);
        box-shadow:
        0 25px 60px rgba(0,0,0,.7),
        0 0 25px rgba(250,204,21,.25);
        animation:cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat{
        0%{transform:translateY(0)}
        50%{transform:translateY(-6px)}
        100%{transform:translateY(0)}
        }

        /* BRAND */

        .brand{
        font-family:'Poppins',sans-serif;
        font-size:26px;
        font-weight:700;
        letter-spacing:2px;
        background:linear-gradient(90deg,#facc15,#f59e0b,#fbbf24);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        }

        .subtitle{
        font-size:12px;
        color:#94a3b8;
        }

        /* INPUT */

        .form-control{
        background:#020617;
        border:1px solid #1e293b;
        border-radius:8px;
        color:white;
        padding:8px;
        font-size:13px;
        }

        .form-control:focus{
        border-color:#facc15;
        box-shadow:0 0 0 .15rem rgba(250,204,21,.25);
        background:#020617;
        color:white;
        }

        /* BUTTON */

        .btn-primary{
        background:linear-gradient(135deg,#facc15,#f59e0b);
        border:none;
        border-radius:8px;
        font-weight:600;
        color:#111827;
        }

        .btn-primary:hover{
        transform:translateY(-2px);
        box-shadow:0 10px 25px rgba(250,204,21,.45);
        }

        .btn-success{
        background:linear-gradient(135deg,#22c55e,#16a34a);
        border:none;
        border-radius:8px;
        font-weight:600;
        }

        .btn-success:hover{
        transform:translateY(-2px);
        box-shadow:0 10px 25px rgba(34,197,94,.45);
        }

        /* DIVIDER */

        .divider{
        height:1px;
        background:linear-gradient(to right,transparent,#facc15,transparent);
        margin:18px 0;
        }

        .back-link{
        font-size:12px;
        color:#94a3b8;
        }

        .back-link:hover{
        color:#facc15;
        }

    </style>

</head>

<body>

<i class="bi bi-cart icon"></i> <i class="bi bi-bag icon"></i> <i class="bi bi-box-seam icon"></i> <i class="bi bi-tag icon"></i> <i class="bi bi-credit-card icon"></i> <i class="bi bi-truck icon"></i>

<div class="reset-wrapper">

    <div class="reset-card">

        <div class="text-center mb-4">
            <div class="brand">REVSHOP</div>
            <div class="subtitle">Secure Password Recovery</div>
        </div>

        <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success text-center" th:text="${success}"></div>

        <div th:if="${showResetForm == null}">

            <form th:action="@{/verify-email}" method="post">

                <div class="mb-3">
                    <label class="form-label">Registered Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Continue</button>
                </div>

            </form>

        </div>

        <div th:if="${showResetForm}">

            <form th:action="@{/reset-password}" method="post">

                <input type="hidden" name="email" th:value="${email}" />

                <div class="mb-3">
                    <label class="form-label">Security Question</label>
                    <input type="text" class="form-control" th:value="${question}" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Your Answer</label>
                    <input type="text" name="securityAnswer" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" name="newPassword" class="form-control" required>
                </div>

                <div class="divider"></div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success">Change Password</button>
                </div>

            </form>

        </div>

        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-decoration-none back-link">← Back to Login</a>
        </div>

    </div>
</div>

</body>
</html>
