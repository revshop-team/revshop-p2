
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>RevShop | Shop</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #0A192F, #112240);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* TITLE */
        .page-title {
            font-weight: 700;
            color: #D4AF37;
            animation: titleFloat 4s ease-in-out infinite alternate;
        }

        @keyframes titleFloat {
            0% { transform: translateY(0) }
            100% { transform: translateY(-5px) }
        }

        /* PRODUCT CARDS */
        .product-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            background: white;
            color: #0A192F;
            box-shadow: 0 12px 30px rgba(0,0,0,.3);
            transition: .5s;
            position: relative;
            animation: slideUp 1.2s ease forwards, floatCard 4s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes slideUp {
            0% { transform: translateY(80px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes floatCard {
            0% { transform: translateY(0) }
            50% { transform: translateY(-8px) }
            100% { transform: translateY(0) }
        }

        .product-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 60px rgba(0,0,0,.45);
        }

        /* IMAGE ZOOM */
        .product-img {
            height: 200px;
            object-fit: cover;
            transition: transform .6s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.12);
        }

        /* PRICE */
        .price {
            font-size: 18px;
            font-weight: 600;
        }

        .mrp {
            text-decoration: line-through;
            font-size: 14px;
            color: #6c757d;
        }

        /* DISCOUNT */
        .discount-badge {
            background: #D4AF37;
            color: #0A192F;
            font-weight: 600;
        }
        .categories-container{
display:flex;
flex-wrap:wrap;
gap:12px;
align-items:center;
max-width:100%;
}

.cat-btn{
border-radius:50px;
padding:8px 18px;
font-weight:500;
font-size:0.9rem;
white-space:nowrap;
}
        /* SORT BUTTON STYLING & ANIMATION */
        .sort-dropdown {
            border-radius: 30px;
            padding: 10px 40px 10px 22px;
            font-weight: 600;
            border: 2px solid #D4AF37;
            background-color: #0A192F;
            color: #D4AF37;
            box-shadow: 0 8px 20px rgba(0,0,0,.35);
            cursor: pointer;
            transition: all .35s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23D4AF37%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
            animation: sortFloat 3s ease-in-out infinite alternate, pulseSort 2s infinite alternate;
        }

        @keyframes pulseSort {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            100% { box-shadow: 0 0 15px 5px rgba(212, 175, 55, 0.1); }
        }

        @keyframes sortFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }

        .sort-dropdown:hover, .sort-dropdown:focus {
            background-color: #D4AF37;
            color: #0A192F;
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 14px 35px rgba(212, 175, 55, .4);
            outline: none;
            animation-play-state: paused;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%230A192F%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }

        .sort-dropdown option {
            background: #0A192F;
            color: white;
            font-weight: 500;
        }

        /* BUTTONS */
        .btn-cart {
            background: linear-gradient(135deg, #D4AF37, #e6c557);
            border: none;
            color: #0A192F;
            font-weight: 600;
            transition: .35s;
        }

        .btn-cart:hover {
            background: linear-gradient(135deg, #e6c557, #ffd95e);
            transform: scale(1.06);
            box-shadow: 0 10px 25px rgba(0,0,0,.35);
        }

        .btn-details {
            border: 1px solid #0A192F;
            color: #0A192F;
            transition: .35s;
        }

        .btn-details:hover {
            background-color: #0d6efd !important;
            border-color: #0d6efd !important;
            color: white !important;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(13, 110, 253, .4) !important;
        }

        /* HEART */
        .favourite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0,0,0,.25);
            cursor: pointer;
            z-index: 5;
        }

        .heart-icon {
            color: #999;
            font-size: 20px;
            transition: .3s;
        }

        .heart-icon.active {
            color: #ff4d6d;
            animation: heartPop .4s ease;
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.5); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* CATEGORY PILLS (Styled for Dark Mode) */
        .cat-btn {
            border-radius: 50px;
            padding: 6px 18px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            display: inline-block;
        }

        .cat-btn:hover {
            background-color: rgba(212, 175, 55, 0.2);
            color: #D4AF37;
            border-color: #D4AF37;
        }

        .cat-btn.active {
            background-color: #D4AF37;
            color: #0A192F;
            border-color: #D4AF37;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
        }

        /* PAGINATION (Styled for Dark Mode) */
        .pagination .page-link {
            border-radius: 50px;
            padding: 8px 18px;
            margin: 0 4px;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.5);
            font-weight: 600;
            transition: all 0.2s;
        }

        .pagination .page-item.active .page-link {
            background-color: #D4AF37;
            border-color: #D4AF37;
            color: #0A192F;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.4);
        }

        .pagination .page-link:hover:not(.disabled) {
            background-color: rgba(212, 175, 55, 0.2);
            color: #D4AF37;
        }

        .page-item.disabled .page-link, .page-link[aria-disabled="true"] {
            opacity: 0.5;
            background: transparent;
            border-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        /* CART TOAST POPUP */
        .cart-toast {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-40px);
            background: #198754;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 10px 30px rgba(25, 135, 84, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
        }

        .cart-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

    </style>
</head>

<body>

<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<div id="cartToast" class="cart-toast">
    <i class="bi bi-check-circle-fill fs-5"></i>
    Added to Cart Successfully
</div>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm fw-medium text-white" style="background-color: rgba(25, 135, 84, 0.2); border: 1px solid #198754;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-4 shadow-sm fw-medium text-white" style="background-color: rgba(220, 53, 69, 0.2); border: 1px solid #dc3545;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
</div>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <h3 class="page-title mb-0"><i class="bi bi-bag-heart text-warning me-2"></i>Explore Products</h3>

        <form method="get" th:action="@{/buyer/products}">
            <input type="hidden" name="page" value="0"/>
            <input type="hidden" name="keyword" th:value="${keyword}"/>
            <input type="hidden" name="categoryId" th:value="${selectedCategoryId}"/>

            <select class="sort-dropdown" name="sort" onchange="this.form.submit()">
                <option value="default" th:selected="${sort == 'default'}">Sort By Relevance</option>
                <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Price: Low to High</option>
                <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Price: High to Low</option>
                <option value="newest" th:selected="${sort == 'newest'}">Newest Arrivals</option>
            </select>
        </form>
    </div>

    <div class="mb-5 pb-3 border-bottom border-secondary">

        <div class="categories-container">

            <a class="cat-btn"
               th:classappend="${selectedCategoryId == null} ? 'active'"
               th:href="@{/buyer/products(page=0, sort=${sort}, keyword=${keyword})}">
                All Products
            </a>

            <a class="cat-btn"
               th:each="cat : ${categories}"
               th:text="${cat.categoryName}"
               th:classappend="${selectedCategoryId == cat.categoryId} ? 'active'"
               th:href="@{/buyer/products(page=0, sort=${sort}, keyword=${keyword}, categoryId=${cat.categoryId})}">
            </a>

        </div>

    </div>

    <div class="text-center w-100 py-5" th:if="${productPage.content.isEmpty()}">
        <i class="bi bi-search mb-3" style="font-size: 3rem; color: #D4AF37; opacity: 0.8;"></i>
        <h5 class="fw-bold mt-2 text-white">No products found</h5>
        <p class="text-white-50">Try searching with a different keyword or browsing a different category.</p>
        <a th:href="@{/buyer/products}" class="cat-btn mt-2 px-4">Clear Filters</a>
    </div>

    <div class="row g-4" th:if="${!productPage.content.isEmpty()}">
        <div class="col-md-4 col-lg-3" th:each="product : ${productPage.content}">

            <div class="card product-card h-100">

                <form th:action="@{/buyer/favourite/toggle/{id}(id=${product.productId})}" method="post">
                    <input type="hidden" name="redirectTo" value="products"/>
                    <button type="submit" class="favourite-btn">
                        <i th:if="${favouriteProductIds.contains(product.productId)}" class="bi bi-heart-fill heart-icon active"></i>
                        <i th:unless="${favouriteProductIds.contains(product.productId)}" class="bi bi-heart heart-icon"></i>
                    </button>
                </form>

                <img th:src="@{/images/{img}(img=${product.imageName})}" class="card-img-top product-img" alt="Product">

                <div class="card-body d-flex flex-column">

                    <h6 class="fw-semibold text-truncate mb-1" th:text="${product.productName}"></h6>
                    <p class="text-muted small mb-3 text-truncate" th:text="${product.description}"></p>

                    <div class="mb-2 d-flex align-items-center flex-wrap gap-2">
                        <span class="price">₹ <span th:text="${product.sellingPrice}"></span></span>

                        <span class="mrp" th:if="${product.mrp != null and product.mrp > product.sellingPrice}">
                            ₹ <span th:text="${product.mrp}"></span>
                        </span>
                    </div>

                    <span class="badge discount-badge mb-3 align-self-start"
                          th:if="${product.mrp != null and product.mrp > product.sellingPrice}"
                          th:text="${T(java.lang.Math).round((product.mrp - product.sellingPrice) * 100 / product.mrp)} + '% OFF'">
                    </span>

                    <div class="mt-auto">
                        <a class="btn btn-details btn-sm w-100 mb-2 py-2" th:href="@{/buyer/product/{id}(id=${product.productId})}">
                            View Details
                        </a>

                        <a th:if="${product.stock > 0}"
                           th:href="@{/buyer/cart/add/{id}(id=${product.productId})}"
                           class="btn btn-cart btn-sm w-100 py-2 addCartBtn">
                            <i class="bi bi-cart-plus me-1"></i> Add to Cart
                        </a>

                        <button th:if="${product.stock == 0}" class="btn btn-secondary btn-sm w-100 py-2 fw-semibold" disabled>
                            Out of Stock
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <nav class="mt-5" th:if="${productPage.totalPages > 0}">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${!productPage.hasPrevious()} ? 'disabled'">
                <a class="page-link shadow-sm"
                   th:href="${productPage.hasPrevious()} ? @{/buyer/products(page=${currentPage - 1}, sort=${sort}, keyword=${keyword}, categoryId=${selectedCategoryId})} : '#'"
                   th:attr="aria-disabled=${!productPage.hasPrevious()}">
                    <i class="bi bi-chevron-left me-1"></i> Prev
                </a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link shadow-sm"
                   th:text="${i + 1}"
                   th:href="@{/buyer/products(page=${i}, sort=${sort}, keyword=${keyword}, categoryId=${selectedCategoryId})}">
                </a>
            </li>

            <li class="page-item" th:classappend="${!productPage.hasNext()} ? 'disabled'">
                <a class="page-link shadow-sm"
                   th:href="${productPage.hasNext()} ? @{/buyer/products(page=${currentPage + 1}, sort=${sort}, keyword=${keyword}, categoryId=${selectedCategoryId})} : '#'"
                   th:attr="aria-disabled=${!productPage.hasNext()}">
                    Next <i class="bi bi-chevron-right ms-1"></i>
                </a>
            </li>

        </ul>
    </nav>

</div>

<script>
    document.querySelectorAll(".addCartBtn").forEach(btn => {
        btn.addEventListener("click", function(e) {
            // Prevent immediate redirect so the animation can play
            e.preventDefault();

            const targetUrl = this.getAttribute("href");
            const toast = document.getElementById("cartToast");

            // Show the popup
            toast.classList.add("show");

            // Wait 1.5 seconds, then hide the popup and redirect to cart
            setTimeout(() => {
                toast.classList.remove("show");
                window.location.href = targetUrl;
            }, 1500);
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
