<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sales Analytics | RevShop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js (IMPORTANT FOR CHART) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#sellerNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="sellerNavbar">
        <div class="ms-auto d-flex align-items-center gap-4">

            <!-- Notifications -->
            <a th:href="@{/seller/notifications}"
               class="position-relative text-light text-decoration-none">
                <i class="bi bi-bell fs-5"></i>

                <span id="notificationCount"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                    0
                </span>
            </a>

            <!-- Account Dropdown -->
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    My Account
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li>
                        <a class="dropdown-item"
                           th:href="@{/seller/profile}">
                            <i class="bi bi-person me-2"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item text-danger"
                           th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<!-- ================= PAGE CONTENT ================= -->
<div class="container mt-5">

    <h2 class="fw-bold text-center mb-5">📊 Advanced Sales Analytics</h2>

    <!-- KPI CARDS -->
    <div class="row text-center mb-4">

        <div class="col-md-3">
            <div class="card shadow-sm p-4">
                <h3 class="fw-bold" th:text="${totalOrders}">0</h3>
                <p class="text-muted mb-0">Total Orders</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-4">
                <h3 class="fw-bold text-warning" th:text="${pendingOrders}">0</h3>
                <p class="text-muted mb-0">Pending Orders</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-4">
                <h3 class="fw-bold text-success" th:text="${deliveredOrders}">0</h3>
                <p class="text-muted mb-0">Delivered Orders</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-4">
                <h3 class="fw-bold text-primary">
                    ₹ <span th:text="${#numbers.formatDecimal(totalRevenue,1,2)}">0.00</span>
                </h3>
                <p class="text-muted mb-0">Total Revenue</p>
            </div>
        </div>

    </div>

    <!-- ADVANCED INSIGHTS -->
    <div class="row mb-4">

        <div class="col-md-6">
            <div class="card shadow-sm p-4 text-center">
                <h5 class="fw-bold">💰 Average Order Value</h5>
                <h2 class="text-success">
                    ₹ <span th:text="${#numbers.formatDecimal(averageOrderValue,1,2)}">0.00</span>
                </h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm p-4 text-center">
                <h5 class="fw-bold">🏆 Top Selling Product</h5>
                <h4 class="text-primary" th:text="${topProduct}">Product</h4>
            </div>
        </div>

    </div>

    <!-- MONTHLY REVENUE CHART -->
    <div class="card shadow-sm p-4">
        <h4 class="fw-bold mb-3 text-center">📈 Monthly Revenue Chart</h4>
        <canvas id="revenueChart" height="100"></canvas>
    </div>

</div>

<!-- ================= NOTIFICATION SCRIPT ================= -->
<script>
    function loadNotificationCount() {
        fetch('/seller/notifications/unread-count')
            .then(res => res.text())
            .then(count => {
                const badge = document.getElementById('notificationCount');
                const num = parseInt(count);

                if (!isNaN(num) && num > 0) {
                    badge.classList.remove('d-none');
                    badge.textContent = num;
                } else {
                    badge.classList.add('d-none');
                }
            })
            .catch(err => console.error("Notification error:", err));
    }

    loadNotificationCount();
    setInterval(loadNotificationCount, 5000);
</script>

<!-- ================= CHART SCRIPT ================= -->
<script th:inline="javascript">
    const months = [[${months}]];
    const revenues = [[${revenues}]];

    const ctx = document.getElementById('revenueChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: months,
            datasets: [{
                label: 'Revenue (₹)',
                data: revenues,
                borderWidth: 2,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: true } },
            scales: { y: { beginAtZero: true } }
        }
    });
</script>

<!-- Bootstrap JS (REQUIRED FOR DROPDOWN) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
