<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Profile | RevShop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons (REQUIRED FOR NAVBAR ICONS) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#sellerNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="sellerNavbar">
        <div class="ms-auto d-flex align-items-center gap-4">

            <!-- Notifications -->
            <a th:href="@{/seller/notifications}"
               class="position-relative text-light text-decoration-none">
                <i class="bi bi-bell fs-5"></i>

                <span id="notificationCount"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                    0
                </span>
            </a>

            <!-- Account Dropdown -->
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    My Account
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li>
                        <a class="dropdown-item"
                           th:href="@{/seller/profile}">
                            <i class="bi bi-person me-2"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item text-danger"
                           th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<!-- ================= PAGE CONTENT ================= -->
<div class="container mt-5">

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Seller Profile</h4>
        </div>

        <div class="card-body">

            <!-- SUCCESS MESSAGE -->
            <div th:if="${param.success}"
                 class="alert alert-success">
                Profile updated successfully!
            </div>

            <form th:action="@{/seller/profile}"
                  th:object="${sellerDetails}"
                  method="post">

                <input type="hidden" th:field="*{sellerId}" />

                <div class="mb-3">
                    <label class="form-label">Business Name</label>
                    <input type="text" class="form-control"
                           th:field="*{businessName}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">GST Number</label>
                    <input type="text" class="form-control"
                           th:field="*{gstNumber}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control"
                           th:field="*{address}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control"
                           th:field="*{phone}">
                </div>

                <button type="submit" class="btn btn-success">
                    Update Profile
                </button>

                <a th:href="@{/seller/dashboard}"
                   class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>
    </div>

</div>

<!-- ================= NOTIFICATION SCRIPT ================= -->
<script>
    function loadNotificationCount() {
        fetch('/seller/notifications/unread-count')
            .then(res => res.text())
            .then(count => {
                const badge = document.getElementById('notificationCount');
                const num = parseInt(count);

                if (!isNaN(num) && num > 0) {
                    badge.classList.remove('d-none');
                    badge.textContent = num;
                } else {
                    badge.classList.add('d-none');
                }
            })
            .catch(err => console.error("Notification error:", err));
    }

    loadNotificationCount();
    setInterval(loadNotificationCount, 5000);
</script>

<!-- Bootstrap JS (REQUIRED FOR DROPDOWN) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
