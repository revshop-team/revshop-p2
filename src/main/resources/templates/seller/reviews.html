<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Reviews | RevShop</title>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background-color: #f5f6f8; }

        .product-card { border-radius: 14px; border: none; }
        .review-box { background: #f8f9fa; border-radius: 12px; padding: 15px; }

        .avg-badge {
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .star { font-size: 16px; color: #ffc107; }
        .star-muted { color: #dee2e6; }

        .low-rating {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 6px;
        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4 py-2">

    <a class="navbar-brand fw-bold d-flex align-items-center"
       th:href="@{/seller/dashboard}">
        <i class="bi bi-shop me-2"></i>
        RevShop <span class="fw-light ms-1">Seller</span>
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#sellerNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="sellerNavbar">
        <div class="ms-auto d-flex align-items-center gap-4">

            <!-- Notifications -->
            <a th:href="@{/seller/notifications}"
               class="position-relative text-light text-decoration-none">
                <i class="bi bi-bell fs-5"></i>

                <span id="notificationCount"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                    0
                </span>
            </a>

            <!-- Account Dropdown -->
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    <span th:text="${businessName}">Business Name</span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li>
                        <a class="dropdown-item" th:href="@{/seller/profile}">
                            <i class="bi bi-person me-2"></i>
                            Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item text-danger" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<!-- ================= PAGE CONTENT ================= -->
<div class="container mt-5">

    <h3 class="fw-bold mb-4">⭐ Product Reviews & Ratings</h3>

    <!-- EMPTY STATE -->
    <div th:if="${productReviewsMap == null || #maps.isEmpty(productReviewsMap)}"
         class="alert alert-info text-center rounded-3 shadow-sm">
        No reviews received for your products yet.
    </div>

    <!-- PRODUCT GROUPED REVIEWS -->
    <div th:each="entry : ${productReviewsMap}"
         class="card product-card shadow-sm mb-4">
        <div class="card-body">

            <!-- PRODUCT HEADER -->
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="fw-bold mb-1"
                        th:text="${entry.key.productName}">
                        Product Name
                    </h4>

                    <small class="text-muted">
                        Total Reviews:
                        <span th:text="${reviewCountMap[entry.key.productId]}"></span>
                    </small>

                    <div th:if="${avgRatingMap[entry.key.productId] != null
                                 and avgRatingMap[entry.key.productId] < 3}"
                         class="low-rating">
                        ⚠ Low customer satisfaction for this product
                    </div>
                </div>

                <span class="badge bg-warning text-dark avg-badge shadow-sm fw-bold">
                    ⭐
                    <span th:text="${#numbers.formatDecimal(avgRatingMap[entry.key.productId], 1, 1)}"></span>
                    / 5
                </span>
            </div>

            <hr/>

            <!-- LATEST 2 REVIEWS -->
            <div th:each="review, stat : ${entry.value}"
                 th:if="${stat.index < 2}"
                 class="review-box mb-3">

                <div class="fw-semibold mb-2">
                    <span th:each="i : ${#numbers.sequence(1,5)}">
                        <span th:text="${i <= review.rating ? '★' : '☆'}"
                              th:class="${i <= review.rating} ? 'star' : 'star star-muted'"></span>
                    </span>
                    <span class="ms-2"
                          th:text="${review.rating} + ' / 5'"></span>
                </div>

                <div class="text-muted mb-1">
                    Buyer:
                    <span class="fw-semibold"
                          th:text="${review.buyer.email}">
                        buyer@email.com
                    </span>
                </div>

                <div class="mb-2 text-dark"
                     th:text="${review.reviewComment}">
                    Review comment
                </div>

                <small class="text-secondary">
                    Reviewed on:
                    <span th:text="${#temporals.format(review.reviewDate, 'dd MMM yyyy')}"></span>
                </small>

            </div>

            <!-- VIEW ALL -->
            <div th:if="${entry.value.size() > 2}" class="text-end">
                <a th:href="@{/seller/reviews/product/{id}(id=${entry.key.productId})}"
                   class="btn btn-sm btn-outline-primary">
                    View All Reviews
                </a>
            </div>

        </div>
    </div>

</div>

<!-- ================= NOTIFICATION SCRIPT ================= -->
<script>
    function loadNotificationCount() {
        fetch('/seller/notifications/unread-count')
            .then(res => res.text())
            .then(count => {
                const badge = document.getElementById('notificationCount');
                const num = parseInt(count);

                if (!isNaN(num) && num > 0) {
                    badge.classList.remove('d-none');
                    badge.textContent = num;
                } else {
                    badge.classList.add('d-none');
                }
            })
            .catch(err => console.error("Notification error:", err));
    }

    loadNotificationCount();
    setInterval(loadNotificationCount, 5000);
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
