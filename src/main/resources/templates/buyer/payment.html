<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Secure Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6f9;
        }

        .gateway-card{
        max-width:520px;
        margin:auto;
        margin-top:60px;
        border-radius:12px;
        }

        .gateway-header{
        background:#0f172a;
        color:white;
        padding:15px;
        border-radius:12px 12px 0 0;
        }

        .payment-tab{
        cursor:pointer;
        padding:10px;
        text-align:center;
        font-weight:500;
        border-bottom:2px solid transparent;
        }

        .payment-tab.active{
        border-bottom:2px solid #22c55e;
        color:#22c55e;
        }

        .payment-section{
        display:none;
        }

        .payment-section.active{
        display:block;
        }

        .pay-btn{
        font-size:18px;
        padding:12px;
        }

    </style>

</head>

<body>

<div class="card shadow gateway-card">

    <div class="gateway-header text-center">
        <h5 class="mb-0">🔒 Secure Payment Gateway</h5>
    </div>

    <div class="card-body" id="paymentContent">

        <h4 class="text-center mb-4">
            Amount: ₹
            <span th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',2,'POINT')}"></span>
        </h4>

        <!-- Payment Tabs -->

        <div class="row text-center mb-4">

            <div class="col payment-tab active" onclick="showTab('upi')">
                UPI
            </div>

            <div class="col payment-tab" onclick="showTab('card')">
                Card
            </div>

            <div class="col payment-tab" onclick="showTab('bank')">
                NetBanking
            </div>

        </div>

        <!-- UPI -->

        <div id="upi" class="payment-section active text-center">

            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/UPI-Logo-vector.svg"
                 width="120" class="mb-3">

            <p>Pay using any UPI app</p>

            <input id="upiInput"
                   class="form-control mb-3"
                   placeholder="Enter UPI ID (example@upi)">

            <button class="btn btn-success w-100 pay-btn"
                    onclick="payUPI()">
                Pay ₹ <span th:text="${order.totalAmount}"></span>
            </button>

        </div>

        <!-- CARD -->

        <div id="card" class="payment-section">

            <input id="cardNumber"
                   class="form-control mb-3"
                   placeholder="Card Number">

            <div class="row">

                <div class="col">
                    <input id="cardExpiry"
                           class="form-control mb-3"
                           placeholder="MM/YY">
                </div>

                <div class="col">
                    <input id="cardCvv"
                           class="form-control mb-3"
                           placeholder="CVV">
                </div>

            </div>

            <input id="cardName"
                   class="form-control mb-3"
                   placeholder="Card Holder Name">

            <button class="btn btn-success w-100 pay-btn"
                    onclick="payCard()">
                Pay ₹ <span th:text="${order.totalAmount}"></span>
            </button>

            <p class="text-muted text-center mt-2">
                Order ID: <span th:text="${order.orderId}"></span>
            </p>

        </div>

        <!-- NETBANKING -->

        <div id="bank" class="payment-section">

            <select id="bankSelect" class="form-select mb-3">

                <option>Select Bank</option>
                <option>SBI</option>
                <option>HDFC</option>
                <option>ICICI</option>
                <option>Axis Bank</option>

            </select>

            <button class="btn btn-success w-100 pay-btn"
                    onclick="payBank()">
                Proceed To Bank
            </button>

        </div>

        <!-- FAIL BUTTON -->

        <!--        <button class="btn btn-outline-danger w-100 mt-3"-->
        <!--                onclick="payFail()">-->
        <!--            Simulate Payment Failure-->
        <!--        </button>-->

    </div>

    <!-- PAYMENT LOADER -->

    <div id="paymentLoader" class="text-center p-5" style="display:none">

        <div class="spinner-border text-success mb-3"></div>

        <h5>Processing Payment...</h5>

        <p class="text-muted">Please do not refresh the page</p>

    </div>

</div>

<script th:inline="javascript">

    const orderId = [[${order.orderId}]];

    /* TAB SWITCH */

    function showTab(tab){

    document.querySelectorAll(".payment-tab")
    .forEach(t=>t.classList.remove("active"));

    document.querySelectorAll(".payment-section")
    .forEach(s=>s.classList.remove("active"));

    document.querySelector("[onclick=\"showTab('"+tab+"')\"]")
    .classList.add("active");

    document.getElementById(tab)
    .classList.add("active");

    }

    /* UPI VALIDATION */

    function payUPI(){

    const upi = document.getElementById("upiInput").value.trim();

    if(!upi){

    alert("Please enter UPI ID");
    return;

    }

    if(!upi.includes("@")){

    alert("Invalid UPI ID");
    return;

    }

    paySuccess();

    }

    /* CARD VALIDATION */

    function payCard(){

    const card = document.getElementById("cardNumber").value.trim();
    const cvv = document.getElementById("cardCvv").value.trim();
    const expiry = document.getElementById("cardExpiry").value.trim();
    const name = document.getElementById("cardName").value.trim();

    if(card.length < 12){

    alert("Invalid card number");
    return;

    }

    if(!expiry){

    alert("Enter expiry date");
    return;

    }

    if(cvv.length < 3){

    alert("Invalid CVV");
    return;

    }

    if(!name){

    alert("Enter card holder name");
    return;

    }

    paySuccess();

    }

    /* NETBANKING VALIDATION */

    function payBank(){

    const bank = document.getElementById("bankSelect").value;

    if(bank === "Select Bank"){

    alert("Please select a bank");
    return;

    }

    paySuccess();

    }

    /* PROCESS PAYMENT */

    function paySuccess(){

    document.getElementById("paymentContent").style.display="none";

    document.getElementById("paymentLoader").style.display="block";

    setTimeout(function(){

    window.location =
    "/buyer/payment/process?orderId="+orderId+"&status=success";

    },2000);

    }

    /* PAYMENT FAILURE */

    function payFail(){

    document.getElementById("paymentContent").style.display="none";

    document.getElementById("paymentLoader").style.display="block";

    setTimeout(function(){

    window.location =
    "/buyer/payment/process?orderId="+orderId+"&status=failed";

    },2000);

    }

</script>

</body>
</html>
