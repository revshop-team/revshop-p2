<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password | RevShop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 20%, #1e1b4b, #0f172a 60%);
            font-family: 'Segoe UI', sans-serif;
        }

        .reset-wrapper {
            width: 440px;
        }

        .reset-card {
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(18px);
            border-radius: 24px;
            padding: 45px 38px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
        }

        .brand {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #facc15, #fde68a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .form-label {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            color: white;
            padding: 11px 14px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: #facc15;
            box-shadow: 0 0 0 0.2rem rgba(250,204,21,0.2);
            color: white;
        }

        .btn-primary,
        .btn-success {
            border-radius: 14px;
            font-weight: 600;
            padding: 11px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #facc15, #f59e0b);
            color: #111827;
        }

        .btn-primary:hover {
            box-shadow: 0 12px 30px rgba(250,204,21,0.4);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .btn-success:hover {
            box-shadow: 0 12px 30px rgba(34,197,94,0.4);
            transform: translateY(-2px);
        }

        .alert {
            border-radius: 12px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            margin: 25px 0;
        }

        .back-link {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .back-link:hover {
            color: #facc15;
        }
    </style>
</head>

<body>

<div class="reset-wrapper">

    <div class="reset-card">

        <div class="text-center mb-4">
            <div class="brand">REVSHOP</div>
            <div class="subtitle">Secure Password Recovery</div>
        </div>

        <!-- Alerts -->
        <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success text-center" th:text="${success}"></div>

        <!-- STEP 1 -->
        <div th:if="${showResetForm == null}">

            <form th:action="@{/verify-email}" method="post">

                <div class="mb-3">
                    <label class="form-label">Registered Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Continue
                    </button>
                </div>

            </form>

        </div>

        <!-- STEP 2 -->
        <div th:if="${showResetForm}">

            <form th:action="@{/reset-password}" method="post">

                <input type="hidden" name="email" th:value="${email}" />

                <div class="mb-3">
                    <label class="form-label">Security Question</label>
                    <input type="text"
                           class="form-control"
                           th:value="${question}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Your Answer</label>
                    <input type="text"
                           name="securityAnswer"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password"
                           name="newPassword"
                           class="form-control"
                           required>
                </div>

                <div class="divider"></div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success">
                        Change Password
                    </button>
                </div>

            </form>

        </div>

        <div class="text-center mt-4">
            <a th:href="@{/login}" class="text-decoration-none back-link">
                ← Back to Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
