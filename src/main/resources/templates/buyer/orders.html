
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevShop | My Orders</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f1c3f, #142b6f, #1f3f9e);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* FIX: Keeps the dropdown menu above the animated order cards */
        .navbar {
            position: relative;
            z-index: 1050 !important;
        }

        /* PAGE TITLE */
        .page-title {
            font-weight: 700;
            font-size: 32px;
            color: #D4AF37;
            letter-spacing: 1px;
            animation: titleFloat 4s ease-in-out infinite alternate;
        }

        @keyframes titleFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        /* ORDER CARD */
        .order-card {
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            color: #0f1c3f;
            transition: 0.4s;
            animation: floatCard 6s ease-in-out infinite;
        }

        .order-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* ORDER HEADER */
        .order-header {
            background: linear-gradient(135deg, #0f1c3f, #1f3f9e);
            border-radius: 18px 18px 0 0;
            padding: 20px 24px;
            color: white;
        }

        /* PRODUCT ROW */
        .product-row {
            color: #0A192F;
            font-weight: 500;
        }

        .product-row .text-muted {
            color: #64748b !important;
        }

        .product-row:last-child {
            border-bottom: none !important;
        }

        .product-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        /* TOTAL BOX */
        .total-box {
            background: linear-gradient(135deg, #D4AF37, #ffcc00);
            border-radius: 12px;
            padding: 12px 22px;
            font-size: 18px;
            color: #0f1c3f;
            transition: 0.3s;
            display: inline-block;
        }

        .total-box:hover {
            transform: scale(1.06);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* REVIEW BOX */
        .review-box {
            background: #f8fafc;
            border-radius: 12px;
            border: 2px dashed #D4AF37;
            transition: 0.3s;
        }

        .review-box:hover {
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }

        /* BUTTONS */
        .btn-success-custom {
            background: linear-gradient(135deg, #D4AF37, #ffcc00);
            border: none;
            color: #0f1c3f;
            font-weight: 600;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-success-custom:hover {
            background: #0f1c3f;
            color: #D4AF37;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }

        .btn-retry {
            background: #ffcc00;
            color: #0f1c3f;
            font-weight: 700;
            border-radius: 30px;
            padding: 5px 15px;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-retry:hover {
            background: white;
            color: #dc3545;
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }

        /* BADGES */
        .badge.bg-primary {
            background: linear-gradient(135deg, #1f3f9e, #3f6df5) !important;
        }

        .badge.bg-success {
            background: linear-gradient(135deg, #16a34a, #22c55e) !important;
        }

        .badge.bg-warning {
            background: linear-gradient(135deg, #D4AF37, #ffcc00) !important;
            color: #0f1c3f !important;
        }

        .badge.bg-danger {
            background: linear-gradient(135deg, #dc2626, #ef4444) !important;
        }

        /* FLASH MESSAGE */
        .flash-message {
            animation: fadeIn 0.6s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

<div th:replace="~{buyer/fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <h3 class="page-title mb-4"><i class="bi bi-box-seam me-2"></i>My Orders</h3>

    <div th:if="${successMessage}" class="alert alert-success rounded-4 text-center fw-semibold flash-message shadow-sm">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger rounded-4 text-center fw-semibold flash-message shadow-sm">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${orders == null || #lists.isEmpty(orders)}" class="alert alert-info rounded-4 text-center p-5 shadow-lg bg-white">
        <i class="bi bi-bag-x text-muted mb-3" style="font-size: 3rem; opacity: 0.5;"></i>
        <h5 class="fw-bold text-navy mt-2" style="color: #0f1c3f;">No orders found</h5>
        <p class="text-muted">You haven’t placed any orders yet.</p>
        <a th:href="@{/buyer/products}" class="btn btn-success-custom mt-2 px-4 py-2">Start Shopping</a>
    </div>

    <div th:each="order : ${orders}" class="card order-card shadow-lg mb-5 animate__animated animate__fadeInUp">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 order-header">
            <div>
                <div class="fw-bold fs-5" style="color: #D4AF37;">
                    Order ID: #<span th:text="${order.orderId}"></span>
                </div>
                <small class="opacity-75">
                    <i class="bi bi-calendar3 me-1"></i> Placed on
                    <span th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}"></span>
                </small>
            </div>

            <div class="d-flex gap-4 align-items-center">
                <div class="text-center">
                    <small class="d-block mb-1 opacity-75" style="font-size: 0.75rem; text-transform: uppercase;">Order</small>
                    <span class="badge rounded-pill px-3 py-2 bg-primary" th:text="${order.status}"></span>
                </div>

                <div class="text-center">
                    <small class="d-block mb-1 opacity-75" style="font-size: 0.75rem; text-transform: uppercase;">Payment</small>
                    <span class="badge rounded-pill px-3 py-2"
                          th:if="${paymentStatusMap != null and paymentStatusMap[order.orderId] != null}"
                          th:classappend="${paymentStatusMap[order.orderId] == 'SUCCESS'} ? ' bg-success' :
                                          (${paymentStatusMap[order.orderId] == 'PENDING'} ? ' bg-warning' : ' bg-danger')"
                          th:text="${paymentStatusMap[order.orderId]}">
                    </span>
                </div>

                <div th:if="${paymentStatusMap != null and paymentStatusMap[order.orderId] == 'FAILED'}" class="ms-2">
                    <a th:href="@{/buyer/payment/{id}(id=${order.orderId})}" class="btn-retry shadow-sm">
                        <i class="bi bi-arrow-clockwise me-1"></i>Retry
                    </a>
                </div>
            </div>
        </div>

        <div class="card-body p-4">

            <div th:if="${order.orderItems != null}">
                <div th:each="item : ${order.orderItems}" class="row align-items-center border-bottom pb-3 mb-3 product-row">

                    <div class="col-md-5 d-flex align-items-center gap-3 fw-semibold">
                        <img th:src="@{/images/{img}(img=${item.product.imageName})}" class="product-img shadow-sm" alt="Product">
                        <span th:text="${item.product.productName}"></span>
                    </div>

                    <div class="col-md-2 text-muted fw-medium mt-2 mt-md-0">
                        ₹ <span th:text="${item.price}"></span>
                    </div>

                    <div class="col-md-2 text-muted fw-medium mt-2 mt-md-0">
                        Qty: <span th:text="${item.quantity}"></span>
                    </div>

                    <div class="col-md-3 text-end fw-bold mt-2 mt-md-0" style="color: #0f1c3f; font-size: 1.1rem;">
                        ₹ <span th:text="${item.price * item.quantity}"></span>
                    </div>

                    <div class="col-12 mt-3" th:if="${order.status == 'DELIVERED'}">

                        <div th:if="${!@reviewServiceImpl.hasReviewed(order.orderId, item.product.productId, buyerEmail)}" class="review-box p-3 mt-2">
                            <h6 class="fw-bold mb-3" style="color: #0f1c3f;">
                                ⭐ Write a Review for <span th:text="${item.product.productName}"></span>
                            </h6>
                            <form th:action="@{/buyer/review}" method="post">
                                <input type="hidden" name="orderId" th:value="${order.orderId}" />
                                <input type="hidden" name="productId" th:value="${item.product.productId}" />

                                <div class="row g-3">
                                    <div class="col-md-3">
                                        <input type="number" name="rating" min="1" max="5" class="form-control" placeholder="Rating (1-5)" required />
                                    </div>
                                    <div class="col-md-7">
                                        <textarea name="comment" class="form-control" rows="2" placeholder="Share your experience..." required></textarea>
                                    </div>
                                    <div class="col-md-2">
                                        <button type="submit" class="btn btn-success-custom w-100 h-100">Submit</button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div th:if="${@reviewServiceImpl.hasReviewed(order.orderId, item.product.productId, buyerEmail)}" class="alert alert-success mt-2 rounded-3 py-2 px-3 mb-0 border-0 shadow-sm" style="background: #d1e7dd; color: #0f5132;">
                            <i class="bi bi-check-circle-fill me-2"></i><small class="fw-medium">You have already reviewed this product.</small>
                        </div>

                    </div>

                </div>
            </div>

            <div class="d-flex justify-content-end mt-4">
                <div class="total-box fw-bold shadow-sm">
                    Total: ₹ <span th:text="${order.totalAmount}"></span>
                </div>
            </div>

        </div>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const flashMessages = document.querySelectorAll('.flash-message');
        if (flashMessages.length > 0) {
            setTimeout(() => {
                flashMessages.forEach(msg => {
                    msg.style.opacity = '0';
                    msg.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => msg.style.display = 'none', 500);
                });
            }, 3000);
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
