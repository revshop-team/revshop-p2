<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3"
     th:fragment="navbar">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand fw-semibold fs-5"
           th:href="@{/}">
            Rev<span class="text-warning">Shop</span>
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">

            <!-- LEFT MENU -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/home}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/products}">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/cart}">Cart</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/orders}">Orders</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/favourites}">Favourites</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/buyer/profile}">Profile</a>
                </li>

            </ul>

            <!-- RIGHT SIDE -->
            <div class="d-flex align-items-center gap-4">

                <!-- 🔔 NOTIFICATIONS -->
                <a th:href="@{/buyer/notifications}"
                   class="position-relative text-light"
                   title="Notifications">

                    <i class="bi bi-bell fs-5"></i>

                    <!-- Badge -->
                    <span id="buyerNotificationCount"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger small"
                          style="display:none;">
                        0
                    </span>
                </a>

                <!-- 👤 USER DROPDOWN -->
                <div class="dropdown">

                    <a href="#"
                       class="d-flex align-items-center text-light text-decoration-none"
                       data-bs-toggle="dropdown">

                        <div class="rounded-circle bg-warning text-dark d-flex justify-content-center align-items-center"
                             style="width:30px;height:30px;font-size:13px;font-weight:600;">
                            <span th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</span>
                        </div>

                        <i class="bi bi-chevron-down ms-1 small"></i>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow-sm">

                        <li class="px-3 py-2">
                            <small class="text-muted">Signed in as</small><br>
                            <span class="fw-semibold small"
                                  th:text="${#authentication.name}">
                            </span>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit"
                                        class="dropdown-item text-danger small">
                                    Logout
                                </button>
                            </form>
                        </li>

                    </ul>

                </div>

            </div>

        </div>
    </div>

    <!-- 🔔 AUTO FETCH UNREAD NOTIFICATION COUNT -->
    <script>
        function loadBuyerNotificationCount() {
            fetch('/buyer/notifications/unread-count')
                .then(res => res.text())
                .then(count => {
                    const badge = document.getElementById('buyerNotificationCount');
                    if (!badge) return;

                    if (count > 0) {
                        badge.style.display = 'inline-block';
                        badge.textContent = count;
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(err => console.error("Notification error:", err));
        }

        loadBuyerNotificationCount();
        setInterval(loadBuyerNotificationCount, 5000);
    </script>

</nav>
